<!-- ── APP ── inlined so Babel transpiles reliably ── -->
<script type="text/babel" data-presets="react">
// ── BAKER STREET CAPITAL ADVISORS — APP CODE ─────────────────────────────────
// This file contains the app logic and UI.
// Data lives in: network.js, servicers.js, deals_FL.js, deals_VA.js, deals_TX.js, deals_IL.js, deals_GA.js

// ── COMBINE ALL STATE DEALS ───────────────────────────────────────────────────
// Each state file defines e.g. TREPP_FL, TREPP_VA, etc.
// We combine them here and score each deal at load time.
const ALL_TREPP_DEALS = [
  ...(typeof TREPP_FL !== "undefined" ? TREPP_FL : []),
  ...(typeof TREPP_VA !== "undefined" ? TREPP_VA : []),
  ...(typeof TREPP_TX !== "undefined" ? TREPP_TX : []),
  ...(typeof TREPP_IL !== "undefined" ? TREPP_IL : []),
  ...(typeof TREPP_GA !== "undefined" ? TREPP_GA : []),
].map(d => ({...d, score: scoreDeal(d)}))
 .sort((a,b) => b.score - a.score);

const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreDeal(d) {
  let s = 0;
  if (d.ss) s += 40;
  if (d.dscr !== null && d.dscr !== undefined) {
    if (d.dscr < 0.75) s += 40;
    else if (d.dscr < 1.0) s += 25;
  }
  if (d.wl) s += 20;
  if (d.bal >= 50e6) s += 15;
  else if (d.bal >= 10e6) s += 10;
  const mo = d.mat ? Math.round((new Date(d.mat) - Date.now()) / (1000*60*60*24*30.44)) : null;
  if (mo !== null) {
    if (mo <= 0) s += 25;
    else if (mo <= 6) s += 25;
    else if (mo <= 12) s += 18;
    else if (mo <= 18) s += 10;
  }
  return Math.min(s, 100);
}

// ── TOUCHPOINT STORAGE ────────────────────────────────────────────────────────
const TP_STORAGE_KEY = "bs_touchpoints_v1";
const TP_TYPES = [
  {id:"brokered",  label:"Brokered / Sold",         color:"#c9914a", icon:"🏷"},
  {id:"financed",  label:"Financed / Refi'd",        color:"#60a5fa", icon:"🏦"},
  {id:"developer", label:"Developer / Sponsor Work", color:"#22c55e", icon:"🏗"},
];
const ALL_CONTACTS = [
  "Rob Vernicek","Brian Sherlock",
  ...BS_NETWORK_CONTACTS.map(c=>c.name)
];

function loadTouchpoints() { try{const r=localStorage.getItem(TP_STORAGE_KEY);return r?JSON.parse(r):{};} catch{return{};} }
function saveTouchpoints(d) { try{localStorage.setItem(TP_STORAGE_KEY,JSON.stringify(d));}catch{} }

function useTouchpoints() {
  const [data,setData]=useState(()=>loadTouchpoints());
  const add=useCallback((contactName,tp)=>{
    setData(prev=>{
      const next={...prev,[contactName]:[...(prev[contactName]||[]),{...tp,id:Date.now()+"_"+Math.random().toString(36).slice(2),addedAt:Date.now()}]};
      saveTouchpoints(next); return next;
    });
  },[]);
  const remove=useCallback((contactName,tpId)=>{
    setData(prev=>{
      const next={...prev,[contactName]:(prev[contactName]||[]).filter(t=>t.id!==tpId)};
      saveTouchpoints(next); return next;
    });
  },[]);
  const getForContact=useCallback((n)=>data[n]||[],[data]);
  const totalCount=useMemo(()=>Object.values(data).reduce((s,arr)=>s+arr.length,0),[data]);
  return {data,add,remove,getForContact,totalCount};
}

// Build verified touchpoint context string to inject into AI prompt
function buildTouchpointContext(deal, tpData) {
  const tokens = [deal.n,deal.sponsor,deal.borrower,deal.owner,deal.addr]
    .filter(Boolean).join(" ").toLowerCase()
    .split(/[\s;,|]+/).filter(t=>t.length>3);
  const hits=[];
  for(const [contact,tps] of Object.entries(tpData)){
    for(const tp of tps){
      const hay=[tp.propertyName,tp.address,tp.sponsor,tp.notes].filter(Boolean).join(" ").toLowerCase();
      if(tokens.some(tok=>hay.includes(tok)))
        hits.push({contact,tp});
    }
  }
  if(!hits.length) return "";
  const lines=hits.map(({contact,tp})=>{
    const typeLabel=TP_TYPES.find(t=>t.id===tp.type)?.label||tp.type;
    return `- ${contact}: ${typeLabel} — "${tp.propertyName||"unnamed"}"${tp.address?" at "+tp.address:""}${tp.sponsor?", sponsor/developer: "+tp.sponsor:""}${tp.year?" ("+tp.year+")":""}${tp.notes?" — "+tp.notes:""}`;
  });
  return "\n\n=== BAKER STREET LOGGED TOUCHPOINTS (team-verified, treat as HOT) ===\n"+lines.join("\n");
}

function getBSNetworkContext(deal, tpData) {
  const contactBlocks = BS_NETWORK_CONTACTS.map(c=>
    `- ${c.name} | ${c.role} at ${c.firm} | Markets: ${c.markets}\n  ${c.notes}`
  ).join("\n\n");

  const tpCtx = tpData ? buildTouchpointContext(deal, tpData) : "";

  return [
    "=== BAKER STREET CAPITAL ADVISORS — FULL NETWORK ===",
    "",
    "ROB VERNICEK (Principal):",
    BS_PRINCIPALS.rob.background,
    "Iron Hound colleagues: "+BS_PRINCIPALS.rob.ironHoundColleagues.join("; "),
    "Networks: "+BS_PRINCIPALS.rob.networks.join("; "),
    "",
    "BRIAN SHERLOCK (Principal):",
    BS_PRINCIPALS.brian.background,
    "UBS CMBS colleagues: "+BS_PRINCIPALS.brian.ubsColleagues.join("; "),
    "UBS co-issuers: "+BS_PRINCIPALS.brian.ubsCoIssuers.join("; "),
    "Networks: "+BS_PRINCIPALS.brian.networks.join("; "),
    "",
    "YOUR 14 CONTACTS:",
    contactBlocks,
    "",
    "CONFIRMED BRIDGES (always check):",
    "1. Jeff Schaeffer (Alterra) ↔ Carl Fiebig (JLL): Verified — Jeff emailed Carl about Heinz Lofts Feb 2025. HOT if sponsor has any JLL/Alterra connection.",
    "2. Eric Ramirez (ACORE) ↔ Brian: Both in UBS/CMBS/IH Capital world. Direct peer overlap NYC structured finance.",
    "3. Matthew Stefanski + Zach Pierce (Berkadia) ↔ Rob: Iron Hound worked alongside Berkadia on Mid-Atlantic MF workouts.",
    "4. Derek Weissman (Procida) ↔ Rob: Procida DIP loans overlap directly with Iron Hound distressed world.",
    "5. Jason Mandel (RCCB Law): On both lender and borrower sides — may know this borrower's situation already.",
    tpCtx,
  ].filter(s=>s!==undefined).join("\n");
}

// ── NETWORK SIDE PANEL ────────────────────────────────────────────────────────
function NetworkView({tpData, initialContact, onContactChange}) {
  const touchpoints = tpData;
  const [selectedContact, setSelectedContact] = useState(initialContact||null);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({type:"brokered", propertyName:"", address:"", sponsor:"", year:"", notes:""});
  const [search, setSearch] = useState("");

  // Sync if parent deep-links to a contact
  useEffect(()=>{ if(initialContact) setSelectedContact(initialContact); },[initialContact]);

  const tps = selectedContact ? touchpoints.getForContact(selectedContact) : [];
  const totalForSelected = tps.length;

  const filteredContacts = ALL_CONTACTS.filter(n => {
    if(!search) return true;
    const q=search.toLowerCase();
    const c=BS_NETWORK_CONTACTS.find(x=>x.name===n);
    return n.toLowerCase().includes(q)||(c&&(c.firm.toLowerCase().includes(q)||(c.markets||"").toLowerCase().includes(q)||(c.notes||"").toLowerCase().includes(q)));
  });

  const handleAdd = () => {
    if(!form.propertyName.trim()) return;
    touchpoints.add(selectedContact, {...form});
    setForm({type:"brokered", propertyName:"", address:"", sponsor:"", year:"", notes:""});
    setAdding(false);
  };

  const selectContact = (name) => { setSelectedContact(name); setAdding(false); if(onContactChange) onContactChange(name); };

  const contactInfo = selectedContact ? BS_NETWORK_CONTACTS.find(c=>c.name===selectedContact) : null;
  const isBS = selectedContact==="Rob Vernicek"||selectedContact==="Brian Sherlock";

  return <div style={{display:"flex",flex:1,overflow:"hidden"}}>

    {/* Left — contact list */}
    <div style={{width:selectedContact?220:300,flexShrink:0,background:"#0c0c0c",borderRight:"1px solid #1a1612",display:"flex",flexDirection:"column",overflow:"hidden",transition:"width 0.15s ease"}}>
      <div style={{padding:"12px 14px",borderBottom:"1px solid #1a1612",flexShrink:0}}>
        <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.12em",marginBottom:6}}>NETWORK · {ALL_CONTACTS.length} CONTACTS · {touchpoints.totalCount} TOUCHPOINTS</div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, firm, market..." style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"6px 9px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {/* Baker Street principals first */}
        {["Rob Vernicek","Brian Sherlock"].map(name=>{
          const isSel=selectedContact===name;
          const count=touchpoints.getForContact(name).length;
          return <div key={name} onClick={()=>selectContact(name)}
            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #0e1015",borderLeft:"3px solid "+(isSel?"#c9914a":"transparent"),background:isSel?"rgba(201,145,74,0.06)":"rgba(201,145,74,0.02)"}}
            onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(201,145,74,0.04)";}}
            onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background="rgba(201,145,74,0.02)";}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:10,fontWeight:700,color:isSel?"#c9914a":"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                <div style={{fontSize:8,color:"#5a5048",marginTop:1}}>Baker Street Capital — Principal</div>
              </div>
              {count>0&&<span style={{fontSize:8,fontWeight:700,background:"rgba(201,145,74,0.15)",color:"#c9914a",borderRadius:3,padding:"1px 5px",flexShrink:0}}>{count}</span>}
            </div>
          </div>;
        })}
        {/* Divider */}
        <div style={{padding:"6px 14px",fontSize:7,color:"#1e1a14",letterSpacing:"0.12em",background:"#0a0a0a",borderBottom:"1px solid #0e1015",borderTop:"1px solid #0e1015"}}>YOUR CONTACTS</div>
        {/* All other contacts */}
        {filteredContacts.filter(n=>n!=="Rob Vernicek"&&n!=="Brian Sherlock").map(name=>{
          const count=touchpoints.getForContact(name).length;
          const isSel=selectedContact===name;
          const c=BS_NETWORK_CONTACTS.find(x=>x.name===name);
          return <div key={name} onClick={()=>selectContact(name)}
            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #0e1015",borderLeft:"3px solid "+(isSel?"#c9914a":"transparent"),background:isSel?"rgba(201,145,74,0.06)":"transparent"}}
            onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(255,255,255,0.02)";}}
            onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background="transparent";}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:10,fontWeight:isSel?700:500,color:isSel?"#c9914a":"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                {!selectedContact&&c&&<div style={{fontSize:8,color:"#3a3028",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.firm}</div>}
                {selectedContact&&c&&<div style={{fontSize:8,color:"#3a3028",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.firm.split(" ")[0]} · {c.role.split(",")[0]}</div>}
              </div>
              {count>0&&<span style={{fontSize:8,fontWeight:700,background:"rgba(201,145,74,0.15)",color:"#c9914a",borderRadius:3,padding:"1px 5px",flexShrink:0}}>{count}</span>}
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Right — contact profile */}
    <div style={{flex:1,overflowY:"auto",background:"#0a0a0a"}}>
      {!selectedContact&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#3a3028",gap:10}}>
        <div style={{fontSize:32}}>👥</div>
        <div style={{fontSize:12,letterSpacing:"0.14em",color:"#1e1a14"}}>SELECT A CONTACT</div>
        <div style={{fontSize:9,color:"#1a1612",textAlign:"center",lineHeight:1.8,maxWidth:240}}>Click any contact to view their profile, deal history, and log your own touchpoints</div>
      </div>}

      {selectedContact&&<div style={{padding:"20px 28px",maxWidth:900}}>

        {/* Contact header */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#f0ece6",marginBottom:3}}>{selectedContact}</div>
              {isBS&&<div style={{fontSize:10,color:"#c9914a"}}>Baker Street Capital Advisors — Principal</div>}
              {contactInfo&&<div style={{fontSize:10,color:"#c9914a",marginBottom:2}}>{contactInfo.role}</div>}
              {contactInfo&&<div style={{fontSize:10,color:"#5a5048"}}>{contactInfo.firm} · {contactInfo.markets}</div>}
            </div>
            <button onClick={()=>{setSelectedContact(null); if(onContactChange) onContactChange(null);}} style={{background:"none",border:"1px solid #1e1a14",borderRadius:5,color:"#5a5048",fontSize:13,cursor:"pointer",padding:"4px 10px",fontFamily:"inherit",flexShrink:0}}>× close</button>
          </div>
        </div>

        {/* Bio / background */}
        {(contactInfo?.notes || isBS) && <div style={{background:"#0e0e0e",border:"1px solid #1a1612",borderRadius:8,padding:"14px 18px",marginBottom:18}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.12em",marginBottom:8}}>BACKGROUND</div>
          <div style={{fontSize:11,color:"#9ca3af",lineHeight:1.8}}>
            {contactInfo?.notes || (selectedContact==="Rob Vernicek"?BS_PRINCIPALS.rob.background:BS_PRINCIPALS.brian.background)}
          </div>
        </div>}

        {/* Researched deal history */}
        {contactInfo?.dealHistory?.length>0&&<div style={{marginBottom:20}}>
          <div style={{fontSize:9,letterSpacing:"0.12em",color:"#c9914a",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            📚 KNOWN DEAL HISTORY <span style={{color:"#3a3028",fontWeight:400,fontSize:8}}>({contactInfo.dealHistory.length} deals researched)</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:8}}>
            {contactInfo.dealHistory.map((dh,i)=>(
              <div key={i} style={{background:"#0e0e0e",border:"1px solid #1a1612",borderRadius:7,padding:"11px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:5}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#c9b87a",flex:1,lineHeight:1.3}}>{dh.property}</div>
                  {dh.year&&<span style={{fontSize:9,color:"#3a3028",flexShrink:0}}>{dh.year}</span>}
                </div>
                {dh.address&&<div style={{fontSize:9,color:"#3a3028",marginBottom:5}}>📍 {dh.address}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:dh.notes?7:0}}>
                  {dh.type&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:"rgba(96,165,250,0.08)",color:"#60a5fa",border:"1px solid rgba(96,165,250,0.15)"}}>{dh.type}</span>}
                  {dh.role&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:"rgba(34,197,94,0.08)",color:"#22c55e",border:"1px solid rgba(34,197,94,0.15)"}}>{dh.role}</span>}
                  {dh.units&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:"rgba(168,85,247,0.08)",color:"#a855f7",border:"1px solid rgba(168,85,247,0.15)"}}>{dh.units} units</span>}
                  {dh.amount&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:"rgba(201,145,74,0.1)",color:"#c9914a",border:"1px solid rgba(201,145,74,0.2)"}}>${(dh.amount/1e6).toFixed(1)}M</span>}
                  {dh.lender&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:3,background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.15)"}}>Lender: {dh.lender}</span>}
                </div>
                {(dh.seller||dh.buyer)&&<div style={{display:"flex",gap:16,marginBottom:dh.notes?5:0}}>
                  {dh.seller&&<div><span style={{fontSize:7,color:"#3a3028"}}>SELLER </span><span style={{fontSize:9,color:"#7a6a58"}}>{dh.seller}</span></div>}
                  {dh.buyer&&<div><span style={{fontSize:7,color:"#3a3028"}}>BUYER </span><span style={{fontSize:9,color:"#7a6a58"}}>{dh.buyer}</span></div>}
                </div>}
                {dh.developer&&<div style={{fontSize:9,color:"#7a6a58",marginBottom:dh.notes?5:0}}><span style={{fontSize:7,color:"#3a3028"}}>DEVELOPER </span>{dh.developer}</div>}
                {dh.notes&&<div style={{fontSize:9,color:"#5a5048",lineHeight:1.6,paddingTop:6,borderTop:"1px solid #121212"}}>{dh.notes}</div>}
              </div>
            ))}
          </div>
        </div>}

        {/* Logged touchpoints */}
        <div style={{marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:9,letterSpacing:"0.12em",color:"#5a5048"}}>YOUR LOGGED TOUCHPOINTS · {totalForSelected}</div>
          <button onClick={()=>setAdding(!adding)} style={{padding:"5px 12px",background:adding?"rgba(239,68,68,0.08)":"rgba(201,145,74,0.08)",border:"1px solid "+(adding?"#ef444430":"#c9914a30"),borderRadius:4,color:adding?"#ef4444":"#c9914a",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            {adding?"✕ Cancel":"+ Log Touchpoint"}
          </button>
        </div>

        {adding&&<div style={{background:"#0e0e0e",border:"1px solid #c9914a20",borderRadius:8,padding:"14px 18px",marginBottom:14}}>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {TP_TYPES.map(t=>(
              <button key={t.id} onClick={()=>setForm(f=>({...f,type:t.id}))}
                style={{flex:1,padding:"8px 6px",borderRadius:5,border:"1px solid",borderColor:form.type===t.id?t.color:"#1e1a14",background:form.type===t.id?t.color+"18":"transparent",color:form.type===t.id?t.color:"#5a5048",fontSize:10,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            {[["propertyName","Property Name *","e.g. Society Orlando"],["address","Address","e.g. 434 N Orange Ave, Orlando FL"],["sponsor","Sponsor / Developer","e.g. Ryan Shear (PMG)"],["year","Year","e.g. 2022"]].map(([field,label,ph])=>(
              <div key={field}>
                <div style={{fontSize:8,color:"#5a5048",marginBottom:3}}>{label}</div>
                <input value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))} placeholder={ph}
                  style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"7px 9px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
              </div>
            ))}
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:8,color:"#5a5048",marginBottom:3}}>Notes</div>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. Represented seller, $78M trade — buyer was XYZ Capital"
              style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"7px 9px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
          </div>
          <button onClick={handleAdd} disabled={!form.propertyName.trim()}
            style={{padding:"10px 24px",background:form.propertyName.trim()?"linear-gradient(135deg,#7a4820,#c9914a)":"#141414",border:"none",borderRadius:5,color:form.propertyName.trim()?"#0c0c0c":"#3a3028",fontSize:11,fontWeight:800,cursor:form.propertyName.trim()?"pointer":"default",fontFamily:"inherit"}}>
            SAVE TOUCHPOINT
          </button>
        </div>}

        {tps.length===0&&!adding&&<div style={{background:"#0e0e0e",border:"1px solid #1a1612",borderRadius:7,padding:"24px",textAlign:"center",marginTop:8}}>

// ── TREPP PARSER ─────────────────────────────────────────────────────────────
function parseTreppXLSX(buffer) {
  const wb = XLSX.read(buffer, {type:"array", cellDates:false});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let headerIdx = -1;
  for (let i = 0; i < Math.min(raw.length,12); i++) {
    const row = raw[i];
    if (row && row.some(c=>String(c||"").includes("Property Name")) && row.some(c=>String(c||"").includes("Current Balance"))) { headerIdx=i; break; }
  }
  if (headerIdx < 0) throw new Error("Could not find header row. Make sure this is a Trepp Market Loan Listing export.");
  const headers = raw[headerIdx].map(h=>String(h||"").trim());
  const dataRows = raw.slice(headerIdx+1);
  function col(row,...names) { for (const name of names) { const idx=headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase())); if (idx>=0&&row[idx]!=null) return row[idx]; } return null; }
  function cleanNum(v) { if (!v&&v!==0) return null; const n=parseFloat(String(v).replace(/,/g,"")); return isNaN(n)?null:n; }
  function cleanDate(v) {
    if (!v) return null;
    const s=String(v).trim();
    if (/^\d{5}$/.test(s)) { const d=XLSX.SSF.parse_date_code(parseInt(s)); return d.y+"-"+String(d.m).padStart(2,"0")+"-"+String(d.d).padStart(2,"0"); }
    const parts=s.split("/");
    if (parts.length===3&&parts[2].length===4) return parts[2]+"-"+parts[0].padStart(2,"0")+"-"+parts[1].padStart(2,"0");
    return s;
  }
  const deals=[], seen=new Set();
  for (const row of dataRows) {
    if (!row||!row.some(Boolean)) continue;
    const name=String(col(row,"Property Name")||"").trim();
    if (!name||name.length<2) continue;
    const bal=cleanNum(col(row,"Current Balance")); if (!bal||bal<1) continue;
    const key=name.toLowerCase()+"|"+(String(col(row,"Address")||"").toLowerCase());
    if (seen.has(key)) continue; seen.add(key);
    const d={
      n:name,
      src:String(col(row,"Source")||"").trim(),
      addr:String(col(row,"Address")||"").trim(),
      city:String(col(row,"City")||"").trim(),
      state:String(col(row,"State")||"").trim(),
      zip:String(col(row,"Zip","Zip Code")||"").trim(),
      type:String(col(row,"Property Type")||"").trim(),
      bal,
      origBal:cleanNum(col(row,"Original Balance","Original Loan Balance","Orig Balance")),
      mat:cleanDate(col(row,"Maturity Date")),
      origMat:cleanDate(col(row,"Original Maturity","Original Maturity Date")),
      intRate:cleanNum(col(row,"Interest Rate","Note Rate","Coupon")),
      intType:String(col(row,"Interest Rate Type","Rate Type")||"").trim(),
      amort:String(col(row,"Amortization","Amortization Type")||"").trim(),
      term:cleanNum(col(row,"Loan Term","Term")),
      units:cleanNum(col(row,"Number of Units","Units","Beds","Number of Beds")),
      sqft:cleanNum(col(row,"Square Feet","GLA","SF","Sq Ft")),
      occup:cleanNum(col(row,"Occupancy","Physical Occupancy","Most Recent Occupancy")),
      noi:cleanNum(col(row,"Most Recent NOI","NOI","Net Operating Income")),
      rev:cleanNum(col(row,"Most Recent Revenue","Revenue","Gross Revenue")),
      appVal:cleanNum(col(row,"Appraised Value","Appraisal Value","Most Recent Value")),
      appDate:cleanDate(col(row,"Appraisal Date","Most Recent Appraisal Date")),
      ltv:cleanNum(col(row,"LTV","Loan to Value","Current LTV")),
      dscr:cleanNum(col(row,"Most Recent DSCR","DSCR","NCF DSCR")),
      dscrDate:cleanDate(col(row,"DSCR Date","Most Recent DSCR Date")),
      ss:String(col(row,"Spec Serv Status","Special Servicer Status")||"").toLowerCase()==="yes",
      ssDate:cleanDate(col(row,"Special Servicer Transfer Date","SS Transfer Date")),
      wl:String(col(row,"Watchlist Status")||"").toLowerCase()==="yes",
      wlReason:String(col(row,"Watchlist Reason")||"").trim(),
      svc:String(col(row,"Special Servicer")||"").trim(),
      masterSvc:String(col(row,"Master Servicer")||"").trim(),
      orig:String(col(row,"Originator")||"").trim(),
      pool:String(col(row,"Pool Name","Deal Name","CMBS Deal")||"").trim(),
      cusip:String(col(row,"CUSIP")||"").trim(),
      owner:String(col(row,"Owner 1 Name","Owner")||"").trim(),
      sponsor:String(col(row,"Sponsor")||"").trim(),
      borrower:String(col(row,"Original Borrower Name","Borrower")||"").trim(),
      modFlag:String(col(row,"Modification Flag","Modified","Loan Modification")||"").trim(),
      extFlag:String(col(row,"Extension Flag","Extended","Extension Option")||"").trim(),
      defFlag:String(col(row,"Delinquency Status","Delinquent","Delinquency")||"").trim(),
    };
    d.score=scoreDeal(d); deals.push(d);
  }
  return deals.sort((a,b)=>b.score-a.score);
}

function fmtBal(n) { if (!n) return "—"; if (n>=1e9) return "$"+(n/1e9).toFixed(1)+"B"; if (n>=1e6) return "$"+(n/1e6).toFixed(1)+"M"; return "$"+n.toLocaleString(); }
function fmtMat(s) { if (!s) return "—"; return new Date(s).toLocaleDateString("en-US",{month:"short",year:"numeric"}); }
function moOut(s)  { if (!s) return null; return Math.round((new Date(s)-Date.now())/(1000*60*60*24*30.44)); }
function shortSponsor(d) { const r=d.sponsor||d.borrower||d.owner||""; if (!r) return "—"; return r.split(";")[0].trim().split(",")[0].trim().slice(0,36); }
function daysSince(ts) { if (!ts) return null; return Math.floor((Date.now()-ts)/(1000*60*60*24)); }

async function callClaude(prompt, maxTokens=1500) {
  const apiKey=getStoredKey();
  if (!apiKey||apiKey.length<20) throw new Error("__NO_KEY__");
  let res;
  try {
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
    });
  } catch(networkErr) {
    throw new Error("Network error — check your internet connection.\n\nDetail: "+networkErr.message);
  }
  if (!res.ok) {
    let msg="API error "+res.status;
    try { const t=await res.text(); const j=JSON.parse(t); msg=j.error&&j.error.message?j.error.message:"HTTP "+res.status+": "+t.slice(0,100); } catch {}
    if (res.status===401) throw new Error("__INVALID_KEY__: Invalid API key. Check your key at console.anthropic.com/keys");
    if (res.status===429) throw new Error("Rate limit hit — wait 30 seconds and retry.");
    throw new Error(msg);
  }
  const data=await res.json();
  if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  const text=(data.content&&data.content[0]&&data.content[0].text)||"";
  if (!text) throw new Error("Empty response from API — retry.");
  return text;
}

  const dm=cachedIntel&&cachedIntel.people&&cachedIntel.people.find(p=>p.priority);
  const firstName=dm?dm.name.split(" ")[0]:"there";
  const firmName=cachedIntel?cachedIntel.firm:(deal.sponsor||deal.borrower||deal.n).split(";")[0].trim();
  const connPath=cachedIntel&&cachedIntel.connections&&cachedIntel.connections[0];
  const senderNote=connPath
    ?"SENDER: "+(connPath.via==="Rob"?"Rob Vernicek (Iron Hound ~10yr, $10B+ workouts, OneFive Capital multifamily operator)":"connPath.via"==="Brian"?"Brian Sherlock (UBS CMBS Director, Iron Hound)":"Baker Street Capital Advisors")+". Warm connection: "+connPath.explanation+" Use this opener: "+connPath.suggestedOpener
    :"SENDER: Brian Sherlock, Principal — Baker Street Capital Advisors. $10B+ closed, Iron Hound Management and UBS Real Estate Finance background.";
  const toneMap={blunt:"Blunt and direct. Zero wind-up. First sentence is the point.",peer:"Collegial peer. Calm confidence. Not selling — acknowledging.",quiet:"Quietly confident. Shows specific knowledge without broadcasting it."};
  const lenMap={ultra:"3 sentences maximum. Nothing else.",short:"2 paragraphs. Under 100 words.",medium:"3 paragraphs. Under 160 words."};
  const neverDo="Never mention term sheets or LOIs. Never use: solutions, partnership, synergy, reach out, touch base, value-add. Never reference DSCR number directly. Never open with pleasantries. Never use exclamation points. Goal: ONE thing — get a 15-minute call.";
  const prompt=["You are writing a CRE debt restructuring outreach email for Baker Street Capital Advisors.",
    senderNote,getBSNetworkContext(),"",
    "RECIPIENT: "+firstName+", "+(dm?dm.title:"Principal")+" at "+firmName,
    dm&&dm.background?"RECIPIENT BACKGROUND: "+dm.background:"",
    dm&&dm.outreachAngle?"OUTREACH ANGLE: "+dm.outreachAngle:"",
    cachedIntel&&cachedIntel.recentIntel&&cachedIntel.recentIntel!=="No public intel found"?"INTEL: "+cachedIntel.recentIntel:"","",
    "PROPERTY: "+deal.n+" — "+deal.type+" at "+deal.addr+", "+deal.city,
    "LOAN: "+fmtBal(deal.bal)+" | "+deal.src,
    "MATURITY: "+fmtMat(deal.mat)+(mo!==null?" — "+(mo<=0?"PAST MATURITY":mo+" months remaining"):""),
    deal.ss?"SERVICER STATUS: Special servicer active ("+deal.svc+"). "+(svc?svc.approach+" Timeline: "+svc.timeline:""):(deal.svc?"SERVICER: "+deal.svc:""),
    deal.wl?"WATCHLIST: Yes":"","",
    "TONE: "+(toneMap[tone]||toneMap.peer),
    "LENGTH: "+(lenMap[length]||lenMap.short),"",
    "RULES: "+neverDo,"",
    "Write a subject line specific to this deal — reads like an internal memo, not marketing.",
    'Respond ONLY with valid JSON, no markdown: {"subject":"...","body":"..."}',
  ].filter(Boolean).join("\n");
  const raw=await callClaude(prompt,1000);
  const clean=raw.trim().replace(/^```json\s*/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  let parsed;
  try { parsed=JSON.parse(clean); } catch {
    const m=clean.match(/\{[\s\S]*\}/);
    if (m) { try { parsed=JSON.parse(m[0]); } catch { throw new Error("Parse failed: "+clean.slice(0,100)); } }
    else throw new Error("No JSON: "+clean.slice(0,100));
  }
  if (!parsed.subject||!parsed.body) throw new Error("Missing subject or body");
  return parsed;
}

// ── INTEL PANEL ───────────────────────────────────────────────────────────────
function ResearchPanel({deal, tpData, onGoToContact}) {
  const cached=loadResearch(deal);
  const cachedF=loadForensics(deal);
  const [state,setState]=useState(cached?"done":"idle");
  const [fState,setFState]=useState(cachedF?"done":"idle");
  const [data,setData]=useState(cached);
  const [forensics,setForensics]=useState(cachedF);
  const [err,setErr]=useState("");
  const [fErr,setFErr]=useState("");
  const [showKey,setShowKey]=useState(false);
  const [expandPerson,setExpandPerson]=useState("all");
  const [histFilter,setHistFilter]=useState("all");
  const dealId=deal.n+deal.addr;
  const prevId=useRef(null);

  const run=useCallback(async(force=false)=>{
    if(!force){ const c=loadResearch(deal); if(c){setData(c);setState("done");return;} }
    setState("loading"); setErr(""); setData(null);
    try {
      const r=await fetchDealResearch(deal, tpData);
      saveResearch(deal,r); setData(r); setState("done");
    } catch(e) {
      const msg=e.message||String(e);
      if(msg.startsWith("__NO_KEY__")||msg.startsWith("__INVALID_KEY__")){ setShowKey(true); setState("idle"); }
      else { setErr(msg); setState("error"); }
    }
  },[deal, tpData]);

  const runForensics=useCallback(async()=>{
    const c=loadForensics(deal); if(c){setForensics(c);setFState("done");return;}
    setFState("loading"); setFErr("");
    try {
      const r=await fetchDealForensics(deal, tpData);
      saveForensics(deal,r); setForensics(r); setFState("done");
    } catch(e) {
      const msg=e.message||String(e);
      if(msg.startsWith("__NO_KEY__")||msg.startsWith("__INVALID_KEY__")){ setShowKey(true); setFState("idle"); }
      else { setFErr(msg); setFState("error"); }
    }
  },[deal, tpData]);

  // Auto-fire Stage 1 when deal changes
  useEffect(()=>{
    if(prevId.current===dealId) return;
    prevId.current=dealId;
    setExpandPerson("all"); setHistFilter("all"); setErr(""); setFErr("");
    // Restore from cache for new deal
    const c=loadResearch(deal);
    const cf=loadForensics(deal);
    setData(c||null);
    setState(c?"done":"idle");
    setForensics(cf||null);
    setFState(cf?"done":"idle");
  },[dealId]);

  if(showKey) return <KeyEntryScreen onSave={()=>{setShowKey(false);}} onBack={()=>setShowKey(false)}/>;

  if(state==="idle") return <div style={{paddingTop:8}}>
    <div style={{fontSize:13,fontWeight:700,color:"#f0ece6",marginBottom:4}}>{deal.n}</div>
    <div style={{fontSize:10,color:"#5a5048",marginBottom:20}}>{(deal.sponsor||deal.borrower||"").split(";")[0].trim()}</div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <button onClick={()=>{ if(!getStoredKey()){setShowKey(true);return;} run(false); }} style={{padding:"14px 16px",background:"rgba(34,197,94,0.07)",border:"1px solid #22c55e30",borderRadius:7,color:"#22c55e",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
        Research this sponsor
        <div style={{fontSize:9,fontWeight:400,color:"#22c55e90",marginTop:3}}>Who are the decision makers, their background, what deals have they done</div>
      </button>
      <button onClick={()=>{ if(!getStoredKey()){setShowKey(true);return;} runForensics(); }} style={{padding:"14px 16px",background:"rgba(96,165,250,0.07)",border:"1px solid #60a5fa30",borderRadius:7,color:"#60a5fa",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
        Loan forensics
        <div style={{fontSize:9,fontWeight:400,color:"#60a5fa90",marginTop:3}}>Why is this loan in distress, history, what the servicer knows</div>
      </button>
    </div>
    {!getStoredKey()&&<div style={{marginTop:16,fontSize:9,color:"#3a3028",textAlign:"center"}}>
      <button onClick={()=>setShowKey(true)} style={{background:"transparent",border:"none",color:"#5a5048",fontSize:9,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>Set API key to enable research</button>
    </div>}
  </div>;

  if(state==="loading") return <div style={{padding:"60px 0",textAlign:"center"}}>
    <div style={{fontSize:36,color:"#22c55e",marginBottom:16,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</div>
    <div style={{fontSize:11,color:"#22c55e",letterSpacing:"0.2em",marginBottom:8}}>RESEARCHING SPONSOR</div>
    <div style={{fontSize:11,fontWeight:600,color:"#f0ece6",marginBottom:4}}>{deal.n}</div>
    <div style={{fontSize:9,color:"#3a3028",marginTop:4}}>Identifying principals · contact info · network connections</div>
  </div>;

  if(state==="error") return <div style={{padding:"20px 0"}}>
    <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid #ef444430",borderRadius:8,padding:14,marginBottom:12}}>
      <div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:6}}>Research failed</div>
      <div style={{fontSize:10,color:"#fca5a5",fontFamily:"monospace",lineHeight:1.6,wordBreak:"break-all"}}>{err}</div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={()=>run(false)} style={{flex:1,padding:11,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e30",borderRadius:5,color:"#22c55e",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↺ Retry</button>
      <button onClick={()=>setShowKey(true)} style={{padding:"11px 14px",background:"transparent",border:"1px solid #1e1a14",borderRadius:5,color:"#5a5048",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>⚙ Key</button>
    </div>
  </div>;

  if(!data) return null;
  const d=data;
  const bsNames=["Rob Vernicek","Brian Sherlock",...BS_NETWORK_CONTACTS.map(c=>c.name)];
  const bsFirms=["Baker Street","Iron Hound","OneFive","ACORE","Procida","Berkadia","JLL","Newmark","Cushman","Alterra","RCCB","Zitelman","Vantage","Mansfield","SC Capital",...BS_NETWORK_CONTACTS.map(c=>c.firm)];
  const isMatch=(row)=>{
    if(!row) return false;
    const haystack=[row.broker,row.lender,row.seller,row.buyer,row.notes,...(row.networkMatch||[])].filter(Boolean).join(" ").toLowerCase();
    return bsNames.some(n=>haystack.includes(n.toLowerCase()))||bsFirms.some(f=>f.length>3&&haystack.includes(f.toLowerCase()));
  };
  const histDeals=forensics?.deals||[];
  const matchCount=histDeals.filter(isMatch).length;
  const filteredDeals=histDeals.filter(row=>{
    if(histFilter==="matched") return isMatch(row);
    if(histFilter==="sale") return (row.transactionType||"").toLowerCase().includes("sale")||(row.transactionType||"").toLowerCase().includes("acqui");
    if(histFilter==="financing") return (row.transactionType||"").toLowerCase().includes("financ")||(row.transactionType||"").toLowerCase().includes("loan")||(row.transactionType||"").toLowerCase().includes("refi");
    return true;
  });
  const conf={confirmed:{label:"✓",color:"#22c55e"},probable:{label:"~",color:"#eab308"},speculative:{label:"?",color:"#5a5048"}};
  const SMETA={hot:{icon:"🔥",label:"HOT",color:"#ef4444",bg:"rgba(239,68,68,0.07)"},warm:{icon:"🤝",label:"WARM",color:"#f97316",bg:"rgba(249,115,22,0.07)"},cold:{icon:"📧",label:"COLD",color:"#7a6a58",bg:"rgba(107,114,128,0.07)"}};

  return <div style={{padding:"4px 0"}}>
    {/* Sponsor firm card */}
    <div style={{background:"#0a1520",border:"1px solid #1e3a5f40",borderRadius:8,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div><div style={{fontSize:15,fontWeight:700,color:"#f0ece6",marginBottom:2}}>{d.firm||"Unknown Firm"}</div>{d.hq&&<div style={{fontSize:10,color:"#5a5048"}}>{d.hq}{d.founded&&d.founded!=="Unknown"?" · Est. "+d.founded:""}</div>}</div>
        <button onClick={()=>run(true)} title="Re-run Stage 1" style={{background:"transparent",border:"1px solid #1e1a14",borderRadius:4,color:"#3a3028",fontSize:9,cursor:"pointer",padding:"3px 7px",fontFamily:"inherit"}}>↻</button>
      </div>
      <div style={{fontSize:11,color:"#9ca3af",lineHeight:1.7,marginBottom:10}}>{d.firmBackground}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",marginBottom:10}}>
        {[["PORTFOLIO",d.portfolioSize],["ASSET CLASSES",d.assetClasses],["MARKETS",d.geographicFocus],["EQUITY PARTNERS",d.equityPartners],["LENDERS USED",d.lendersUsed]].map(([label,val])=>val&&val!=="Unknown"&&val!=="unknown"?<div key={label}><div style={{fontSize:8,color:"#3a3028",marginBottom:1}}>{label}</div><div style={{fontSize:10,color:"#9ca3af",lineHeight:1.5}}>{val}</div></div>:null)}
      </div>
      {d.notableDeals&&d.notableDeals!=="Unknown"&&<div style={{background:"rgba(96,165,250,0.04)",border:"1px solid #60a5fa15",borderRadius:5,padding:"8px 10px",marginBottom:8}}><div style={{fontSize:8,color:"#60a5fa",marginBottom:3}}>NOTABLE DEALS</div><div style={{fontSize:11,color:"#9ca3af",lineHeight:1.6}}>{d.notableDeals}</div></div>}
      {d.distressContext&&<div style={{background:"rgba(249,115,22,0.06)",border:"1px solid #f9731620",borderRadius:5,padding:"8px 10px",marginBottom:6}}><span style={{fontSize:9,color:"#f97316",marginRight:8}}>DISTRESS</span><span style={{fontSize:11,color:"#c4bfb5"}}>{d.distressContext}</span></div>}
      {d.recentIntel&&d.recentIntel!=="No public intel found"&&d.recentIntel!=="none found"&&<div style={{background:"rgba(234,179,8,0.06)",border:"1px solid #eab30820",borderRadius:5,padding:"8px 10px"}}><span style={{fontSize:9,color:"#eab308",marginRight:8}}>INTEL</span><span style={{fontSize:11,color:"#c4bfb5"}}>{d.recentIntel}</span></div>}
    </div>

    {/* ── STAGE 2 TRIGGER — prominent, right after firm card ── */}
    {fState==="idle"&&<button onClick={runForensics}
      style={{width:"100%",padding:"13px 0",marginBottom:14,background:"linear-gradient(135deg,#0d1a14,#0f2a1e)",border:"1px solid #22c55e35",borderRadius:8,color:"#22c55e",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10,letterSpacing:"0.06em"}}>

      <span>PULL DEAL HISTORY</span>

    </button>}
    {fState==="loading"&&<div style={{width:"100%",padding:"13px 0",marginBottom:14,background:"rgba(34,197,94,0.04)",border:"1px solid #22c55e25",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
      <span style={{fontSize:16,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>
      <span style={{fontSize:11,color:"#22c55e",letterSpacing:"0.1em"}}>DIGGING DEAL HISTORY</span>
      <span style={{fontSize:9,color:"#22c55e60"}}>LLC forensics · deed records · broker/lender matching</span>
    </div>}
    {fState==="error"&&<div style={{marginBottom:14,background:"rgba(239,68,68,0.06)",border:"1px solid #ef444425",borderRadius:8,padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>Deal history search failed</span>
        <button onClick={runForensics} style={{padding:"3px 10px",background:"rgba(239,68,68,0.1)",border:"1px solid #ef444430",borderRadius:4,color:"#ef4444",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>↺ Retry</button>
      </div>
      <div style={{fontSize:9,color:"#fca5a5",fontFamily:"monospace",lineHeight:1.5,wordBreak:"break-all"}}>{fErr}</div>
    </div>}

    {/* Decision makers */}
    {d.people&&d.people.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:9,letterSpacing:"0.13em",color:"#5a5048",marginBottom:8}}>DECISION MAKERS</div>
      {d.people.map((p,i)=>{
        const isOpen=expandPerson==="all"||expandPerson===i;
        return <div key={i} onClick={()=>setExpandPerson(isOpen&&expandPerson!=="all"?null:isOpen?i:i)}
          style={{background:p.priority?"#091610":"#0e0e0e",border:"1px solid "+(p.priority?"#22c55e30":"#1e1a14"),borderRadius:7,padding:"11px 14px",marginBottom:8,cursor:"pointer"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=p.priority?"#22c55e60":"#3a3028"}
          onMouseLeave={e=>e.currentTarget.style.borderColor=p.priority?"#22c55e30":"#1e1a14"}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                {p.priority&&<span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>}
                <span style={{fontSize:13,fontWeight:700,color:"#f0ece6"}}>{p.name}</span>
                {p.tier===1&&<span style={{fontSize:8,color:"#22c55e",background:"rgba(34,197,94,0.08)",padding:"1px 6px",borderRadius:3,border:"1px solid #22c55e20"}}>PRIMARY DM</span>}
                {p.tier===2&&<span style={{fontSize:8,color:"#60a5fa",background:"rgba(96,165,250,0.08)",padding:"1px 6px",borderRadius:3,border:"1px solid #60a5fa20"}}>2ND DEGREE</span>}
              </div>
              <div style={{fontSize:10,color:"#5a5048"}}>{p.title}</div>
            </div>
            <span style={{fontSize:10,color:"#3a3028",marginLeft:8}}>{isOpen?"▲":"▼"}</span>
          </div>
          {isOpen&&<div style={{marginTop:10,borderTop:"1px solid #141414",paddingTop:10}}>
            {p.background&&<div style={{fontSize:11,color:"#9ca3af",lineHeight:1.7,marginBottom:8}}>{p.background}</div>}
            {p.workHistory&&p.workHistory.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:8,color:"#3a3028",marginBottom:4,letterSpacing:"0.1em"}}>CAREER</div>
              {p.workHistory.map((w,j)=><div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                <div><span style={{fontSize:10,fontWeight:600,color:"#c4bfb5"}}>{w.role}</span><span style={{fontSize:9,color:"#5a5048"}}> · {w.firm}</span></div>
                <span style={{fontSize:9,color:"#3a3028",marginLeft:8,flexShrink:0}}>{w.years}</span>

            {p.education&&p.education.length>0&&p.education[0].school&&p.education[0].school!=="Unknown"&&<div style={{marginBottom:8}}>

              {p.education.map((e,j)=><div key={j} style={{fontSize:10,color:"#7a6a58",marginBottom:2}}>{e.school}{e.degree&&e.degree!=="Unknown"?" — "+e.degree:""}</div>)}
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              {p.email&&p.email!=="Unknown"&&<div><div style={{fontSize:7,color:"#3a3028",marginBottom:1}}>EMAIL</div><div style={{fontSize:10,color:"#60a5fa",wordBreak:"break-all"}}>{p.email}</div></div>}
              {p.phone&&p.phone!=="Unknown"&&<div><div style={{fontSize:7,color:"#3a3028",marginBottom:1}}>PHONE</div><div style={{fontSize:10,color:"#c4bfb5"}}>{p.phone}</div></div>}
              {p.linkedin&&p.linkedin!=="Unknown"&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:7,color:"#3a3028",marginBottom:1}}>LINKEDIN</div><div style={{fontSize:9,color:"#60a5fa",wordBreak:"break-all"}}>{p.linkedin}</div></div>}
            </div>
            {p.whyTheyMatter&&<div style={{background:"rgba(34,197,94,0.05)",border:"1px solid #22c55e20",borderRadius:4,padding:"6px 9px",marginBottom:6}}><div style={{fontSize:8,color:"#22c55e",marginBottom:2}}>WHY THEY MATTER</div><div style={{fontSize:10,color:"#c4bfb5",lineHeight:1.5}}>{p.whyTheyMatter}</div></div>}
            {p.outreachAngle&&<div style={{background:"rgba(234,179,8,0.05)",border:"1px solid #eab30820",borderRadius:4,padding:"6px 9px"}}><div style={{fontSize:8,color:"#eab308",marginBottom:2}}>OUTREACH ANGLE</div><div style={{fontSize:10,color:"#c4bfb5",lineHeight:1.5}}>{p.outreachAngle}</div></div>}
          </div>}
        </div>;

    </div>}

    {/* Connections */}
    {d.connections&&d.connections.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:9,letterSpacing:"0.13em",color:"#5a5048",marginBottom:8}}>NETWORK CONNECTIONS</div>

        const viaName=c.via==="Rob"?"Rob Vernicek":c.via==="Brian"?"Brian Sherlock":bsContact?.name||null;

            <span style={{fontSize:11,fontWeight:600,color:"#f0ece6"}}>{c.person}</span>
            {viaName&&onGoToContact

          {c.suggestedOpener&&<div style={{background:"rgba(201,145,74,0.06)",border:"1px solid #c9914a20",borderRadius:4,padding:"6px 9px"}}>
            <div style={{fontSize:8,color:"#c9914a",marginBottom:2}}>SUGGESTED OPENER</div>
            <div style={{fontSize:10,color:"#f0ece6",lineHeight:1.5,fontStyle:"italic"}}>{c.suggestedOpener}</div>
          </div>}
        </div>;
      })}
    </div>}

    {/* Stage 2 deal history results */}
    {fState==="done"&&forensics&&histDeals.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:9,letterSpacing:"0.13em",color:"#5a5048",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>DEAL HISTORY FORENSICS</span>

        <div style={{fontSize:8,color:"#f97316",marginBottom:3}}>FORENSIC FINDINGS</div>

      </div>}
      <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
        {[["all","All ("+histDeals.length+")"],["matched","Network ("+matchCount+")"],["sale","Sales"],["financing","Financings"]].map(([v,l])=>(

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filteredDeals.map((row,i)=>{

          return <div key={i} style={{background:match?"rgba(201,145,74,0.05)":"#0e0e0e",border:"1px solid "+(match?"#c9914a30":"#141414"),borderRadius:6,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                  {match&&<span style={{fontSize:8,fontWeight:700,background:"rgba(201,145,74,0.2)",color:"#c9914a",borderRadius:3,padding:"1px 6px",border:"1px solid #c9914a30",flexShrink:0}}>⚡ NETWORK MATCH</span>}
                  <span style={{fontSize:9,color:c.color,fontWeight:700,flexShrink:0}}>{c.label}</span>
                  <span style={{fontSize:11,fontWeight:600,color:"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.propertyName||"Unknown Property"}</span>

// Keep old IntelPanel as alias
function IntelPanel({deal, tpData, onGoToContact}) { return <ResearchPanel deal={deal} tpData={tpData} onGoToContact={onGoToContact}/>; }
function EmailPanel({deal,tracking}) {
  const [state,setState]=useState("idle");
  const [tone,setTone]=useState("peer");
  const [length,setLength]=useState("short");
  const [email,setEmail]=useState(null);
  const [err,setErr]=useState("");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [editing,setEditing]=useState(false);
  const [copied,setCopied]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const [keyInput,setKeyInput]=useState("");
  const dealId=deal.n+deal.addr;
  const prevId=useRef(dealId);
  useEffect(()=>{ if(prevId.current!==dealId){ setState("idle");setEmail(null);setErr("");setEditing(false);setCopied(false); prevId.current=dealId; } },[dealId]);

  const generate=useCallback(async()=>{
    setState("loading");setEmail(null);setErr("");setEditing(false);setCopied(false);
    try { const r=await draftEmail(deal,tone,length); setEmail(r);setSubject(r.subject);setBody(r.body);setState("done"); }
    catch(e) { const msg=e.message||String(e); if(msg.startsWith("__NO_KEY__")||msg.startsWith("__INVALID_KEY__")){setShowKey(true);setState("idle");}else{setErr(msg);setState("error");} }
  },[deal,tone,length]);

  const openOutlook=useCallback(()=>{
    const sub=editing?subject:(email?email.subject:"");
    const bod=editing?body:(email?email.body:"");
    const cachedIntel=loadResearch(deal);
    const dm=cachedIntel&&cachedIntel.people&&cachedIntel.people.find(p=>p.priority);
    const toEmail=dm&&dm.email&&!dm.email.startsWith("Unknown")&&dm.email.includes("@")?dm.email:"";
    window.open("mailto:"+encodeURIComponent(toEmail)+"?subject="+encodeURIComponent(sub)+"&body="+encodeURIComponent(bod),"_blank");
    if(tracking&&dm) tracking.logEmail(deal,dm.name);
  },[editing,subject,body,email,deal,tracking]);

  if(showKey||(!getStoredKey()&&state==="idle")) return <KeyEntryScreen onSave={()=>setShowKey(false)} onBack={getStoredKey()?()=>setShowKey(false):null}/>;

  if(state==="idle") return <div style={{padding:"20px 0"}}>
    <div style={{background:"linear-gradient(135deg,#0a1a0a,#0d1f0d)",border:"1px solid #22c55e20",borderRadius:10,padding:20,marginBottom:16}}>
      <div style={{fontSize:11,color:"#22c55e",letterSpacing:"0.12em",marginBottom:8}}>AI-POWERED OUTREACH</div>
      <div style={{fontSize:12,color:"#9ca3af",lineHeight:1.7}}>Generates a personalized email using deal data, servicer intel, and your network connections. Run INTEL first for best results.</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <div><div style={{fontSize:9,color:"#5a5048",marginBottom:5}}>TONE</div>
        {[["blunt","Blunt & direct"],["peer","Collegial peer"],["quiet","Quietly confident"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTone(v)} style={{display:"block",width:"100%",textAlign:"left",padding:"7px 8px",borderRadius:3,marginBottom:3,border:"1px solid",borderColor:tone===v?"#c9914a":"#1e1a14",background:tone===v?"rgba(201,145,74,0.07)":"transparent",color:tone===v?"#f0ece6":"#5a5048",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}</div>
      <div><div style={{fontSize:9,color:"#5a5048",marginBottom:5}}>LENGTH</div>
        {[["ultra","3 sentences"],["short","2 paragraphs"],["medium","3 paragraphs"]].map(([v,l])=>(
          <button key={v} onClick={()=>setLength(v)} style={{display:"block",width:"100%",textAlign:"left",padding:"7px 8px",borderRadius:3,marginBottom:3,border:"1px solid",borderColor:length===v?"#c9914a":"#1e1a14",background:length===v?"rgba(201,145,74,0.07)":"transparent",color:length===v?"#f0ece6":"#5a5048",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}</div>
    </div>
    <button onClick={generate} style={{width:"100%",padding:"14px 0",background:"linear-gradient(135deg,#7a4820,#c9914a)",border:"none",borderRadius:7,color:"#0c0c0c",fontSize:13,fontWeight:800,letterSpacing:"0.1em",cursor:"pointer",fontFamily:"inherit"}}>✦ GENERATE OUTREACH EMAIL</button>
    <button onClick={()=>setShowKey(true)} style={{width:"100%",marginTop:8,padding:"6px 0",background:"transparent",border:"none",color:"#3a3028",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>⚙ API key configured · click to change</button>
  </div>;

  if(state==="loading") return <div style={{padding:"60px 0",textAlign:"center"}}>
    <div style={{fontSize:36,color:"#c9914a",marginBottom:16,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</div>
    <div style={{fontSize:11,color:"#c9914a",letterSpacing:"0.2em"}}>DRAFTING OUTREACH</div>
  </div>;

  if(state==="error") return <div style={{padding:"20px 0"}}>
    <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid #ef444430",borderRadius:8,padding:14,marginBottom:12}}>
      <div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:6}}>Generation failed</div>
      <div style={{fontSize:10,color:"#fca5a5",fontFamily:"monospace",lineHeight:1.6,wordBreak:"break-all"}}>{err}</div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={generate} style={{flex:1,padding:11,background:"rgba(201,145,74,0.08)",border:"1px solid #c9914a30",borderRadius:5,color:"#c9914a",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>↺ Try Again</button>
      <button onClick={()=>setShowKey(true)} style={{padding:"11px 14px",background:"transparent",border:"1px solid #1e1a14",borderRadius:5,color:"#5a5048",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>⚙ Key</button>
    </div>
  </div>;

  const curSubject=editing?subject:(email?email.subject:"");
  const curBody=editing?body:(email?email.body:"");
  return <div style={{padding:"8px 0"}}>
    <div style={{fontSize:9,color:"#5a5048",marginBottom:5}}>SUBJECT</div>
    {editing?<input value={subject} onChange={e=>setSubject(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #c9914a60",borderRadius:4,color:"#c9914a",fontSize:13,fontStyle:"italic",padding:"6px 10px",outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:12}}/>
      :<div style={{fontSize:13,color:"#c9914a",fontStyle:"italic",lineHeight:1.5,marginBottom:12}}>{curSubject}</div>}
    {editing?<textarea value={body} onChange={e=>setBody(e.target.value)} style={{width:"100%",minHeight:220,background:"#121212",border:"1px solid #c9914a30",borderRadius:6,color:"#c4bfb5",fontFamily:"Georgia,serif",fontSize:12,lineHeight:2,padding:"12px 14px",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
      :<div onClick={()=>setEditing(true)} style={{background:"#121212",border:"1px solid #1e1a14",borderRadius:6,padding:"12px 14px",fontSize:12,lineHeight:2,color:"#c4bfb5",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",cursor:"text",minHeight:180}}>{curBody}</div>}
    <div style={{fontSize:9,color:"#3a3028",textAlign:"right",marginTop:3}}>{editing?"editing":"click to edit"}</div>
    <div style={{display:"flex",gap:8,marginTop:14}}>
      <button onClick={generate} style={{padding:"9px 12px",background:"transparent",border:"1px solid #1e1a14",borderRadius:5,color:"#7a6a58",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>↺</button>
      {editing?<button onClick={()=>setEditing(false)} style={{padding:"9px 12px",background:"rgba(99,102,241,0.1)",border:"1px solid #818cf820",borderRadius:5,color:"#818cf8",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✓ Done</button>
        :<button onClick={()=>setEditing(true)} style={{padding:"9px 12px",background:"rgba(99,102,241,0.1)",border:"1px solid #818cf820",borderRadius:5,color:"#818cf8",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>✎ Edit</button>}
      <button onClick={()=>{navigator.clipboard.writeText(curBody);setCopied(true);setTimeout(()=>setCopied(false),3000);}}
        style={{padding:"9px 14px",background:copied?"rgba(34,197,94,0.12)":"rgba(255,255,255,0.06)",border:copied?"1px solid #22c55e40":"1px solid #1e1a14",borderRadius:5,color:copied?"#22c55e":"#9ca3af",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>
        {copied?"✓ Copied":"⎘ Copy"}</button>
      <button onClick={openOutlook} style={{flex:1,padding:"9px 14px",background:"linear-gradient(135deg,#1a1208,#2a1e0a)",border:"none",borderRadius:5,color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        <span>✉</span> Open in Outlook</button>
    </div>
  </div>;
}

// ── OUTREACH TAB ──────────────────────────────────────────────────────────────
function OutreachTab({deal,tracking}) {
  const entry=tracking.get(deal);
  const [noteInput,setNoteInput]=useState(entry&&entry.notes?entry.notes:"");
  const [editNote,setEditNote]=useState(false);
  if(!entry) return <div style={{padding:"20px 0"}}><div style={{background:"#121212",border:"1px solid #1e1a14",borderRadius:8,padding:20,textAlign:"center"}}><div style={{fontSize:28,marginBottom:10}}>📤</div><div style={{fontSize:12,color:"#5a5048",marginBottom:6}}>No outreach recorded yet</div><div style={{fontSize:10,color:"#3a3028"}}>Generate an email and click "Open in Outlook" to start tracking</div></div></div>;
  const days=entry.emailedAt?daysSince(entry.emailedAt):null;
  const overdue=days!==null&&days>=FOLLOW_UP_DAYS&&!["replied","call","active","dead","won"].includes(entry.status);
  return <div style={{padding:"4px 0"}}>
    {overdue&&<div style={{background:"rgba(249,115,22,0.08)",border:"1px solid #f9731625",borderRadius:7,padding:"10px 12px",marginBottom:12,display:"flex",gap:10}}>
      <span>⚠</span><div><div style={{fontSize:11,fontWeight:700,color:"#f97316"}}>Follow-up overdue — {days} days since email</div><div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>Send a brief 1-line follow-up or try calling</div></div>
    </div>}
    <div style={{background:"#121212",border:"1px solid #1e1a14",borderRadius:8,padding:"14px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div><div style={{fontSize:9,color:"#5a5048",marginBottom:4}}>STATUS</div><StatusPicker current={entry.status} onChange={s=>tracking.update(deal,{status:s})}/></div>
        {entry.emailedAt&&<div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#f0ece6",fontWeight:600}}>{days}d ago</div><div style={{fontSize:9,color:"#5a5048"}}>{new Date(entry.emailedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div></div>}
      </div>
      {entry.dmName&&<div style={{fontSize:10,color:"#7a6a58",marginBottom:8}}>Contact: {entry.dmName}</div>}
      <div style={{borderTop:"1px solid #141414",paddingTop:10}}>
        <div style={{fontSize:9,color:"#5a5048",marginBottom:6}}>NOTES</div>
        {editNote?<div>
          <textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)} style={{width:"100%",minHeight:80,background:"#0e0e0e",border:"1px solid #c9914a30",borderRadius:4,color:"#c4bfb5",fontFamily:"inherit",fontSize:11,lineHeight:1.6,padding:"8px 10px",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <button onClick={()=>{tracking.update(deal,{notes:noteInput});setEditNote(false);}} style={{padding:"5px 12px",background:"rgba(201,145,74,0.1)",border:"1px solid #c9914a30",borderRadius:4,color:"#c9914a",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
            <button onClick={()=>{setNoteInput(entry.notes||"");setEditNote(false);}} style={{padding:"5px 12px",background:"transparent",border:"1px solid #1e1a14",borderRadius:4,color:"#7a6a58",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          </div>
        </div>:<div onClick={()=>setEditNote(true)} style={{minHeight:40,padding:"8px 10px",background:"#0e0e0e",borderRadius:4,fontSize:11,color:entry.notes?"#9ca3af":"#3a3028",cursor:"text",lineHeight:1.6,border:"1px solid #121212"}}>{entry.notes||"Click to add notes..."}</div>}
      </div>
    </div>
  </div>;
}

// ── PIPELINE DASHBOARD ────────────────────────────────────────────────────────
function PipelineDashboard({tracking,deals,onSelectDeal}) {
  const tracked=useMemo(()=>tracking.allEntries.map(e=>{ const d=deals.find(x=>dealKey(x)===e.key); return d?{...e,deal:d}:null; }).filter(Boolean),[tracking.allEntries,deals]);
  const byStatus=useMemo(()=>{ const g={}; STATUSES.forEach(s=>{g[s.id]=[];}); tracked.forEach(t=>{const sid=t.status||"emailed";if(g[sid])g[sid].push(t);}); return g; },[tracked]);

// ── DRAWER (SHARED LOGIC) ─────────────────────────────────────────────────────
// ── CONNECTION MATCHING ENGINE ────────────────────────────────────────────────
function findConnections(deal) {
  const results=[];
  const dealText=[deal.sponsor,deal.borrower,deal.owner,deal.n,deal.svc,deal.orig].filter(Boolean).join(' ').toLowerCase();
  const sponsorRaw=(deal.sponsor||deal.borrower||deal.owner||'').split(';')[0].trim();

  function hit(text) {
    if(!text) return false;
    const t=text.toLowerCase();
    if(dealText.includes(t)||t.includes(sponsorRaw.toLowerCase())) return true;
    return t.split(/[\s,;|&\/()]+/).filter(w=>w.length>=4).some(w=>dealText.includes(w));
  }

  // Find sponsor profile across all 3 files
  let sponsorMatch=null, sponsorKey=null;
  for(const file of [
    typeof SPONSORS!=="undefined"?SPONSORS:{},
  ]) {
    for(const [k,d] of Object.entries(file)) {
      if(hit(k)||(d.treppEntities||[]).some(e=>hit(e))) { sponsorMatch=d; sponsorKey=k; break; }
    }
    if(sponsorMatch) break;
  }

  // Baker Street principals vs servicer/originator
  if(typeof BS_PRINCIPALS!=='undefined') {
    if(deal.orig) {
      const o=deal.orig.toLowerCase();
      if(o.includes('ubs')||(BS_PRINCIPALS.brian&&(BS_PRINCIPALS.brian.ubsCoIssuers||[]).some(c=>o.includes(c.toLowerCase())))) {
        results.push({strength:'hot',via:'Brian Sherlock',contact:null,
          explanation:`Brian originated or co-issued CMBS at UBS — ${deal.orig} was in Brian's deal flow. Direct credibility with this originator.`,
          angle:`Brian, open with your UBS history — this loan came out of your world.`});
      }
    }
    if(deal.ss&&deal.svc) {
      const s=deal.svc.toLowerCase();
      if(['keybank','situs','cwcapital','midland','trimont','rialto','lnr'].some(x=>s.includes(x))) {
        results.push({strength:'warm',via:'Rob Vernicek',contact:null,
          explanation:`Rob worked directly with ${deal.svc.split(' ')[0]} during Iron Hound workouts — he knows their team and how they make decisions.`,
          angle:`Rob, lead with your servicer relationship. They know you know how this works.`});
      }
    }
  }

  // Network contacts vs deal + sponsor
  if(typeof BS_NETWORK_CONTACTS!=='undefined') {
    for(const c of BS_NETWORK_CONTACTS) {
      let found=false, expl='', ang='', str='warm';
      // Deal history match
      for(const dh of (c.dealHistory||[])) {
        const dhText=[dh.property,dh.notes,dh.seller,dh.buyer,dh.borrower,dh.lender].filter(Boolean).join(' ');
        if(hit(dh.property)||hit(dh.notes)||hit(dh.seller)||hit(dh.buyer)||hit(dh.borrower)) {
          found=true;
          expl=`${c.name} (${c.firm}) worked on ${dh.property}${dh.amount?' ($'+(dh.amount/1e6).toFixed(0)+'M)':''} in ${dh.year||'?'} as ${dh.role||'participant'} — same sponsor or related entity.`;
          ang=`${c.name} has direct deal history with this sponsor. Ask them to make the intro.`;
          break;
        }
      }
      // Firm matches servicer or originator
      if(!found&&c.firm) {
        const fl=c.firm.toLowerCase().split(' ')[0];
        if((deal.svc&&deal.svc.toLowerCase().includes(fl))||(deal.orig&&deal.orig.toLowerCase().includes(fl))) {
          found=true;
          expl=`${c.name} is at ${c.firm} — same firm as the ${deal.svc?'servicer':'originator'} on this loan. They know who's handling it.`;
          ang=`${c.name} can brief you on exactly who to call and warm them up first.`;
        }
      }
      // Notes mention sponsor
      if(!found&&hit(c.notes)) {
        found=true;
        expl=`${c.name} (${c.firm}) — their background references connections to this sponsor or related entities.`;
        ang=`Ask ${c.name} directly — they may know this sponsor from their career.`;
      }
      if(found) results.push({strength:str,via:c.name,contact:c,explanation:expl,angle:ang});
    }
  }

  // DM career overlaps with BS principals + network contacts
  if(sponsorMatch&&sponsorMatch.people) {
    for(const dm of sponsorMatch.people) {
      for(const job of (dm.career||[])) {
        const jf=(job.firm||'').toLowerCase();
        // Check against network contacts' current firm
        if(typeof BS_NETWORK_CONTACTS!=='undefined') {
          for(const c of BS_NETWORK_CONTACTS) {
            const cf=c.firm.toLowerCase().split(' ')[0];
            if(jf.length>3&&jf.includes(cf)&&!results.some(r=>r.via===c.name&&r.explanation.includes(dm.name))) {
              results.push({strength:'warm',via:c.name,contact:c,
                explanation:`${c.name} (${c.firm}) and ${dm.name} both have ${job.firm} in their background — likely know each other or share mutual contacts from there.`,
                angle:`${c.name} — do you know ${dm.name} from your ${job.firm} history? That's your warm path into ${sponsorKey}.`});
            }
          }
        }
        // Check hot UBS / Iron Hound / Lehman overlaps
        if(['ubs','iron hound','lehman','deutsche bank'].some(x=>jf.includes(x))) {
          const bsWho=jf.includes('iron hound')?'Rob Vernicek':'Brian Sherlock';
          if(!results.some(r=>r.via===bsWho&&r.explanation.includes(dm.name))) {
            results.push({strength:'hot',via:bsWho,contact:null,
              explanation:`${dm.name} (${dm.title} at ${sponsorKey}) worked at ${job.firm} ${job.years||''} — same firm and era as ${bsWho}. They were peers in the same world.`,
              angle:`${bsWho}, you and ${dm.name} were both at ${job.firm}. Open with that — it's a genuine peer connection.`});
          }
        }
      }
    }
  }

  // Dedupe and sort hot → warm → cold
  const seen=new Set();
  const unique=results.filter(r=>{ const k=r.via+'|'+r.explanation.slice(0,50); if(seen.has(k))return false; seen.add(k); return true; });
  unique.sort((a,b)=>({hot:0,warm:1,cold:2}[a.strength]-({hot:0,warm:1,cold:2}[b.strength])));
  return {sponsorMatch,sponsorKey,connections:unique};
}

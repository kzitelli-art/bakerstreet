function ConnectionsTab({deal,onGoToContact}) {
  const [result,setResult]=React.useState(null);
  const [err,setErr]=React.useState("");
  const dealId=deal.n+deal.addr;
  const prevId=React.useRef(null);

  React.useEffect(()=>{
    if(prevId.current===dealId) return;
    prevId.current=dealId;
    setResult(null); setErr("");
  },[dealId]);

  function run() {
    try {
      const r=findConnections(deal);
      setResult(r);
    } catch(e) {
      setErr("Error: "+String(e));
    }
  }

  const SC=s=>s==='hot'?'#ef4444':s==='warm'?'#c9914a':'#5a5048';
  const SB=s=>s==='hot'?'rgba(239,68,68,0.08)':s==='warm'?'rgba(201,145,74,0.08)':'rgba(90,80,72,0.05)';
  const SL=s=>s==='hot'?'🔥 HOT':s==='warm'?'★ WARM':'○ COLD';

  const sponsorName=(deal.sponsor||deal.borrower||deal.owner||'').split(';')[0].trim()||deal.n;

  // ── Not yet run ────────────────────────────────────────────────────────────
  if(!result) return <div style={{paddingTop:8}}>

    <div style={{background:'#0e0e0e',border:'1px solid #1e1a14',borderRadius:8,padding:'16px',marginBottom:12}}>
      <div style={{fontSize:11,color:'#7a6a58',marginBottom:4}}>Sponsor</div>
      <div style={{fontSize:15,fontWeight:800,color:'#f0ece6',marginBottom:12}}>{sponsorName}</div>
      <button onClick={run} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,#7a4820,#c9914a)',border:'none',borderRadius:6,color:'#0c0c0c',fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
        🔗 Find Connections
      </button>
      {err&&<div style={{marginTop:8,fontSize:10,color:'#ef4444'}}>{err}</div>}
    </div>

    <div style={{fontSize:9,color:'#3a3028',textAlign:'center',lineHeight:1.8}}>
      Checks sponsor database, DM career history,<br/>and your network for warm paths.
    </div>
  </div>;

  const {sponsorMatch,sponsorKey,connections}=result;

  // ── Results ────────────────────────────────────────────────────────────────
  return <div style={{paddingTop:4}}>

    {/* Sponsor snapshot */}
    {sponsorMatch ? <div style={{background:'#0e0e0e',border:'1px solid #1e1a14',borderRadius:8,padding:'14px 16px',marginBottom:14}}>
      <div style={{fontSize:9,color:'#5a5048',letterSpacing:'0.12em',marginBottom:6}}>SPONSOR PROFILE</div>
      <div style={{fontSize:14,fontWeight:800,color:'#f0ece6',marginBottom:4}}>{sponsorKey}</div>
      {sponsorMatch.hq&&<div style={{fontSize:10,color:'#7a6a58',marginBottom:2}}>📍 {sponsorMatch.hq}</div>}
      <div style={{display:'flex',gap:14,marginTop:4,flexWrap:'wrap'}}>
        {sponsorMatch.founded&&<span style={{fontSize:9,color:'#5a5048'}}>Est. {sponsorMatch.founded}</span>}
        {sponsorMatch.aum&&<span style={{fontSize:9,color:'#5a5048'}}>{sponsorMatch.aum}</span>}
      </div>
      {sponsorMatch.focus&&<div style={{fontSize:10,color:'#9ca3af',lineHeight:1.6,marginTop:8,paddingTop:8,borderTop:'1px solid #1a1612'}}>{sponsorMatch.focus}</div>}
      {sponsorMatch.bakerStreetAngle&&<div style={{marginTop:8,padding:'8px 10px',background:'rgba(201,145,74,0.05)',border:'1px solid #c9914a20',borderRadius:5}}>
        <div style={{fontSize:9,color:'#c9914a',marginBottom:3}}>BAKER STREET ANGLE</div>
        <div style={{fontSize:10,color:'#c9b87a',lineHeight:1.6}}>{sponsorMatch.bakerStreetAngle}</div>
      </div>}
    </div> : <div style={{background:'#0e0e0e',border:'1px solid #1e1a14',borderRadius:8,padding:'12px 14px',marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:'#f0ece6',marginBottom:2}}>{sponsorName}</div>
      <div style={{fontSize:10,color:'#3a3028',fontStyle:'italic'}}>Not in sponsor database — run Research to build a full profile.</div>
    </div>}

    {/* Decision makers */}
    {sponsorMatch&&sponsorMatch.people&&sponsorMatch.people.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:9,color:'#5a5048',letterSpacing:'0.12em',marginBottom:8}}>DECISION MAKERS</div>
      {sponsorMatch.people.map((dm,i)=>{
        const dmConn=connections.find(c=>c.explanation&&c.explanation.includes(dm.name));
        return <div key={i} style={{background:'#0e0e0e',border:'1px solid '+(dmConn?SC(dmConn.strength)+'40':'#1a1612'),borderRadius:7,padding:'11px 13px',marginBottom:7}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#f0ece6'}}>
                {dm.rank&&<span style={{fontSize:9,color:'#3a3028',marginRight:5}}>#{dm.rank}</span>}{dm.name}
              </div>
              <div style={{fontSize:10,color:'#c9914a',marginTop:1}}>{dm.title}</div>
            </div>
            {dmConn&&<span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:SB(dmConn.strength),color:SC(dmConn.strength),border:'1px solid '+SC(dmConn.strength)+'30',flexShrink:0,marginLeft:8}}>{SL(dmConn.strength)}</span>}
          </div>
          {dm.decisionPower&&<div style={{fontSize:10,color:'#7a6a58',lineHeight:1.5,marginBottom:6}}>{dm.decisionPower}</div>}
          {dm.career&&dm.career.length>0&&<div style={{borderTop:'1px solid #121212',paddingTop:7,marginTop:4}}>
            {dm.career.map((job,j)=><div key={j} style={{display:'flex',gap:8,marginBottom:2}}>
              <span style={{fontSize:8,color:'#3a3028',flexShrink:0,minWidth:72,textAlign:'right'}}>{job.years||''}</span>
              <span style={{fontSize:9,lineHeight:1.4}}>
                <span style={{color:'#9ca3af',fontWeight:600}}>{job.firm}</span>
                {job.role&&<span style={{color:'#4a4038'}}> · {job.role}</span>}
              </span>
            </div>)}
          </div>}
          {dm.education&&dm.education.filter(e=>e.school&&!e.school.includes('Not publicly')).length>0&&
            <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}}>
              {dm.education.filter(e=>e.school&&!e.school.includes('Not publicly')).map((edu,j)=>
                <span key={j} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(96,165,250,0.07)',color:'#60a5fa',border:'1px solid rgba(96,165,250,0.12)'}}>
                  {edu.school.split(',')[0].split(' - ')[0]}{edu.year?' · '+edu.year:''}
                </span>)}
            </div>}
          {dm.bakerStreetAngle&&<div style={{marginTop:7,padding:'5px 8px',background:'rgba(201,145,74,0.04)',border:'1px solid #c9914a15',borderRadius:4}}>
            <div style={{fontSize:9,color:'#c9914a',lineHeight:1.5}}>{dm.bakerStreetAngle}</div>
          </div>}
        </div>;
      })}
    </div>}

    {/* Connection paths */}
    <div style={{fontSize:9,color:'#5a5048',letterSpacing:'0.12em',marginBottom:8}}>
      CONNECTION PATHS {connections.length>0?'· '+connections.length+' FOUND':'· NONE FOUND'}
    </div>
    {connections.length>0 ? connections.map((conn,i)=><div key={i} style={{background:SB(conn.strength),border:'1px solid '+SC(conn.strength)+'25',borderLeft:'3px solid '+SC(conn.strength),borderRadius:'0 6px 6px 0',padding:'10px 13px',marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <span style={{fontSize:9,fontWeight:700,color:SC(conn.strength)}}>{SL(conn.strength)}</span>
          <span style={{fontSize:11,fontWeight:700,color:'#f0ece6'}}>{conn.via}</span>
        </div>
        {conn.contact&&onGoToContact&&<button onClick={()=>onGoToContact(conn.via)} style={{fontSize:8,padding:'2px 6px',background:'transparent',border:'1px solid #c9914a40',borderRadius:3,color:'#c9914a',cursor:'pointer',fontFamily:'inherit'}}>VIEW →</button>}
      </div>
      <div style={{fontSize:11,color:'#c4bfb5',lineHeight:1.6,marginBottom:conn.angle?5:0}}>{conn.explanation}</div>
      {conn.angle&&<div style={{fontSize:10,color:'#c9914a',lineHeight:1.5,paddingTop:5,borderTop:'1px solid '+SC(conn.strength)+'20'}}>💬 {conn.angle}</div>}
    </div>) : <div style={{padding:'20px',textAlign:'center',color:'#3a3028',fontSize:10,lineHeight:1.8}}>
      No automatic connections found.<br/>Add deal history to the Network Intelligence file to surface warm paths.
    </div>}

    <button onClick={()=>setResult(null)} style={{marginTop:4,width:'100%',padding:'8px',background:'transparent',border:'1px solid #1e1a14',borderRadius:5,color:'#3a3028',fontSize:9,cursor:'pointer',fontFamily:'inherit'}}>↺ Reset</button>

  </div>;
}

function DrawerContent({deal,tracking,tpData,onGoToContact}) {
  const [tab,setTab]=useState("intel");
  const svc=getServicer(deal.svc);
  const mo=moOut(deal.mat);
  const researched=!!loadResearch(deal);
  const TABS=[["intel","🔍 RESEARCH"],["connections","🔗 CONNECT"],["deal","DEAL"],["email","✦ EMAIL"],["outreach","TRACK"]];
  useEffect(()=>setTab("intel"),[deal.n,deal.addr]);
  return <>
    <div style={{display:"flex",borderBottom:"1px solid #161616",background:"#0c0e13",flexShrink:0,overflowX:"auto"}}>
      {TABS.map(([id,label])=><button key={id} onClick={()=>setTab(id)} style={{flex:1,minWidth:60,padding:"11px 4px",background:"transparent",border:"none",borderBottom:tab===id?"2px solid #c9914a":"2px solid transparent",color:tab===id?"#c9914a":"#5a5048",fontSize:10,letterSpacing:"0.1em",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
      {label}{id==="outreach"&&tracking&&tracking.get(deal)&&<span style={{width:5,height:5,borderRadius:"50%",background:"#c9914a",display:"inline-block"}}/>}{id==="intel"&&researched&&<span style={{width:5,height:5,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>}</button>)}
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 20px",WebkitOverflowScrolling:"touch"}}>
      {tab==="deal"&&(()=>{
        const fullAddr=(deal.addr||"")+(deal.city?", "+deal.city:"")+(deal.state?" "+deal.state:"");
        const mapQ=encodeURIComponent(fullAddr+", USA");
        const gUrl="https://www.google.com/maps/search/?api=1&query="+mapQ;
        const svUrl="https://www.google.com/maps?q="+mapQ+"&layer=c";
        const satUrl="https://www.google.com/maps/search/?api=1&query="+mapQ+"&basemap=satellite";
        const sponsor=deal.sponsor||deal.borrower||deal.owner||"";
        const sponsorShort=sponsor.split(";")[0].trim();
        const svcShort=(deal.svc||"").replace(" National Association","").replace(" Real Estate Advisors","").replace(" Loan Services LLC","").replace(" Real Estate","");
        const masterSvcShort=(deal.masterSvc||"").replace(" National Association","").replace(" Real Estate Advisors","").replace(" Loan Services LLC","");
        const matColor=mo!==null&&mo<=0?"#ef4444":mo!==null&&mo<=6?"#f97316":mo!==null&&mo<=12?"#eab308":"#c4bfb5";
        const dscrColor=deal.dscr!==null?(deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#7a6a58"):"#5a5048";
        const fmtPct=v=>v!=null?Math.round(v*100)+"%":null;
        const fmtRate=v=>v!=null?(v<1?Math.round(v*10000)/100:Math.round(v*100)/100)+"%":null;
        const fmtSF=v=>v!=null?v.toLocaleString()+" SF":null;
        const fmtUnits=v=>v!=null?v.toLocaleString()+" units":null;
        const Section=({title,children})=><div style={{marginBottom:12}}>
          <div style={{fontSize:9,color:"#5a5048",letterSpacing:"0.12em",marginBottom:0,padding:"6px 14px",background:"#0c0c0c",borderRadius:"6px 6px 0 0",border:"1px solid #1e1a14",borderBottom:"none"}}>{title}</div>
          <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:"0 0 6px 6px",padding:"0 14px"}}>
            {children}
          </div>
        </div>;
        const Row=({l,v,vc,bold})=>v!=null&&v!==""&&v!=="—"?
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"7px 0",borderBottom:"1px solid #0a0c10",gap:12}}>
            <span style={{fontSize:11,color:"#5a5048",flexShrink:0,minWidth:110}}>{l}</span>
            <span style={{fontSize:11,color:vc||"#c4bfb5",fontWeight:bold||vc?"600":"400",textAlign:"right",lineHeight:1.4,wordBreak:"break-word",maxWidth:"58%"}}>{v}</span>
          </div>:null;
        return <div style={{paddingTop:4}}>

          {/* 3 BIG NUMBERS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
            <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,padding:"11px 12px"}}>
              <div style={{fontSize:9,color:"#5a5048",marginBottom:4}}>BALANCE</div>
              <div style={{fontSize:20,fontWeight:800,color:"#c9914a",lineHeight:1}}>{fmtBal(deal.bal)}</div>
              {deal.origBal&&deal.origBal!==deal.bal&&<div style={{fontSize:9,color:"#3a3028",marginTop:3}}>orig {fmtBal(deal.origBal)}</div>}
            </div>
            <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,padding:"11px 12px"}}>
              <div style={{fontSize:9,color:"#5a5048",marginBottom:4}}>MATURITY</div>
              <div style={{fontSize:15,fontWeight:800,color:matColor,lineHeight:1}}>{fmtMat(deal.mat)}</div>
              <div style={{fontSize:10,color:matColor,marginTop:3}}>{mo===null?"":mo<=0?"PAST DUE":mo+"mo out"}</div>
            </div>
            <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,padding:"11px 12px"}}>
              <div style={{fontSize:9,color:"#5a5048",marginBottom:4}}>DSCR</div>
              <div style={{fontSize:20,fontWeight:800,color:dscrColor,lineHeight:1}}>{deal.dscr!=null?deal.dscr+"x":"—"}</div>
              {deal.dscr!=null&&deal.dscr<1&&<div style={{fontSize:10,color:dscrColor,marginTop:3}}>{Math.round((1-deal.dscr)*100)}% short</div>}
            </div>
          </div>

          {/* FLAGS */}
          {(deal.ss||deal.wl||(deal.dscr!=null&&deal.dscr<1)||(mo!=null&&mo<=0))&&
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
              {mo!=null&&mo<=0&&<span style={{fontSize:10,padding:"4px 9px",borderRadius:4,background:"rgba(239,68,68,0.12)",color:"#ef4444",fontWeight:700,border:"1px solid #ef444430"}}>PAST MATURITY</span>}
              {deal.ss&&<span style={{fontSize:10,padding:"4px 9px",borderRadius:4,background:"rgba(192,132,252,0.12)",color:"#c084fc",fontWeight:700,border:"1px solid #c084fc30"}}>SS ACTIVE</span>}
              {deal.wl&&<span style={{fontSize:10,padding:"4px 9px",borderRadius:4,background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:700,border:"1px solid #60a5fa30"}}>WATCHLIST</span>}
              {deal.dscr!=null&&deal.dscr<1&&<span style={{fontSize:10,padding:"4px 9px",borderRadius:4,background:"rgba(249,115,22,0.12)",color:"#f97316",fontWeight:700,border:"1px solid #f9731630"}}>SUB-BREAKEVEN</span>}
              {deal.defFlag&&deal.defFlag.toLowerCase()!=="current"&&deal.defFlag!=""&&<span style={{fontSize:10,padding:"4px 9px",borderRadius:4,background:"rgba(239,68,68,0.12)",color:"#ef4444",fontWeight:700,border:"1px solid #ef444430"}}>{deal.defFlag.toUpperCase()}</span>}
            </div>
          }

          {/* LOAN DETAILS */}
          <Section title="LOAN">
            <Row l="Balance"        v={fmtBal(deal.bal)}              bold />
            <Row l="Original Bal"   v={deal.origBal&&deal.origBal!==deal.bal?fmtBal(deal.origBal):null} />
            <Row l="Source"         v={deal.src} />
            <Row l="Pool / Deal"    v={deal.pool} />
            <Row l="Originator"     v={deal.orig} />
            <Row l="Interest Rate"  v={fmtRate(deal.intRate)} />
            <Row l="Rate Type"      v={deal.intType} />
            <Row l="Amortization"   v={deal.amort} />
            <Row l="Loan Term"      v={deal.term?deal.term+"mo":null} />
            <Row l="Maturity"       v={fmtMat(deal.mat)+(mo!=null?" ("+(mo<=0?"PAST DUE":mo+"mo"):"")} vc={matColor} bold />
            <Row l="Orig Maturity"  v={deal.origMat&&deal.origMat!==deal.mat?fmtMat(deal.origMat):null} />
            <Row l="Extension"      v={deal.extFlag&&deal.extFlag!=""?deal.extFlag:null} />
            <Row l="Modified"       v={deal.modFlag&&deal.modFlag!=""?deal.modFlag:null} />
            <Row l="Delinquency"    v={deal.defFlag&&deal.defFlag!=""&&deal.defFlag.toLowerCase()!=="current"?deal.defFlag:null} vc="#ef4444" />
            <Row l="Master Svc"     v={masterSvcShort||null} />
            <Row l="Special Svc"    v={deal.ss?(svcShort||"Yes"):null} vc={deal.ss?"#c084fc":null} bold={deal.ss} />
            <Row l="SS Since"       v={deal.ssDate?fmtMat(deal.ssDate):null} vc="#c084fc" />
            <Row l="Watchlist"      v={deal.wl?"Yes — "+(deal.wlReason||"See servicer"):null} vc="#60a5fa" />
            <Row l="CUSIP"          v={deal.cusip} />
          </Section>

          {/* PROPERTY DETAILS */}
          <Section title="PROPERTY">
            <Row l="Address"        v={fullAddr} bold />
            <Row l="Asset Type"     v={deal.type} />
            <Row l="Units / Keys"   v={fmtUnits(deal.units)} />
            <Row l="Square Feet"    v={fmtSF(deal.sqft)} />
            <Row l="Occupancy"      v={fmtPct(deal.occup)} vc={deal.occup!=null&&deal.occup<0.85?"#f97316":null} />
          </Section>

          {/* FINANCIALS */}
          <Section title="FINANCIALS">
            <Row l="DSCR (NCF)"     v={deal.dscr!=null?deal.dscr+"x":null} vc={dscrColor} bold />
            <Row l="DSCR Date"      v={deal.dscrDate?fmtMat(deal.dscrDate):null} />
            <Row l="NOI"            v={deal.noi?fmtBal(deal.noi):null} />
            <Row l="Revenue"        v={deal.rev?fmtBal(deal.rev):null} />
            <Row l="Appraised Val"  v={deal.appVal?fmtBal(deal.appVal):null} />
            <Row l="Appraisal Date" v={deal.appDate?fmtMat(deal.appDate):null} />
            <Row l="LTV"            v={deal.ltv!=null?deal.ltv+(deal.ltv<5?"%":""):null} vc={deal.ltv!=null&&deal.ltv>80?"#f97316":null} />
          </Section>

          {/* OWNERSHIP */}
          <Section title="OWNERSHIP">
            <Row l="Sponsor"        v={deal.sponsor} bold />
            <Row l="Borrower"       v={deal.borrower} />
            <Row l="Owner Entity"   v={deal.owner} />
          </Section>

          {/* SERVICER PLAYBOOK */}
          {deal.ss&&svc&&<div style={{background:"rgba(192,132,252,0.04)",border:"1px solid #c084fc20",borderRadius:7,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:"#c084fc",marginBottom:8}}>{svc.key} — SERVICER PLAYBOOK</div>
            <div style={{fontSize:11,color:"#9b72cf",lineHeight:1.7,marginBottom:6}}>{svc.approach}</div>
            <div style={{fontSize:10,color:"#5a5048",marginBottom:8}}>Timeline: <span style={{color:"#9ca3af"}}>{svc.timeline}</span></div>
            <div style={{paddingTop:8,borderTop:"1px solid #141414",fontSize:11,color:"#c9914a",lineHeight:1.7}}>{svc.angle}</div>
          </div>}

          {/* LOCATION + RESEARCH */}
          <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:8,padding:"10px 14px",marginBottom:12}}>
            <div style={{fontSize:9,color:"#5a5048",marginBottom:8}}>📍 {fullAddr}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
              <a href={gUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"9px 0",borderRadius:5,background:"#121212",border:"1px solid #1e1a14",color:"#c4bfb5",fontSize:11,textDecoration:"none",fontWeight:600}}>📍 Map</a>
              <a href={svUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"9px 0",borderRadius:5,background:"#121212",border:"1px solid #1e1a14",color:"#c4bfb5",fontSize:11,textDecoration:"none",fontWeight:600}}>🚶 Street</a>
              <a href={satUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"9px 0",borderRadius:5,background:"#121212",border:"1px solid #1e1a14",color:"#c4bfb5",fontSize:11,textDecoration:"none",fontWeight:600}}>🛰 Aerial</a>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <a href={"https://www.google.com/search?q="+encodeURIComponent(sponsorShort+" real estate")} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"9px 0",borderRadius:5,background:"#121212",border:"1px solid #1e1a14",color:"#c4bfb5",fontSize:11,textDecoration:"none",fontWeight:600}}>🔍 Google Sponsor</a>
              <a href={"https://www.linkedin.com/search/results/people/?keywords="+encodeURIComponent(sponsorShort)} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"9px 0",borderRadius:5,background:"#121212",border:"1px solid #1e1a14",color:"#c4bfb5",fontSize:11,textDecoration:"none",fontWeight:600}}>LI Search</a>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>setTab("intel")} style={{padding:"13px 0",background:"rgba(34,197,94,0.07)",border:"1px solid #22c55e25",borderRadius:6,color:"#22c55e",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔍 RESEARCH →</button>
            <button onClick={()=>setTab("email")} style={{padding:"13px 0",background:"linear-gradient(135deg,#7a4820,#c9914a)",border:"none",borderRadius:6,color:"#0c0c0c",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>✦ EMAIL →</button>
          </div>
        </div>;
      })()}
      {tab==="intel"&&<ResearchPanel deal={deal} tpData={tpData} onGoToContact={onGoToContact}/>}
      {tab==="connections"&&<ConnectionsTab deal={deal} onGoToContact={onGoToContact}/>}
      {tab==="email"&&<EmailPanel deal={deal} tracking={tracking}/>}
      {tab==="outreach"&&<OutreachTab deal={deal} tracking={tracking}/>}
    </div>
  </>;
}

function MobileDrawer({deal,onClose,tracking,tpData}) {
  useEffect(()=>{ document.body.style.overflow="hidden"; return()=>{ document.body.style.overflow=""; }; },[]);
  const mo=moOut(deal.mat);

        {/* Smart search */}
        <div style={{marginBottom:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search anything — sponsor, city, type..." style={{width:"100%",background:"#121212",border:"1px solid "+(search?"#c9914a60":"#1e1a14"),borderRadius:5,color:"#f0ece6",fontSize:10,padding:"7px 9px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
          {search&&<div style={{fontSize:8,color:"#5a5048",marginTop:3}}>Searching name · sponsor · city · state · type · originator · servicer</div>}
        </div>

        {/* Active filters + clear */}
        {activeFilterCount>0&&<div style={{marginBottom:10,padding:"6px 8px",background:"rgba(201,145,74,0.05)",border:"1px solid #c9914a20",borderRadius:5}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:8,color:"#c9914a",letterSpacing:"0.1em"}}>{activeFilterCount} FILTER{activeFilterCount>1?"S":""} ACTIVE</span>
            <button onClick={clearAllFilters} style={{fontSize:8,color:"#7a6a58",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>Clear all</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
            {filterState!=="All"&&<span onClick={()=>setFilterState("All")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterState} ×</span>}
            {filterType!=="All"&&<span onClick={()=>setFilterType("All")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterType} ×</span>}
            {filterTier!=="ALL"&&<span onClick={()=>setFilterTier("ALL")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterTier} ×</span>}
            {filterSS&&<span onClick={()=>setFilterSS(false)} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c084fc20",color:"#c084fc",cursor:"pointer"}}>SS ×</span>}
            {filterWL&&<span onClick={()=>setFilterWL(false)} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#60a5fa20",color:"#60a5fa",cursor:"pointer"}}>WL ×</span>}
            {filterSubDSCR&&<span onClick={()=>setFilterSubDSCR(false)} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#f9731620",color:"#f97316",cursor:"pointer"}}>DSCR- ×</span>}
            {filterMaturity!=="All"&&<span onClick={()=>setFilterMaturity("All")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterMaturity} ×</span>}
            {filterBalMin!==""&&<span onClick={()=>setFilterBalMin("")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>>${filterBalMin}M+ ×</span>}
            {filterBalMax!==""&&<span onClick={()=>setFilterBalMax("")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>≤${filterBalMax}M ×</span>}
            {filterDscrMax!==""&&<span onClick={()=>setFilterDscrMax("")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#f9731620",color:"#f97316",cursor:"pointer"}}>DSCR≤{filterDscrMax} ×</span>}
            {filterOrig!=="All"&&<span onClick={()=>setFilterOrig("All")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterOrig.split(" ")[0]} ×</span>}
            {filterMSA!=="All"&&<span onClick={()=>setFilterMSA("All")} style={{fontSize:8,padding:"2px 5px",borderRadius:3,background:"#c9914a20",color:"#c9914a",cursor:"pointer"}}>{filterMSA} ×</span>}
          </div>
        </div>}

        {/* FLAGS */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>FLAGS</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[["SS",filterSS,()=>setFilterSS(!filterSS),"#c084fc"],["Watchlist",filterWL,()=>setFilterWL(!filterWL),"#60a5fa"],["DSCR<1",filterSubDSCR,()=>setFilterSubDSCR(!filterSubDSCR),"#f97316"]].map(([l,v,fn,c])=>(
              <button key={l} onClick={fn} style={{padding:"4px 8px",borderRadius:4,border:"1px solid",borderColor:v?c:"#1a1612",background:v?c+"18":"transparent",color:v?c:"#5a5048",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>{v?"✓ ":""}{l}</button>
            ))}
          </div>
        </div>

        {/* PRIORITY */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>PRIORITY</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {[["ALL","All"],["CRITICAL","Crit"],["HIGH","High"],["ELEVATED","Elev"],["WATCH","Watch"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterTier(v)} style={{padding:"3px 7px",borderRadius:4,border:"1px solid",borderColor:filterTier===v?"#c9914a":"#1a1612",background:filterTier===v?"rgba(201,145,74,0.1)":"transparent",color:filterTier===v?"#c9914a":"#5a5048",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>
        </div>

        {/* MATURITY */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>MATURITY WINDOW</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {[["All","All"],["pastdue","Past Due"],["3mo","3mo"],["6mo","6mo"],["12mo","12mo"],["24mo","24mo"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilterMaturity(v)} style={{padding:"3px 7px",borderRadius:4,border:"1px solid",borderColor:filterMaturity===v?(v==="pastdue"?"#ef4444":"#c9914a"):"#1a1612",background:filterMaturity===v?(v==="pastdue"?"rgba(239,68,68,0.1)":"rgba(201,145,74,0.1)"):"transparent",color:filterMaturity===v?(v==="pastdue"?"#ef4444":"#c9914a"):"#5a5048",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>
        </div>

        {/* STATE */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>STATE</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {ALL_STATES.map(s=>(
              <button key={s} onClick={()=>setFilterState(s)} style={{padding:"3px 7px",borderRadius:4,border:"1px solid",borderColor:filterState===s?"#c9914a":"#1a1612",background:filterState===s?"rgba(201,145,74,0.1)":"transparent",color:filterState===s?"#c9914a":"#5a5048",fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>
            ))}
          </div>
        </div>

        {/* ASSET TYPE */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>ASSET TYPE</div>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit"}}>
            {ALL_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>

        {/* BALANCE RANGE */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>BALANCE ($M)</div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <input value={filterBalMin} onChange={e=>setFilterBalMin(e.target.value)} placeholder="Min" style={{flex:1,background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 6px",outline:"none",fontFamily:"inherit",width:0}}/>
            <span style={{fontSize:9,color:"#3a3028"}}>—</span>
            <input value={filterBalMax} onChange={e=>setFilterBalMax(e.target.value)} placeholder="Max" style={{flex:1,background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 6px",outline:"none",fontFamily:"inherit",width:0}}/>
          </div>
        </div>

        {/* DSCR MAX */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>DSCR MAX</div>
          <input value={filterDscrMax} onChange={e=>setFilterDscrMax(e.target.value)} placeholder="e.g. 0.75" style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>

        {/* MSA */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>MSA / METRO</div>
          <select value={filterMSA} onChange={e=>setFilterMSA(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit"}}>
            {ALL_MSAS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>

        {/* CITY */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>CITY</div>
          <select value={filterCity} onChange={e=>setFilterCity(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit"}}>
            {ALL_CITIES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>

        {/* ORIGINATOR */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>ORIGINATOR</div>
          <select value={filterOrig} onChange={e=>setFilterOrig(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit"}}>
            {ALL_ORIGS.map(o=><option key={o}>{o}</option>)}
          </select>
        </div>

        {/* SORT */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:8,color:"#3a3028",letterSpacing:"0.1em",marginBottom:5}}>SORT BY</div>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:10,padding:"5px 7px",outline:"none",fontFamily:"inherit"}}>
            <option value="score">Priority Score</option><option value="balance">Balance ↓</option><option value="maturity">Maturity ↑</option><option value="dscr">DSCR ↑</option>
          </select>
        </div>

        <div style={{marginTop:"auto",paddingTop:10,borderTop:"1px solid #1a1612",fontSize:8,color:"#3a3028",lineHeight:1.9}}>{filtered.length} of {deals.length} deals · ● researched</div>
      </div>}

      {/* Deal list — full table when no selection, collapsed name-only when selected */}
      <div ref={listRef} onScroll={e=>{ if(!selected) setListScrollTop(e.currentTarget.scrollTop); }} style={{width:selected?220:undefined,flex:selected?undefined:1,overflowY:"auto",flexShrink:0,borderRight:selected?"1px solid #1a1612":"none",background:"#0a0a0a"}}>
        {selected&&<div style={{padding:"8px 10px",borderBottom:"1px solid #1a1612",background:"#0c0c0c",display:"flex",gap:6,alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{flex:1,background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:9,padding:"5px 7px",outline:"none",fontFamily:"inherit",minWidth:0}}/>
        </div>}
        {!selected&&<div style={{padding:"5px 16px",background:"rgba(201,145,74,0.03)",borderBottom:"1px solid #1a1612",fontSize:10,color:"#4b3a00",textAlign:"center",letterSpacing:"0.1em"}}>
          {filtered.length} of {deals.length} DEALS — CLICK TO OPEN
        </div>}
        {selected?(
          // Collapsed name-only list
          <div>
            {filtered.map((deal,i)=>{
              const t=tier(deal.score);
              const isSel=selected&&selected.n===deal.n&&selected.addr===deal.addr;
              const researched=!!loadResearch(deal);
              const entry=tracking.get(deal);
              const mo=moOut(deal.mat);
              const overdue=entry&&entry.emailedAt&&daysSince(entry.emailedAt)>=FOLLOW_UP_DAYS&&!["replied","call","active","dead","won"].includes(entry.status);
              return <div key={deal.n+"-"+i} onClick={()=>setSelected(isSel?null:deal)}
                style={{padding:"8px 10px",cursor:"pointer",borderBottom:"1px solid #0e1015",borderLeft:"2px solid "+(isSel?"#c9914a":"transparent"),background:isSel?"rgba(201,145,74,0.06)":overdue?"rgba(249,115,22,0.03)":"transparent"}}
                onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(201,145,74,0.03)";}}
                onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=overdue?"rgba(249,115,22,0.03)":"transparent";}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:5,minWidth:0,width:"100%"}}>
                  <span style={{fontSize:9,fontWeight:800,color:t.color,flexShrink:0,marginTop:1}}>{deal.score}</span>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:10,fontWeight:isSel?700:500,color:isSel?"#c9914a":"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.3}}>
                      {researched&&<span style={{color:"#22c55e",marginRight:3,fontSize:7}}>&#11044;</span>}{deal.n}
                    </div>
                    <div style={{fontSize:8,color:"#5a5048",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{deal.city}{deal.state?" · "+deal.state:""}</div>
                    <div style={{display:"flex",gap:3,marginTop:2}}>
                      {deal.dscr!==null&&<span style={{fontSize:7,fontWeight:700,color:deal.dscr<0.75?"#ef4444":deal.dscr<1?"#f97316":"#5a5048"}}>{deal.dscr}x</span>}
                      {deal.ss&&<span style={{fontSize:7,padding:"0 3px",borderRadius:2,background:"rgba(192,132,252,0.15)",color:"#c084fc",fontWeight:700}}>SS</span>}
                      {deal.wl&&<span style={{fontSize:7,padding:"0 3px",borderRadius:2,background:"rgba(96,165,250,0.15)",color:"#60a5fa",fontWeight:700}}>WL</span>}
                      {mo!==null&&mo<=0&&<span style={{fontSize:7,color:"#ef4444",fontWeight:700}}>DUE</span>}
                      {mo!==null&&mo>0&&mo<=6&&<span style={{fontSize:7,color:"#f97316",fontWeight:700}}>{mo}mo</span>}
                    </div>
                  </div>
                </div>
              </div>;
            })}
          </div>
        ):(
          // Full table
          <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
            <colgroup><col style={{width:90}}/><col style={{width:190}}/><col style={{width:100}}/><col style={{width:85}}/><col style={{width:85}}/><col style={{width:75}}/><col style={{width:60}}/><col style={{width:60}}/><col/></colgroup>
            <thead><tr style={{borderBottom:"2px solid #1a1612"}}>
              {["SCORE","PROPERTY","CITY","BALANCE","MATURITY","DSCR","SS","WL","BORROWER / SERVICER"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:8,letterSpacing:"0.13em",color:"#3a3028",fontWeight:700,background:"#0c0c0c",position:"sticky",top:0,zIndex:5,borderBottom:"1px solid #1a1612"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.map((deal,i)=>{
                const t=tier(deal.score), mo=moOut(deal.mat);
                const isSel=selected&&selected.n===deal.n&&selected.addr===deal.addr;
                const researched=!!loadResearch(deal);
                const entry=tracking.get(deal);
                const daysOut=entry&&entry.emailedAt?daysSince(entry.emailedAt):null;
                const overdue=entry&&daysOut!==null&&daysOut>=FOLLOW_UP_DAYS&&!["replied","call","active","dead","won"].includes(entry.status);
                const matColor=mo!==null&&mo<=0?"#ef4444":mo!==null&&mo<=6?"#f97316":mo!==null&&mo<=12?"#eab308":"#7a6a58";
                const rowBg=isSel?"rgba(201,145,74,0.05)":overdue?"rgba(249,115,22,0.03)":i%2===0?"#0a0a0a":"#0c0c0c";
                return <tr key={deal.n+"-"+i} onClick={()=>{if(listRef.current)selectedRef.current=listRef.current.scrollTop;setSelected(isSel?null:deal);}} style={{borderBottom:"1px solid "+(overdue?"#f9731615":"#0e1015"),background:rowBg,cursor:"pointer"}} onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(201,145,74,0.035)";}} onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=rowBg;}}>
                  <td style={{padding:"9px 10px"}}><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,background:t.bg,border:"1px solid "+t.color+"25"}}><span style={{width:5,height:5,borderRadius:"50%",background:t.color}}/><span style={{fontSize:12,fontWeight:800,color:t.color}}>{deal.score}</span></span></td>
                  <td style={{padding:"9px 10px"}}><div style={{fontSize:11,fontWeight:600,color:"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{researched&&<span style={{color:"#22c55e",marginRight:4,fontSize:8}}>●</span>}{deal.n}</div><div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}><span style={{fontSize:9,color:"#3a3028"}}>{deal.src}</span>{entry&&entry.status&&<StatusBadge status={entry.status} mini/>}{overdue&&<span style={{fontSize:8,fontWeight:700,color:"#f97316"}}>↑{daysOut}d</span>}</div></td>
                  <td style={{padding:"9px 10px",fontSize:10,color:"#7a6a58",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{deal.city}</td>
                  <td style={{padding:"9px 10px",fontSize:11,fontWeight:700,color:"#f0ece6",whiteSpace:"nowrap"}}>{fmtBal(deal.bal)}</td>
                  <td style={{padding:"9px 10px",fontSize:10,color:matColor,whiteSpace:"nowrap"}}>{fmtMat(deal.mat)}{mo!==null&&mo<=0&&<div style={{fontSize:8,color:"#ef4444",fontWeight:700}}>PAST DUE</div>}</td>
                  <td style={{padding:"9px 10px",whiteSpace:"nowrap"}}>{deal.dscr!==null?<span style={{fontWeight:700,fontSize:11,color:deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#7a6a58"}}>{deal.dscr}x</span>:<span style={{fontSize:10,color:"#5a5048"}}>N/A</span>}</td>
                  <td style={{padding:"9px 10px",textAlign:"center"}}>{deal.ss&&<span style={{fontSize:9,padding:"2px 5px",borderRadius:3,background:"rgba(192,132,252,0.12)",color:"#c084fc",fontWeight:700}}>SS</span>}</td>
                  <td style={{padding:"9px 10px",textAlign:"center"}}>{deal.wl&&<span style={{fontSize:9,padding:"2px 5px",borderRadius:3,background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:700}}>WL</span>}</td>
                  <td style={{padding:"9px 10px"}}><div style={{fontSize:10,color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shortSponsor(deal)}</div>{deal.svc&&<div style={{fontSize:9,color:"#3a3028",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{deal.svc.replace(" National Association","").replace(" Real Estate Advisors","")}</div>}</td>
                </tr>;
              })}
              {!filtered.length&&<tr><td colSpan={9} style={{padding:60,textAlign:"center",color:"#1e1a14",fontSize:12,letterSpacing:"0.15em"}}>NO DEALS MATCH CURRENT FILTERS</td></tr>}
            </tbody>
          </table>
        )}
      </div>

      {/* Inline deal panel */}
      {selected&&<DesktopDrawer deal={selected} onClose={()=>setSelected(null)} tracking={tracking} tpData={touchpoints.data} onGoToContact={goToContact}/>}
    </div>}
    <style>{"body{margin:0}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e1a14;border-radius:4px}"}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<script type="text/babel" data-presets="react">
// ── BAKER STREET CAPITAL ADVISORS — APP CODE ─────────────────────────────────
// This file contains the app logic and UI.
// Data lives in: network.js, servicers.js, deals_FL.js, deals_VA.js, deals_TX.js, deals_IL.js, deals_GA.js

// ── COMBINE ALL STATE DEALS ───────────────────────────────────────────────────
// Each state file defines e.g. TREPP_FL, TREPP_VA, etc.
// We combine them here and score each deal at load time.
const ALL_TREPP_DEALS = [
  ...(typeof TREPP_FL !== "undefined" ? TREPP_FL : []),
  ...(typeof TREPP_VA !== "undefined" ? TREPP_VA : []),
  ...(typeof TREPP_TX !== "undefined" ? TREPP_TX : []),
  ...(typeof TREPP_IL !== "undefined" ? TREPP_IL : []),
  ...(typeof TREPP_GA !== "undefined" ? TREPP_GA : []),
].map(d => ({...d, score: scoreDeal(d)}))
 .sort((a,b) => b.score - a.score);

const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreDeal(d) {
  let s = 0;
  if (d.ss) s += 40;
  if (d.dscr !== null && d.dscr !== undefined) {
    if (d.dscr < 0.75) s += 40;
    else if (d.dscr < 1.0) s += 25;
  }
  if (d.wl) s += 20;
  if (d.bal >= 50e6) s += 15;
  else if (d.bal >= 10e6) s += 10;
  const mo = d.mat ? Math.round((new Date(d.mat) - Date.now()) / (1000*60*60*24*30.44)) : null;
  if (mo !== null) {
    if (mo <= 0) s += 25;
    else if (mo <= 6) s += 25;
    else if (mo <= 12) s += 18;
    else if (mo <= 18) s += 10;
  }
  return Math.min(s, 100);
}

// ── TOUCHPOINT STORAGE ────────────────────────────────────────────────────────
const TP_STORAGE_KEY = "bs_touchpoints_v1";
const TP_TYPES = [
  {id:"brokered",  label:"Brokered / Sold",         color:"#c9914a", icon:"🏷"},
  {id:"financed",  label:"Financed / Refi'd",        color:"#60a5fa", icon:"🏦"},
  {id:"developer", label:"Developer / Sponsor Work", color:"#22c55e", icon:"🏗"},
];
const ALL_CONTACTS = [
  "Rob Vernicek","Brian Sherlock",
  ...BS_NETWORK_CONTACTS.map(c=>c.name)
];

function loadTouchpoints() { try{const r=localStorage.getItem(TP_STORAGE_KEY);return r?JSON.parse(r):{};} catch{return{};} }
function saveTouchpoints(d) { try{localStorage.setItem(TP_STORAGE_KEY,JSON.stringify(d));}catch{} }

function useTouchpoints() {
  const [data,setData]=useState(()=>loadTouchpoints());
  const add=useCallback((contactName,tp)=>{
    setData(prev=>{
      const next={...prev,[contactName]:[...(prev[contactName]||[]),{...tp,id:Date.now()+"_"+Math.random().toString(36).slice(2),addedAt:Date.now()}]};
      saveTouchpoints(next); return next;
    });
  },[]);
  const remove=useCallback((contactName,tpId)=>{
    setData(prev=>{
      const next={...prev,[contactName]:(prev[contactName]||[]).filter(t=>t.id!==tpId)};
      saveTouchpoints(next); return next;
    });
  },[]);
  const getForContact=useCallback((n)=>data[n]||[],[data]);
  const totalCount=useMemo(()=>Object.values(data).reduce((s,arr)=>s+arr.length,0),[data]);
  return {data,add,remove,getForContact,totalCount};
}

// Build verified touchpoint context string to inject into AI prompt
function buildTouchpointContext(deal, tpData) {
  const tokens = [deal.n,deal.sponsor,deal.borrower,deal.owner,deal.addr]
    .filter(Boolean).join(" ").toLowerCase()
    .split(/[\s;,|]+/).filter(t=>t.length>3);
  const hits=[];
  for(const [contact,tps] of Object.entries(tpData)){
    for(const tp of tps){
      const hay=[tp.propertyName,tp.address,tp.sponsor,tp.notes].filter(Boolean).join(" ").toLowerCase();
      if(tokens.some(tok=>hay.includes(tok)))
        hits.push({contact,tp});
    }
  }
  if(!hits.length) return "";
  const lines=hits.map(({contact,tp})=>{
    const typeLabel=TP_TYPES.find(t=>t.id===tp.type)?.label||tp.type;
    return `- ${contact}: ${typeLabel} — "${tp.propertyName||"unnamed"}"${tp.address?" at "+tp.address:""}${tp.sponsor?", sponsor/developer: "+tp.sponsor:""}${tp.year?" ("+tp.year+")":""}${tp.notes?" — "+tp.notes:""}`;
  });
  return "\n\n=== BAKER STREET LOGGED TOUCHPOINTS (team-verified, treat as HOT) ===\n"+lines.join("\n");
}

function getBSNetworkContext(deal, tpData) {
  const contactBlocks = BS_NETWORK_CONTACTS.map(c=>
    `- ${c.name} | ${c.role} at ${c.firm} | Markets: ${c.markets}\n  ${c.notes}`
  ).join("\n\n");

  const tpCtx = tpData ? buildTouchpointContext(deal, tpData) : "";

  return [
    "=== BAKER STREET CAPITAL ADVISORS — FULL NETWORK ===",
    "",
    "ROB VERNICEK (Principal):",
    BS_PRINCIPALS.rob.background,
    "Iron Hound colleagues: "+BS_PRINCIPALS.rob.ironHoundColleagues.join("; "),
    "Networks: "+BS_PRINCIPALS.rob.networks.join("; "),
    "",
    "BRIAN SHERLOCK (Principal):",
    BS_PRINCIPALS.brian.background,
    "UBS CMBS colleagues: "+BS_PRINCIPALS.brian.ubsColleagues.join("; "),
    "UBS co-issuers: "+BS_PRINCIPALS.brian.ubsCoIssuers.join("; "),
    "Networks: "+BS_PRINCIPALS.brian.networks.join("; "),
    "",
    "YOUR 14 CONTACTS:",
    contactBlocks,
    "",
    "CONFIRMED BRIDGES (always check):",
    "1. Jeff Schaeffer (Alterra) ↔ Carl Fiebig (JLL): Verified — Jeff emailed Carl about Heinz Lofts Feb 2025. HOT if sponsor has any JLL/Alterra connection.",
    "2. Eric Ramirez (ACORE) ↔ Brian: Both in UBS/CMBS/IH Capital world. Direct peer overlap NYC structured finance.",
    "3. Matthew Stefanski + Zach Pierce (Berkadia) ↔ Rob: Iron Hound worked alongside Berkadia on Mid-Atlantic MF workouts.",
    "4. Derek Weissman (Procida) ↔ Rob: Procida DIP loans overlap directly with Iron Hound distressed world.",
    "5. Jason Mandel (RCCB Law): On both lender and borrower sides — may know this borrower's situation already.",
    tpCtx,
  ].filter(s=>s!==undefined).join("\n");
}

// ── NETWORK SIDE PANEL ────────────────────────────────────────────────────────
function NetworkView({tpData, initialContact, onContactChange}) {
  const touchpoints = tpData;
  const [selectedContact, setSelectedContact] = useState(initialContact||null);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({type:"brokered", propertyName:"", address:"", sponsor:"", year:"", notes:""});
  const [search, setSearch] = useState("");
  const [draftingIntro, setDraftingIntro] = useState(false);
  const [introDraft, setIntroDraft] = useState(null);

  useEffect(()=>{ if(initialContact) setSelectedContact(initialContact); },[initialContact]);

  const tps = selectedContact ? touchpoints.getForContact(selectedContact) : [];
  const totalForSelected = tps.length;

  const filteredContacts = ALL_CONTACTS.filter(n => {
    if(!search) return true;
    const q=search.toLowerCase();
    const ct=BS_NETWORK_CONTACTS.find(x=>x.name===n);
    return n.toLowerCase().includes(q)||(ct&&(ct.firm.toLowerCase().includes(q)||(ct.markets||"").toLowerCase().includes(q)||(ct.notes||"").toLowerCase().includes(q)));
  });

  const handleAdd = () => {
    if(!form.propertyName.trim()) return;
    touchpoints.add(selectedContact, {...form});
    setForm({type:"brokered", propertyName:"", address:"", sponsor:"", year:"", notes:""});
    setAdding(false);
  };

  const selectContact = (name) => { setSelectedContact(name); setAdding(false); setIntroDraft(null); if(onContactChange) onContactChange(name); };

  const contactInfo = selectedContact ? BS_NETWORK_CONTACTS.find(c=>c.name===selectedContact) : null;
  const isBS = selectedContact==="Rob Vernicek"||selectedContact==="Brian Sherlock";

  // Find pipeline deals relevant to this contact
  const relevantDeals = useMemo(()=>{
    if(!contactInfo||typeof ALL_TREPP_DEALS==="undefined") return [];
    const nameLower = contactInfo.name.toLowerCase();
    const firmLower = (contactInfo.firm||"").toLowerCase().split(" ")[0];
    return ALL_TREPP_DEALS.filter(d=>{
      const txt=[d.sponsor,d.borrower,d.owner,d.svc,d.orig].filter(Boolean).join(" ").toLowerCase();
      return (firmLower.length>3&&txt.includes(firmLower))||(contactInfo.dealHistory||[]).some(dh=>{
        const dhTxt=(dh.property||"")+" "+(dh.notes||"")+" "+(dh.seller||"")+" "+(dh.buyer||"");
        return d.n.toLowerCase().includes((dh.property||"").toLowerCase().slice(0,12)) || txt.includes(dhTxt.toLowerCase().slice(0,12));
      });
    }).slice(0,8);
  },[selectedContact]);

  // Last touchpoint date
  const lastTp = tps.length>0 ? tps.sort((a,b)=>b.ts-a.ts)[0] : null;
  const daysSinceTp = lastTp ? Math.floor((Date.now()-lastTp.ts)/(1000*60*60*24)) : null;
  const warmth = daysSinceTp===null?"no contact":daysSinceTp<30?"hot":daysSinceTp<90?"warm":daysSinceTp<180?"cooling":"cold";
  const warmthColor = {"hot":"#22c55e","warm":"#c9914a","cooling":"#f97316","cold":"#ef4444","no contact":"#6b5a48"}[warmth];

  async function draftIntroEmail() {
    if(!contactInfo||!getStoredKey()) return;
    setDraftingIntro(true);
    try {
      const dealContext = relevantDeals.length>0 ? `Relevant deals in pipeline: ${relevantDeals.map(d=>d.n+" ("+fmtBal(d.bal)+")").join(", ")}` : "";
      const prompt = `Draft a brief, warm outreach email from Baker Street Capital Advisors to ${contactInfo.name} at ${contactInfo.firm}.

Baker Street is a CRE advisory firm run by Rob Vernicek (former Iron Hound Management, $10B+ workout experience) and Brian Sherlock (former UBS Real Estate Finance, CMBS origination).

Contact background: ${contactInfo.notes||""}
${dealContext}
Known deal history with this contact: ${(contactInfo.dealHistory||[]).map(d=>d.property+" ("+d.year+", "+d.role+")").join("; ")||"none on file"}

Write a 3-4 sentence email that:
1. References the genuine connection (shared deals, firm history, etc.)
2. Briefly mentions Baker Street's distressed CRE advisory capabilities
3. Proposes a quick call

Return only the email body text, no subject line, no JSON.`;
      const result = await callClaude(prompt, 600);
      setIntroDraft(result);
    } catch(e) { console.error(e); }
    setDraftingIntro(false);
  }

  // Network health stats for empty state
  const networkStats = useMemo(()=>{
    const total = BS_NETWORK_CONTACTS.length;
    const withDeals = BS_NETWORK_CONTACTS.filter(c=>(c.dealHistory||[]).length>0).length;
    const totalDeals = BS_NETWORK_CONTACTS.reduce((s,c)=>s+(c.dealHistory||[]).length,0);
    const allTps = touchpoints.allEntries||[];
    return {total, withDeals, totalDeals, tpCount: allTps.length};
  },[]);

  return <div style={{display:"flex",flex:1,overflow:"hidden"}}>

    {/* Left — contact list */}
    <div style={{width:selectedContact?220:280,flexShrink:0,background:"#0c0c0c",borderRight:"1px solid #1a1612",display:"flex",flexDirection:"column",overflow:"hidden",transition:"width 0.15s ease"}}>
      <div style={{padding:"12px 14px",borderBottom:"1px solid #1a1612",flexShrink:0}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.06em",marginBottom:6}}>NETWORK · {ALL_CONTACTS.length} CONTACTS</div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, firm, market..." style={{width:"100%",background:"#121212",border:"1px solid #1e1a14",borderRadius:4,color:"#f0ece6",fontSize:12,padding:"6px 9px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {/* Baker Street principals */}
        {["Rob Vernicek","Brian Sherlock"].map(name=>{
          const isSel=selectedContact===name;
          const count=touchpoints.getForContact(name).length;
          return <div key={name} onClick={()=>selectContact(name)}
            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #0e1015",borderLeft:"3px solid "+(isSel?"#c9914a":"transparent"),background:isSel?"rgba(201,145,74,0.06)":"rgba(201,145,74,0.02)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:isSel?"#c9914a":"#e0d8d0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                <div style={{fontSize:12,color:"#a09080",marginTop:1}}>Baker Street — Principal</div>
              </div>
              {count>0&&<span style={{fontSize:12,fontWeight:700,background:"rgba(201,145,74,0.15)",color:"#c9914a",borderRadius:3,padding:"1px 5px",flexShrink:0}}>{count}</span>}
            </div>
          </div>;
        })}
        <div style={{padding:"5px 14px",fontSize:12,color:"#a09080",letterSpacing:"0.06em",background:"#0a0a0a",borderBottom:"1px solid #0e1015",borderTop:"1px solid #0e1015"}}>YOUR CONTACTS</div>
        {filteredContacts.filter(n=>n!=="Rob Vernicek"&&n!=="Brian Sherlock").map(name=>{
          const count=touchpoints.getForContact(name).length;
          const isSel=selectedContact===name;
          const ct=BS_NETWORK_CONTACTS.find(x=>x.name===name);
          const lastT=count>0?touchpoints.getForContact(name).sort((a,b)=>b.ts-a.ts)[0]:null;
          const daysAgo=lastT?Math.floor((Date.now()-lastT.ts)/(1000*60*60*24)):null;
          const wColor=daysAgo===null?"#1e1a14":daysAgo<30?"#22c55e":daysAgo<90?"#c9914a":daysAgo<180?"#f97316":"#ef4444";
          return <div key={name} onClick={()=>selectContact(name)}
            style={{padding:"8px 14px",cursor:"pointer",borderBottom:"1px solid #0e1015",borderLeft:"3px solid "+(isSel?"#c9914a":"transparent"),background:isSel?"rgba(201,145,74,0.06)":"transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:12,fontWeight:isSel?700:500,color:isSel?"#c9914a":"#e0d8d0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                {ct&&<div style={{fontSize:12,color:"#b0a090",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ct.firm.split(" ").slice(0,2).join(" ")}{ct.markets?" · "+ct.markets.split(",")[0]:""}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                {daysAgo!==null&&<span style={{width:6,height:6,borderRadius:"50%",background:wColor,flexShrink:0}}/>}
                {count>0&&<span style={{fontSize:12,fontWeight:700,background:"rgba(201,145,74,0.12)",color:"#c9914a",borderRadius:3,padding:"1px 4px"}}>{count}</span>}
              </div>
            </div>
          </div>;
        })}
      </div>
      {/* Warmth legend */}
      <div style={{padding:"8px 14px",borderTop:"1px solid #0e1015",flexShrink:0}}>
        <div style={{fontSize:12,color:"#a09080",marginBottom:4}}>DOT = LAST CONTACT</div>
        <div style={{display:"flex",gap:8}}>
          {[["#22c55e","<30d"],["#c9914a","<90d"],["#f97316","<6mo"],["#ef4444","older"]].map(([col,label])=>
            <div key={label} style={{display:"flex",alignItems:"center",gap:3}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:col}}/>
              <span style={{fontSize:12,color:"#a09080"}}>{label}</span>
            </div>
          )}
        </div>
      </div>
    </div>

    {/* Right — contact profile */}
    <div style={{flex:1,overflowY:"auto",background:"#0a0a0a"}}>

      {/* Empty state — network health dashboard */}
      {!selectedContact&&<div style={{padding:"28px 32px"}}>
        <div style={{fontSize:15,fontWeight:700,color:"#f0ece6",marginBottom:4}}>Network Intelligence</div>
        <div style={{fontSize:12,color:"#a09080",marginBottom:24}}>Select a contact to view their profile, deal history, and log touchpoints.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          {[[networkStats.total,"Contacts","#c9914a"],[networkStats.withDeals,"With Deal History","#22c55e"],[networkStats.totalDeals,"Total Deals On File","#60a5fa"],[networkStats.tpCount,"Touchpoints Logged","#a855f7"]].map(([n,l,col])=>
            <div key={l} style={{background:"#0e0e0e",border:"1px solid #1a1612",borderRadius:8,padding:"14px 16px"}}>
              <div style={{fontSize:24,fontWeight:800,color:col,lineHeight:1,marginBottom:4}}>{n}</div>
              <div style={{fontSize:12,color:"#a09080"}}>{l}</div>
            </div>
          )}
        </div>
        <div style={{fontSize:12,color:"#a09080",marginBottom:12,letterSpacing:"0.03em"}}>CONFIRMED WARM PATHS</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[
            {from:"Carl Fiebig",via:"Jeff Schaeffer (Alterra)",note:"Confirmed — Feb 2025 Heinz Lofts email"},
            {from:"Eric Ramirez",via:"Brian Sherlock",note:"Direct peer — IH Capital / Iron Hound era"},
            {from:"Chris Reilly (Brookfield)",via:"Brian Sherlock",note:"Both ran UBS Large Loan Group same era"},
            {from:"Jonathan Pollack (Starwood)",via:"Brian Sherlock",note:"BREDS / UBS CMBS structured finance world"},
            {from:"Matt Stefanski",via:"Rob Vernicek",note:"Berkadia alongside Iron Hound Mid-Atlantic deals"},
          ].map((p,i)=><div key={i} style={{background:"#0e0e0e",border:"1px solid #c9914a20",borderRadius:6,padding:"9px 12px",display:"flex",gap:12,alignItems:"center"}}>
            <div style={{flex:1}}>
              <span style={{fontSize:12,color:"#f0ece6",fontWeight:600}}>{p.from}</span>
              <span style={{fontSize:12,color:"#a09080"}}> → via </span>
              <span style={{fontSize:12,color:"#c9914a",fontWeight:600}}>{p.via}</span>
            </div>
            <span style={{fontSize:12,color:"#a09080",flexShrink:0}}>{p.note}</span>
          </div>)}
        </div>
      </div>}

      {selectedContact&&<div style={{padding:"20px 28px",maxWidth:860}}>

        {/* Contact header */}
        <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#f0ece6",marginBottom:3}}>{selectedContact}</div>
            {isBS&&<div style={{fontSize:12,color:"#c9914a"}}>Baker Street Capital Advisors — Principal</div>}
            {contactInfo&&<div style={{fontSize:12,color:"#c9914a",marginBottom:2}}>{contactInfo.role}</div>}
            {contactInfo&&<div style={{fontSize:12,color:"#b0a090"}}>{contactInfo.firm} · {contactInfo.markets}</div>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {daysSinceTp!==null&&<div style={{textAlign:"center"}}>
              <div style={{fontSize:12,color:"#a09080",marginBottom:2}}>LAST CONTACT</div>

// ── TREPP PARSER ─────────────────────────────────────────────────────────────
function parseTreppXLSX(buffer) {
  const wb = XLSX.read(buffer, {type:"array", cellDates:false});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let headerIdx = -1;
  for (let i = 0; i < Math.min(raw.length,12); i++) {
    const row = raw[i];
    if (row && row.some(c=>String(c||"").includes("Property Name")) && row.some(c=>String(c||"").includes("Current Balance"))) { headerIdx=i; break; }
  }
  if (headerIdx < 0) throw new Error("Could not find header row. Make sure this is a Trepp Market Loan Listing export.");
  const headers = raw[headerIdx].map(h=>String(h||"").trim());
  const dataRows = raw.slice(headerIdx+1);
  function col(row,...names) { for (const name of names) { const idx=headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase())); if (idx>=0&&row[idx]!=null) return row[idx]; } return null; }
  function cleanNum(v) { if (!v&&v!==0) return null; const n=parseFloat(String(v).replace(/,/g,"")); return isNaN(n)?null:n; }
  function cleanDate(v) {
    if (!v) return null;
    const s=String(v).trim();
    if (/^\d{5}$/.test(s)) { const d=XLSX.SSF.parse_date_code(parseInt(s)); return d.y+"-"+String(d.m).padStart(2,"0")+"-"+String(d.d).padStart(2,"0"); }
    const parts=s.split("/");
    if (parts.length===3&&parts[2].length===4) return parts[2]+"-"+parts[0].padStart(2,"0")+"-"+parts[1].padStart(2,"0");
    return s;
  }
  const deals=[], seen=new Set();
  for (const row of dataRows) {
    if (!row||!row.some(Boolean)) continue;
    const name=String(col(row,"Property Name")||"").trim();
    if (!name||name.length<2) continue;
    const bal=cleanNum(col(row,"Current Balance")); if (!bal||bal<1) continue;
    const key=name.toLowerCase()+"|"+(String(col(row,"Address")||"").toLowerCase());
    if (seen.has(key)) continue; seen.add(key);
    const d={
      n:name,
      src:String(col(row,"Source")||"").trim(),
      addr:String(col(row,"Address")||"").trim(),
      city:String(col(row,"City")||"").trim(),
      state:String(col(row,"State")||"").trim(),
      zip:String(col(row,"Zip","Zip Code")||"").trim(),
      type:String(col(row,"Property Type")||"").trim(),
      bal,
      origBal:cleanNum(col(row,"Original Balance","Original Loan Balance","Orig Balance")),
      mat:cleanDate(col(row,"Maturity Date")),
      origMat:cleanDate(col(row,"Original Maturity","Original Maturity Date")),
      intRate:cleanNum(col(row,"Interest Rate","Note Rate","Coupon")),
      intType:String(col(row,"Interest Rate Type","Rate Type")||"").trim(),
      amort:String(col(row,"Amortization","Amortization Type")||"").trim(),
      term:cleanNum(col(row,"Loan Term","Term")),
      units:cleanNum(col(row,"Number of Units","Units","Beds","Number of Beds")),
      sqft:cleanNum(col(row,"Square Feet","GLA","SF","Sq Ft")),
      occup:cleanNum(col(row,"Occupancy","Physical Occupancy","Most Recent Occupancy")),
      noi:cleanNum(col(row,"Most Recent NOI","NOI","Net Operating Income")),
      rev:cleanNum(col(row,"Most Recent Revenue","Revenue","Gross Revenue")),
      appVal:cleanNum(col(row,"Appraised Value","Appraisal Value","Most Recent Value")),
      appDate:cleanDate(col(row,"Appraisal Date","Most Recent Appraisal Date")),
      ltv:cleanNum(col(row,"LTV","Loan to Value","Current LTV")),
      dscr:cleanNum(col(row,"Most Recent DSCR","DSCR","NCF DSCR")),
      dscrDate:cleanDate(col(row,"DSCR Date","Most Recent DSCR Date")),
      ss:String(col(row,"Spec Serv Status","Special Servicer Status")||"").toLowerCase()==="yes",
      ssDate:cleanDate(col(row,"Special Servicer Transfer Date","SS Transfer Date")),
      wl:String(col(row,"Watchlist Status")||"").toLowerCase()==="yes",
      wlReason:String(col(row,"Watchlist Reason")||"").trim(),
      svc:String(col(row,"Special Servicer")||"").trim(),
      masterSvc:String(col(row,"Master Servicer")||"").trim(),
      orig:String(col(row,"Originator")||"").trim(),
      pool:String(col(row,"Pool Name","Deal Name","CMBS Deal")||"").trim(),
      cusip:String(col(row,"CUSIP")||"").trim(),
      owner:String(col(row,"Owner 1 Name","Owner")||"").trim(),
      sponsor:String(col(row,"Sponsor")||"").trim(),
      borrower:String(col(row,"Original Borrower Name","Borrower")||"").trim(),
      modFlag:String(col(row,"Modification Flag","Modified","Loan Modification")||"").trim(),
      extFlag:String(col(row,"Extension Flag","Extended","Extension Option")||"").trim(),
      defFlag:String(col(row,"Delinquency Status","Delinquent","Delinquency")||"").trim(),
    };
    d.score=scoreDeal(d); deals.push(d);
  }
  return deals.sort((a,b)=>b.score-a.score);
}

function tier(score) {
  if (score>=90) return {label:"CRITICAL",color:"#ef4444",bg:"rgba(239,68,68,0.12)",text:"#fca5a5"};
  if (score>=75) return {label:"HIGH",    color:"#f97316",bg:"rgba(249,115,22,0.12)",text:"#fdba74"};
  if (score>=60) return {label:"ELEVATED",color:"#eab308",bg:"rgba(234,179,8,0.12)", text:"#fde047"};
  return              {label:"WATCH",   color:"#b0a090",bg:"rgba(107,114,128,0.12)",text:"#9ca3af"};
}
function fmtBal(n) { if (!n) return "—"; if (n>=1e9) return "$"+(n/1e9).toFixed(1)+"B"; if (n>=1e6) return "$"+(n/1e6).toFixed(1)+"M"; return "$"+n.toLocaleString(); }
function fmtMat(s) { if (!s) return "—"; return new Date(s).toLocaleDateString("en-US",{month:"short",year:"numeric"}); }
function moOut(s)  { if (!s) return null; return Math.round((new Date(s)-Date.now())/(1000*60*60*24*30.44)); }
function shortSponsor(d) { const r=d.sponsor||d.borrower||d.owner||""; if (!r) return "—"; return r.split(";")[0].trim().split(",")[0].trim().slice(0,36); }
function daysSince(ts) { if (!ts) return null; return Math.floor((Date.now()-ts)/(1000*60*60*24)); }

function loadTracking() { try { const r=localStorage.getItem("bs_outreach"); return r?JSON.parse(r):{}; } catch { return {}; } }
function saveTracking(data) { try { localStorage.setItem("bs_outreach",JSON.stringify(data)); } catch {} }
function useTracking() {
  const [data,setData]=useState(()=>loadTracking());
  const update=useCallback((deal,fields)=>{ setData(prev=>{ const k=dealKey(deal); const next={...prev,[k]:{...(prev[k]||{}),...fields,updatedAt:Date.now()}}; saveTracking(next); return next; }); },[]);
  const get=useCallback((deal)=>data[dealKey(deal)]||null,[data]);
  const logEmail=useCallback((deal,dmName)=>{ setData(prev=>{ const k=dealKey(deal); const ex=prev[k]||{}; const next={...prev,[k]:{...ex,status:ex.status||"emailed",emailedAt:ex.emailedAt||Date.now(),dmName:dmName||ex.dmName||"",history:[...(ex.history||[]),{action:"emailed",at:Date.now(),dm:dmName}],updatedAt:Date.now()}}; saveTracking(next); return next; }); },[]);
  const allEntries=useMemo(()=>Object.entries(data).map(([k,v])=>({key:k,...v})),[data]);
  return {get,update,logEmail,allEntries};
}

// ── API CALLS ─────────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens=1500) {
  const apiKey=getStoredKey();
  if (!apiKey||apiKey.length<20) throw new Error("__NO_KEY__");
  let res;
  try {
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
    });
  } catch(networkErr) {
    throw new Error("Network error — check your internet connection.\n\nDetail: "+networkErr.message);
  }
  if (!res.ok) {
    let msg="API error "+res.status;
    try { const t=await res.text(); const j=JSON.parse(t); msg=j.error&&j.error.message?j.error.message:"HTTP "+res.status+": "+t.slice(0,100); } catch {}
    if (res.status===401) throw new Error("__INVALID_KEY__: Invalid API key. Check your key at console.anthropic.com/keys");
    if (res.status===429) throw new Error("Rate limit hit — wait 30 seconds and retry.");
    throw new Error(msg);
  }
  const data=await res.json();
  if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  const text=(data.content&&data.content[0]&&data.content[0].text)||"";
  if (!text) throw new Error("Empty response from API — retry.");
  return text;
}

// Claude with web_search tool enabled — for deal history forensics
async function callClaudeWithSearch(prompt, maxTokens=8000) {
  const apiKey=getStoredKey();
  if (!apiKey||apiKey.length<20) throw new Error("__NO_KEY__");
  let res;
  try {
    res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:maxTokens,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:prompt}]
      })
    });
  } catch(networkErr) {
    throw new Error("Network error — check your internet connection.\n\nDetail: "+networkErr.message);
  }
  if (!res.ok) {
    let msg="API error "+res.status;
    try { const t=await res.text(); const j=JSON.parse(t); msg=j.error&&j.error.message?j.error.message:"HTTP "+res.status+": "+t.slice(0,100); } catch {}
    if (res.status===401) throw new Error("__INVALID_KEY__: Invalid API key.");
    if (res.status===429) throw new Error("Rate limit hit — wait 30 seconds and retry.");
    throw new Error(msg);
  }
  const data=await res.json();
  if (data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  // Collect all text blocks from the response (search results + final answer)
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  if (!text) throw new Error("Empty response from API — retry.");
  return text;
}

// ── CITE TAG STRIPPER ────────────────────────────────────────────────────────
function stripCite(text) {
  if(!text) return text;
  return String(text)
    .replace(/<cite[^>]*>/gi, '')
    .replace(/<\/cite>/gi, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// ── TWO-STAGE RESEARCH ───────────────────────────────────────────────────────
function researchKey(deal) { return "bs_s1_"+btoa(unescape(encodeURIComponent((deal.n+deal.addr).slice(0,80)))).slice(0,40); }
function forensicsKey(deal) { return "bs_s2_"+btoa(unescape(encodeURIComponent((deal.n+deal.addr).slice(0,80)))).slice(0,40); }
function loadResearch(deal) { try { const r=localStorage.getItem(researchKey(deal)); return r?JSON.parse(r):null; } catch { return null; } }
function saveResearch(deal,data) { try { localStorage.setItem(researchKey(deal),JSON.stringify(data)); } catch {} }
function loadForensics(deal) { try { const r=localStorage.getItem(forensicsKey(deal)); return r?JSON.parse(r):null; } catch { return null; } }
function saveForensics(deal,data) { try { localStorage.setItem(forensicsKey(deal),JSON.stringify(data)); } catch {} }

// STAGE 1 — targeted web search: who is this sponsor, who are the DMs, where does our network touch
async function fetchDealResearch(deal, tpData) {
  const mo=moOut(deal.mat);
  const sponsorRaw=[deal.sponsor,deal.borrower,deal.owner].filter(Boolean).join(" | ")||"Unknown";
  const isGenericLLC=/LLC|LP|INC|CORP|TRUST|FUND|HOLDINGS|PROPCO/i.test(sponsorRaw) && !/[A-Z][a-z]+ [A-Z][a-z]+/.test(sponsorRaw);
  const networkCtx=getBSNetworkContext(deal, tpData);

  const prompt=
`You are a CRE intelligence analyst for Baker Street Capital Advisors. Run focused web searches on this sponsor, then respond ONLY with a JSON object — no markdown, no explanation.

${networkCtx}

=== DEAL ===
Property: ${deal.n}
Address: ${deal.addr}, ${deal.city}
Type: ${deal.type} | Balance: ${fmtBal(deal.bal)}
Maturity: ${fmtMat(deal.mat)}${mo!==null?" ("+(mo<=0?"PAST MATURITY":mo+" months out")+")":""}
DSCR: ${deal.dscr!==null?deal.dscr+"x":"N/A"} | Servicer: ${deal.svc||"unknown"}
Special Servicer: ${deal.ss?"YES":"No"} | Watchlist: ${deal.wl?"Yes":"No"}
Sponsor/Borrower from Trepp: ${sponsorRaw}
${isGenericLLC?`\n⚠️ GENERIC LLC: Search for real principals via state filings, property address records, registered agent.`:""}

=== SEARCH INSTRUCTIONS ===
Run 2-4 focused searches:
1. "${sponsorRaw.split("|")[0].trim()}" real estate firm principals executives
2. Key principal names + "real estate" OR "CRE" to find their backgrounds
3. Any other targeted searches to confirm identities and contact info

=== YOUR JOB ===
FIRM: Full legal name, HQ, founded, portfolio size/value, asset classes, geographic focus, equity partners, lenders used, notable transactions, prior distress/workouts, current condition.
PEOPLE (2 tiers): Tier 1 = CEO/Owner/Managing Partner — every prior job (firm, title, years), education (school, degree, year), board seats, email, LinkedIn, phone, market reputation, why they matter, outreach angle. Tier 2 = 2-3 second-degree contacts (CFO/GC/COO/Head AM) — same depth.
CONNECTIONS: Cross-reference every DM against all Baker Street contacts above. HOT = specific named deal or confirmed working relationship. WARM = shared firm alumni or credible second-degree path. COLD = plausible but unverified. Never cite generic market overlap. Never fabricate.

{"firm":"","hq":"","founded":"","portfolioSize":"","portfolioValue":"","assetClasses":"","geographicFocus":"","equityPartners":"","lendersUsed":"","notableDeals":"","priorDistress":"","firmBackground":"3-4 sentences","distressContext":"why this loan is in distress now","recentIntel":"specific recent news","people":[{"name":"","title":"","tier":1,"priority":true,"workHistory":[{"firm":"","role":"","years":""}],"education":[{"school":"","degree":""}],"boardSeats":"","background":"full narrative","email":"or Unknown","linkedin":"URL or Unknown","phone":"or Unknown","whyTheyMatter":"","outreachAngle":""}],"connections":[{"person":"DM name","via":"You or Rob or Brian","strength":"hot or warm or cold","explanation":"SPECIFIC: Baker Street contact + DM + named firm/deal/relationship","suggestedOpener":"one warm sentence"}],"researchNotes":"gaps to verify"}`;

  const raw=await callClaudeWithSearch(prompt, 6000);
  const clean=raw.trim().replace(/^```json\s*/i,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
  let parsed;
  try { parsed=JSON.parse(clean); }
  catch(e1) {
    const m=clean.match(/\{[\s\S]*\}/);
    if(m) { try { parsed=JSON.parse(m[0]); } catch(e2) { throw new Error("Response was not valid JSON.\n\n"+clean.slice(0,200)); } }
    else throw new Error("No JSON found in response.\n\n"+clean.slice(0,300));
  }
  if(!parsed.firm && !parsed.people) throw new Error("Response missing required fields.");
  return parsed;
}

async function draftEmail(deal, tone, length) {
  const mo=moOut(deal.mat);
  const svc=getServicer(deal.svc);
  const cachedIntel=loadResearch(deal);
  const dm=cachedIntel&&cachedIntel.people&&cachedIntel.people.find(p=>p.priority);
  const firstName=dm?dm.name.split(" ")[0]:"there";
  const firmName=cachedIntel?cachedIntel.firm:(deal.sponsor||deal.borrower||deal.n).split(";")[0].trim();
  const connPath=cachedIntel&&cachedIntel.connections&&cachedIntel.connections[0];
  const senderNote=connPath
    ?"SENDER: "+(connPath.via==="Rob"?"Rob Vernicek (Iron Hound ~10yr, $10B+ workouts, OneFive Capital multifamily operator)":"connPath.via"==="Brian"?"Brian Sherlock (UBS CMBS Director, Iron Hound)":"Baker Street Capital Advisors")+". Warm connection: "+connPath.explanation+" Use this opener: "+connPath.suggestedOpener
    :"SENDER: Brian Sherlock, Principal — Baker Street Capital Advisors. $10B+ closed, Iron Hound Management and UBS Real Estate Finance background.";
  const toneMap={blunt:"Blunt and direct. Zero wind-up. First sentence is the point.",peer:"Collegial peer. Calm confidence. Not selling — acknowledging.",quiet:"Quietly confident. Shows specific knowledge without broadcasting it."};
  const lenMap={ultra:"3 sentences maximum. Nothing else.",short:"2 paragraphs. Under 100 words.",medium:"3 paragraphs. Under 160 words."};
  const neverDo="Never mention term sheets or LOIs. Never use: solutions, partnership, synergy, reach out, touch base, value-add. Never reference DSCR number directly. Never open with pleasantries. Never use exclamation points. Goal: ONE thing — get a 15-minute call.";
  const prompt=["You are writing a CRE debt restructuring outreach email for Baker Street Capital Advisors.",
    senderNote,getBSNetworkContext(),"",
    "RECIPIENT: "+firstName+", "+(dm?dm.title:"Principal")+" at "+firmName,
    dm&&dm.background?"RECIPIENT BACKGROUND: "+dm.background:"",
    dm&&dm.outreachAngle?"OUTREACH ANGLE: "+dm.outreachAngle:"",
    cachedIntel&&cachedIntel.recentIntel&&cachedIntel.recentIntel!=="No public intel found"?"INTEL: "+cachedIntel.recentIntel:"","",
    "PROPERTY: "+deal.n+" — "+deal.type+" at "+deal.addr+", "+deal.city,
    "LOAN: "+fmtBal(deal.bal)+" | "+deal.src,
    "MATURITY: "+fmtMat(deal.mat)+(mo!==null?" — "+(mo<=0?"PAST MATURITY":mo+" months remaining"):""),
    deal.ss?"SERVICER STATUS: Special servicer active ("+deal.svc+"). "+(svc?svc.approach+" Timeline: "+svc.timeline:""):(deal.svc?"SERVICER: "+deal.svc:""),
    deal.wl?"WATCHLIST: Yes":"","",
    "TONE: "+(toneMap[tone]||toneMap.peer),
    "LENGTH: "+(lenMap[length]||lenMap.short),"",
    "RULES: "+neverDo,"",
    "Write a subject line specific to this deal — reads like an internal memo, not marketing.",
    'Respond ONLY with valid JSON, no markdown: {"subject":"...","body":"..."}',
  ].filter(Boolean).join("\n");
  const raw=await callClaude(prompt,1000);
  const clean=raw.trim().replace(/^```json\s*/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  let parsed;
  try { parsed=JSON.parse(clean); } catch {
    const m=clean.match(/\{[\s\S]*\}/);
    if (m) { try { parsed=JSON.parse(m[0]); } catch { throw new Error("Parse failed: "+clean.slice(0,100)); } }
    else throw new Error("No JSON: "+clean.slice(0,100));
  }
  if (!parsed.subject||!parsed.body) throw new Error("Missing subject or body");
  return parsed;
}

    if(!force){ const c=loadResearch(deal); if(c){setData(c);setState("done");return;} }
    setState("loading"); setErr(""); setData(null);
    try {
      const r=await fetchDealResearch(deal, tpData);
      saveResearch(deal,r); setData(r); setState("done");
    } catch(e) {
      const msg=e.message||String(e);

      const r=await fetchDealForensics(deal, tpData);

  const isMatch=(row)=>{
    if(!row) return false;
    const haystack=[row.broker,row.lender,row.seller,row.buyer,row.notes,...(row.networkMatch||[])].filter(Boolean).join(" ").toLowerCase();
    return bsNames.some(n=>haystack.includes(n.toLowerCase()))||bsFirms.some(f=>f.length>3&&haystack.includes(f.toLowerCase()));
  };
  const histDeals=forensics?.deals||[];
  const matchCount=histDeals.filter(isMatch).length;
  const filteredDeals=histDeals.filter(row=>{
    if(histFilter==="matched") return isMatch(row);
    if(histFilter==="sale") return (row.transactionType||"").toLowerCase().includes("sale")||(row.transactionType||"").toLowerCase().includes("acqui");
    if(histFilter==="financing") return (row.transactionType||"").toLowerCase().includes("financ")||(row.transactionType||"").toLowerCase().includes("loan")||(row.transactionType||"").toLowerCase().includes("refi");
    return true;
  });
  const conf={confirmed:{label:"✓",color:"#22c55e"},probable:{label:"~",color:"#eab308"},speculative:{label:"?",color:"#a09080"}};
  const SMETA={hot:{icon:"🔥",label:"HOT",color:"#ef4444",bg:"rgba(239,68,68,0.07)"},warm:{icon:"🤝",label:"WARM",color:"#f97316",bg:"rgba(249,115,22,0.07)"},cold:{icon:"📧",label:"COLD",color:"#b0a090",bg:"rgba(107,114,128,0.07)"}};

  return <div style={{padding:"4px 0"}}>
    {/* Sponsor firm card */}
    <div style={{background:"#0a1520",border:"1px solid #1e3a5f40",borderRadius:8,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div><div style={{fontSize:16,fontWeight:700,color:"#f0ece6",marginBottom:2}}>{d.firm||"Unknown Firm"}</div>{d.hq&&<div style={{fontSize:12,color:"#a09080"}}>{d.hq}{d.founded&&d.founded!=="Unknown"?" · Est. "+d.founded:""}</div>}</div>
        <button onClick={()=>run(true)} title="Re-run Stage 1" style={{background:"transparent",border:"1px solid #1e1a14",borderRadius:4,color:"#a09080",fontSize:12,cursor:"pointer",padding:"3px 7px",fontFamily:"inherit"}}>↻</button>
      </div>
      <div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.8,marginBottom:10}}>{stripCite(d.firmBackground)}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 16px",marginBottom:10}}>
        {[["PORTFOLIO",d.portfolioSize],["ASSET CLASSES",d.assetClasses],["MARKETS",d.geographicFocus],["EQUITY PARTNERS",d.equityPartners],["LENDERS USED",d.lendersUsed]].map(([label,val])=>val&&val!=="Unknown"&&val!=="unknown"?<div key={label}><div style={{fontSize:12,color:"#b0a090",marginBottom:2,letterSpacing:"0.03em"}}>{label}</div><div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.5}}>{stripCite(val)}</div></div>:null)}
      </div>
      {d.notableDeals&&d.notableDeals!=="Unknown"&&<div style={{background:"rgba(96,165,250,0.04)",border:"1px solid #60a5fa15",borderRadius:5,padding:"8px 10px",marginBottom:8}}><div style={{fontSize:12,color:"#60a5fa",marginBottom:3}}>NOTABLE DEALS</div><div style={{fontSize:12,color:"#b8c0cc",lineHeight:1.6}}>{stripCite(d.notableDeals)}</div></div>}
      {d.distressContext&&<div style={{background:"rgba(249,115,22,0.06)",border:"1px solid #f9731620",borderRadius:5,padding:"8px 10px",marginBottom:6}}><span style={{fontSize:12,color:"#f97316",marginRight:8}}>DISTRESS</span><span style={{fontSize:12,color:"#ddd8d0"}}>{stripCite(d.distressContext)}</span></div>}
      {d.recentIntel&&d.recentIntel!=="No public intel found"&&d.recentIntel!=="none found"&&<div style={{background:"rgba(234,179,8,0.06)",border:"1px solid #eab30820",borderRadius:5,padding:"8px 10px"}}><span style={{fontSize:12,color:"#eab308",marginRight:8}}>INTEL</span><span style={{fontSize:12,color:"#ddd8d0"}}>{stripCite(d.recentIntel)}</span></div>}
    </div>

    {/* ── STAGE 2 TRIGGER — prominent, right after firm card ── */}
    {fState==="idle"&&<button onClick={runForensics}
      style={{width:"100%",padding:"13px 0",marginBottom:14,background:"linear-gradient(135deg,#0d1a14,#0f2a1e)",border:"1px solid #22c55e35",borderRadius:8,color:"#22c55e",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:10,letterSpacing:"0.06em"}}>
      <span style={{fontSize:16}}>🔎</span>
      <span>PULL DEAL HISTORY</span>
      <span style={{fontSize:12,color:"#22c55e80",fontWeight:400}}>deep forensics · web search · ~20 sec</span>
    </button>}
    {fState==="loading"&&<div style={{width:"100%",padding:"13px 0",marginBottom:14,background:"rgba(34,197,94,0.04)",border:"1px solid #22c55e25",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
      <span style={{fontSize:16,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>
      <span style={{fontSize:12,color:"#22c55e",letterSpacing:"0.03em"}}>DIGGING DEAL HISTORY</span>
      <span style={{fontSize:12,color:"#22c55e60"}}>LLC forensics · deed records · broker/lender matching</span>
    </div>}
    {fState==="error"&&<div style={{marginBottom:14,background:"rgba(239,68,68,0.06)",border:"1px solid #ef444425",borderRadius:8,padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:12,color:"#ef4444",fontWeight:700}}>Deal history search failed</span>
        <button onClick={runForensics} style={{padding:"3px 10px",background:"rgba(239,68,68,0.1)",border:"1px solid #ef444430",borderRadius:4,color:"#ef4444",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>↺ Retry</button>
      </div>
      <div style={{fontSize:12,color:"#fca5a5",fontFamily:"monospace",lineHeight:1.5,wordBreak:"break-all"}}>{fErr}</div>
    </div>}

    {/* Decision makers */}
    {d.people&&d.people.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:12,letterSpacing:"0.07em",color:"#a09080",marginBottom:8}}>DECISION MAKERS</div>
      {d.people.map((p,i)=>{
        const isOpen=expandPerson==="all"||expandPerson===i;
        return <div key={i} onClick={()=>setExpandPerson(isOpen&&expandPerson!=="all"?null:isOpen?i:i)}
          style={{background:p.priority?"#091610":"#0e0e0e",border:"1px solid "+(p.priority?"#22c55e30":"#1e1a14"),borderRadius:7,padding:"11px 14px",marginBottom:8,cursor:"pointer"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=p.priority?"#22c55e60":"#6b5a48"}
          onMouseLeave={e=>e.currentTarget.style.borderColor=p.priority?"#22c55e30":"#1e1a14"}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                {p.priority&&<span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>}
                <span style={{fontSize:14,fontWeight:700,color:"#f0ece6"}}>{p.name}</span>
                {p.tier===1&&<span style={{fontSize:12,color:"#22c55e",background:"rgba(34,197,94,0.08)",padding:"1px 6px",borderRadius:3,border:"1px solid #22c55e20"}}>PRIMARY DM</span>}
                {p.tier===2&&<span style={{fontSize:12,color:"#60a5fa",background:"rgba(96,165,250,0.08)",padding:"1px 6px",borderRadius:3,border:"1px solid #60a5fa20"}}>2ND DEGREE</span>}
              </div>
              <div style={{fontSize:12,color:"#a09080"}}>{p.title}</div>
            </div>
            <span style={{fontSize:12,color:"#a09080",marginLeft:8}}>{isOpen?"▲":"▼"}</span>
          </div>
          {isOpen&&<div style={{marginTop:10,borderTop:"1px solid #141414",paddingTop:10}}>
            {p.background&&<div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.8,marginBottom:8}}>{stripCite(p.background)}</div>}
            {p.workHistory&&p.workHistory.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:12,color:"#a09080",marginBottom:4,letterSpacing:"0.03em"}}>CAREER</div>
              {p.workHistory.map((w,j)=><div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
                <div><span style={{fontSize:12,fontWeight:600,color:"#ddd8d0"}}>{w.role}</span><span style={{fontSize:12,color:"#a09080"}}> · {w.firm}</span></div>
                <span style={{fontSize:12,color:"#a09080",marginLeft:8,flexShrink:0}}>{w.years}</span>
              </div>)}
            </div>}
            {p.education&&p.education.length>0&&p.education[0].school&&p.education[0].school!=="Unknown"&&<div style={{marginBottom:8}}>
              <div style={{fontSize:12,color:"#a09080",marginBottom:4,letterSpacing:"0.03em"}}>EDUCATION</div>
              {p.education.map((e,j)=><div key={j} style={{fontSize:12,color:"#b0a090",marginBottom:2}}>{e.school}{e.degree&&e.degree!=="Unknown"?" — "+e.degree:""}</div>)}
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
              {p.email&&p.email!=="Unknown"&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>EMAIL</div><div style={{fontSize:12,color:"#60a5fa",wordBreak:"break-all"}}>{p.email}</div></div>}
              {p.phone&&p.phone!=="Unknown"&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>PHONE</div><div style={{fontSize:12,color:"#ddd8d0"}}>{p.phone}</div></div>}
              {p.linkedin&&p.linkedin!=="Unknown"&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>LINKEDIN</div><div style={{fontSize:12,color:"#60a5fa",wordBreak:"break-all"}}>{p.linkedin}</div></div>}
            </div>
            {p.whyTheyMatter&&<div style={{background:"rgba(34,197,94,0.05)",border:"1px solid #22c55e20",borderRadius:4,padding:"6px 9px",marginBottom:6}}><div style={{fontSize:12,color:"#22c55e",marginBottom:2}}>WHY THEY MATTER</div><div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.5}}>{stripCite(p.whyTheyMatter)}</div></div>}
            {p.outreachAngle&&<div style={{background:"rgba(234,179,8,0.05)",border:"1px solid #eab30820",borderRadius:4,padding:"6px 9px"}}><div style={{fontSize:12,color:"#eab308",marginBottom:2}}>OUTREACH ANGLE</div><div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.5}}>{stripCite(p.outreachAngle)}</div></div>}
          </div>}
        </div>;
      })}
    </div>}

    {/* Connections */}
    {d.connections&&d.connections.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:12,letterSpacing:"0.07em",color:"#a09080",marginBottom:8}}>NETWORK CONNECTIONS</div>
      {d.connections.map((c,i)=>{
        const sm=SMETA[c.strength]||SMETA.cold;
        const bsContact=BS_NETWORK_CONTACTS.find(x=>c.explanation&&c.explanation.includes(x.name));
        const viaName=c.via==="Rob"?"Rob Vernicek":c.via==="Brian"?"Brian Sherlock":bsContact?.name||null;
        return <div key={i} style={{background:sm.bg,border:"1px solid "+(sm.color+"30"),borderRadius:6,padding:"10px 12px",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,color:sm.color,padding:"1px 6px",background:sm.color+"18",borderRadius:3,border:"1px solid "+sm.color+"30"}}>{sm.icon} {sm.label}</span>
            <span style={{fontSize:12,fontWeight:600,color:"#f0ece6"}}>{c.person}</span>
            {viaName&&onGoToContact
              ? <span onClick={()=>onGoToContact(viaName)} style={{fontSize:12,color:"#c9914a",cursor:"pointer",textDecoration:"underline",textUnderlineOffset:2}}>via {viaName} →</span>
              : <span style={{fontSize:12,color:"#a09080"}}>via {c.via}</span>
            }
          </div>
          <div style={{fontSize:12,color:"#b8c0cc",lineHeight:1.5,marginBottom:c.suggestedOpener?6:0}}>{c.explanation}</div>
          {c.suggestedOpener&&<div style={{background:"rgba(201,145,74,0.06)",border:"1px solid #c9914a20",borderRadius:4,padding:"6px 9px"}}>
            <div style={{fontSize:12,color:"#c9914a",marginBottom:2}}>SUGGESTED OPENER</div>
            <div style={{fontSize:12,color:"#f0ece6",lineHeight:1.5,fontStyle:"italic"}}>{c.suggestedOpener}</div>
          </div>}
        </div>;
      })}
    </div>}

    {/* Stage 2 deal history results */}
    {fState==="done"&&forensics&&histDeals.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:12,letterSpacing:"0.07em",color:"#a09080",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>DEAL HISTORY FORENSICS</span>
        <button onClick={()=>{saveForensics(deal,null);try{localStorage.removeItem(forensicsKey(deal));}catch{}setForensics(null);setFState("idle");}} style={{fontSize:12,padding:"2px 7px",background:"transparent",border:"1px solid #1e1a14",borderRadius:3,color:"#a09080",cursor:"pointer",fontFamily:"inherit"}}>↻ re-run</button>
      </div>
      {forensics.sponsor?.forensicNotes&&forensics.sponsor.forensicNotes!=="None"&&<div style={{background:"rgba(249,115,22,0.06)",border:"1px solid #f9731620",borderRadius:5,padding:"8px 10px",marginBottom:8}}>
        <div style={{fontSize:12,color:"#f97316",marginBottom:3}}>FORENSIC FINDINGS</div>
        <div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.6}}>{forensics.sponsor.forensicNotes}</div>
      </div>}
      <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
        {[["all","All ("+histDeals.length+")"],["matched","Network ("+matchCount+")"],["sale","Sales"],["financing","Financings"]].map(([v,l])=>(
          <button key={v} onClick={()=>setHistFilter(v)} style={{padding:"4px 10px",borderRadius:4,border:"1px solid",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",borderColor:histFilter===v?"#a78bfa":"#1e1a14",background:histFilter===v?"rgba(167,139,250,0.12)":"transparent",color:histFilter===v?"#a78bfa":"#8a7a6a"}}>{l}</button>
        ))}
      </div>
      {filteredDeals.length===0&&<div style={{fontSize:12,color:"#a09080",textAlign:"center",padding:"20px 0"}}>No deals match this filter</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filteredDeals.map((row,i)=>{
          const match=isMatch(row);
          const c=conf[row.confidence]||conf.speculative;
          return <div key={i} style={{background:match?"rgba(201,145,74,0.05)":"#0e0e0e",border:"1px solid "+(match?"#c9914a30":"#141414"),borderRadius:6,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                  {match&&<span style={{fontSize:12,fontWeight:700,background:"rgba(201,145,74,0.2)",color:"#c9914a",borderRadius:3,padding:"1px 6px",border:"1px solid #c9914a30",flexShrink:0}}>⚡ NETWORK MATCH</span>}
                  <span style={{fontSize:12,color:c.color,fontWeight:700,flexShrink:0}}>{c.label}</span>
                  <span style={{fontSize:12,fontWeight:600,color:"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.propertyName||"Unknown Property"}</span>
                </div>
                <div style={{fontSize:12,color:"#a09080"}}>{[row.city,row.type,row.transactionType].filter(Boolean).join(" · ")}{row.year?" · "+row.year:""}</div>
              </div>
              {row.amount&&<span style={{fontSize:12,fontWeight:700,color:"#c9914a",flexShrink:0}}>{row.amount}</span>}
            </div>
            {match&&row.networkMatch?.length>0&&<div style={{background:"rgba(201,145,74,0.08)",border:"1px solid #c9914a20",borderRadius:4,padding:"5px 8px",marginBottom:6}}>
              <div style={{fontSize:12,color:"#c9914a",marginBottom:2}}>BAKER STREET CONNECTION</div>
              <div style={{fontSize:12,color:"#f0ece6",fontWeight:600}}>{row.networkMatch.join(", ")}</div>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px"}}>
              {row.broker&&row.broker!=="Unknown"&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>BROKER</div><div style={{fontSize:12,color:"#b8c0cc",lineHeight:1.4}}>{row.broker}</div></div>}
              {row.lender&&row.lender!=="Unknown"&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>LENDER</div><div style={{fontSize:12,color:"#b8c0cc",lineHeight:1.4}}>{row.lender}</div></div>}
            </div>
            {(row.seller||row.buyer)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px",marginTop:4}}>
              {row.seller&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>SELLER</div><div style={{fontSize:12,color:"#b0a090"}}>{row.seller}</div></div>}
              {row.buyer&&<div><div style={{fontSize:12,color:"#a09080",marginBottom:1}}>BUYER</div><div style={{fontSize:12,color:"#b0a090"}}>{row.buyer}</div></div>}
            </div>}
            {row.notes&&<div style={{fontSize:12,color:"#a09080",marginTop:5,lineHeight:1.5,paddingTop:5,borderTop:"1px solid #121212"}}>{row.notes}</div>}
          </div>;
        })}
      </div>
      {forensics.researchSummary&&<div style={{marginTop:10,background:"#0a0c10",border:"1px solid #1a1612",borderRadius:5,padding:"8px 10px"}}>
        <div style={{fontSize:12,color:"#a09080",marginBottom:3,letterSpacing:"0.03em"}}>RESEARCH SUMMARY</div>
        <div style={{fontSize:12,color:"#a09080",lineHeight:1.6}}>{forensics.researchSummary}</div>
      </div>}
    </div>}

    {d.researchNotes&&<div style={{marginBottom:10,background:"#0a0c10",border:"1px solid #1a1612",borderRadius:5,padding:"8px 10px"}}>
      <div style={{fontSize:12,color:"#a09080",marginBottom:3,letterSpacing:"0.03em"}}>GAPS TO VERIFY</div>
      <div style={{fontSize:12,color:"#a09080",lineHeight:1.6}}>{d.researchNotes}</div>
    </div>}
    <button onClick={()=>setShowKey(true)} style={{width:"100%",marginTop:4,padding:"6px 0",background:"transparent",border:"none",color:"#1e1a14",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>⚙ change API key</button>
  </div>;
}

// Keep old IntelPanel as alias
function IntelPanel({deal, tpData, onGoToContact}) { return <ResearchPanel deal={deal} tpData={tpData} onGoToContact={onGoToContact}/>; }
function EmailPanel({deal,tracking}) {
  const [state,setState]=useState("idle");
  const [tone,setTone]=useState("peer");
  const [length,setLength]=useState("short");
  const [email,setEmail]=useState(null);
  const [err,setErr]=useState("");
  const [subject,setSubject]=useState("");
  const [body,setBody]=useState("");
  const [editing,setEditing]=useState(false);
  const [copied,setCopied]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const [keyInput,setKeyInput]=useState("");
  const dealId=deal.n+deal.addr;
  const prevId=useRef(dealId);
  useEffect(()=>{ if(prevId.current!==dealId){ setState("idle");setEmail(null);setErr("");setEditing(false);setCopied(false); prevId.current=dealId; } },[dealId]);

  const generate=useCallback(async()=>{
    setState("loading");setEmail(null);setErr("");setEditing(false);setCopied(false);
    try { const r=await draftEmail(deal,tone,length); setEmail(r);setSubject(r.subject);setBody(r.body);setState("done"); }
    catch(e) { const msg=e.message||String(e); if(msg.startsWith("__NO_KEY__")||msg.startsWith("__INVALID_KEY__")){setShowKey(true);setState("idle");}else{setErr(msg);setState("error");} }
  },[deal,tone,length]);

  const openOutlook=useCallback(()=>{
    const sub=editing?subject:(email?email.subject:"");
    const bod=editing?body:(email?email.body:"");
    const cachedIntel=loadResearch(deal);
    const dm=cachedIntel&&cachedIntel.people&&cachedIntel.people.find(p=>p.priority);
    const toEmail=dm&&dm.email&&!dm.email.startsWith("Unknown")&&dm.email.includes("@")?dm.email:"";
    window.open("mailto:"+encodeURIComponent(toEmail)+"?subject="+encodeURIComponent(sub)+"&body="+encodeURIComponent(bod),"_blank");
    if(tracking&&dm) tracking.logEmail(deal,dm.name);
  },[editing,subject,body,email,deal,tracking]);

  if(showKey||(!getStoredKey()&&state==="idle")) return <KeyEntryScreen onSave={()=>setShowKey(false)} onBack={getStoredKey()?()=>setShowKey(false):null}/>;

  if(state==="idle") return <div style={{padding:"20px 0"}}>
    <div style={{background:"linear-gradient(135deg,#0a1a0a,#0d1f0d)",border:"1px solid #22c55e20",borderRadius:10,padding:20,marginBottom:16}}>
      <div style={{fontSize:12,color:"#22c55e",letterSpacing:"0.06em",marginBottom:8}}>AI-POWERED OUTREACH</div>
      <div style={{fontSize:13,color:"#b8c0cc",lineHeight:1.7}}>Generates a personalized email using deal data, servicer intel, and your network connections. Run INTEL first for best results.</div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <div><div style={{fontSize:12,color:"#a09080",marginBottom:5}}>TONE</div>
        {[["blunt","Blunt & direct"],["peer","Collegial peer"],["quiet","Quietly confident"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTone(v)} style={{display:"block",width:"100%",textAlign:"left",padding:"7px 8px",borderRadius:3,marginBottom:3,border:"1px solid",borderColor:tone===v?"#c9914a":"#1e1a14",background:tone===v?"rgba(201,145,74,0.07)":"transparent",color:tone===v?"#f0ece6":"#8a7a6a",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}</div>
      <div><div style={{fontSize:12,color:"#a09080",marginBottom:5}}>LENGTH</div>
        {[["ultra","3 sentences"],["short","2 paragraphs"],["medium","3 paragraphs"]].map(([v,l])=>(

// ── OUTREACH TAB ──────────────────────────────────────────────────────────────

  const days=entry.emailedAt?daysSince(entry.emailedAt):null;

// ── PIPELINE DASHBOARD ────────────────────────────────────────────────────────
function PipelineDashboard({tracking,deals,onSelectDeal}) {
  const tracked=useMemo(()=>tracking.allEntries.map(e=>{ const d=deals.find(x=>dealKey(x)===e.key); return d?{...e,deal:d}:null; }).filter(Boolean),[tracking.allEntries,deals]);
  const byStatus=useMemo(()=>{ const g={}; STATUSES.forEach(s=>{g[s.id]=[];}); tracked.forEach(t=>{const sid=t.status||"emailed";if(g[sid])g[sid].push(t);}); return g; },[tracked]);
  const needsFollowUp=useMemo(()=>tracked.filter(t=>{ if(["dead","won"].includes(t.status)) return false; const d=daysSince(t.emailedAt); return d!==null&&d>=FOLLOW_UP_DAYS&&!["call","active"].includes(t.status); }),[tracked]);
  const total=tracked.length;
  const replied=(byStatus.replied||[]).length+(byStatus.call||[]).length+(byStatus.active||[]).length+(byStatus.won||[]).length;
  return <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:24}}>
      {[["PIPELINE",deals.length+"","#9a8a78"],["CONTACTED",total+"","#60a5fa"],["REPLIED",replied+"","#22c55e"],["REPLY RATE",(total>0?Math.round(replied/total*100):0)+"%","#eab308"],["FOLLOW UP",needsFollowUp.length+"",needsFollowUp.length>0?"#f97316":"#8a7a6a"]].map(([l,v,c])=>(
        <div key={l} style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:8,padding:"14px 16px"}}>
          <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1,marginBottom:4}}>{v}</div>
          <div style={{fontSize:12,letterSpacing:"0.06em",color:"#a09080"}}>{l}</div>
        </div>
      ))}
    </div>
    {needsFollowUp.length>0&&<div style={{background:"rgba(249,115,22,0.05)",border:"1px solid #f9731620",borderRadius:8,padding:"14px 16px",marginBottom:20}}>
      <div style={{fontSize:12,fontWeight:700,color:"#f97316",marginBottom:10}}>⚠ FOLLOW-UP OVERDUE — {needsFollowUp.length} DEAL{needsFollowUp.length>1?"S":""}</div>
      {needsFollowUp.map((t,i)=><div key={i} onClick={()=>onSelectDeal(t.deal)} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:i>0?"1px solid #141414":"none",cursor:"pointer"}}>
        <div><div style={{fontSize:12,color:"#f0ece6"}}>{t.deal.n}</div><div style={{fontSize:12,color:"#a09080"}}>{shortSponsor(t.deal)} · {t.deal.city}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:"#f97316"}}>{daysSince(t.emailedAt)}d</div><div style={{fontSize:12,color:"#a09080"}}>since email</div></div>
      </div>)}
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
      {STATUSES.filter(s=>!["dead","won"].includes(s.id)).map(status=><div key={status.id} style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:8,padding:"12px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:700,color:status.color}}>{status.label.toUpperCase()}</span>
          <span style={{fontSize:12,fontWeight:700,color:status.color,background:status.bg,padding:"1px 7px",borderRadius:3}}>{(byStatus[status.id]||[]).length}</span>
        </div>
        {(byStatus[status.id]||[]).map((t,i)=><div key={i} onClick={()=>onSelectDeal(t.deal)} style={{background:"#121212",border:"1px solid #141414",borderRadius:5,padding:"9px 10px",marginBottom:6,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=status.color+"40"} onMouseLeave={e=>e.currentTarget.style.borderColor="#141414"}>
          <div style={{fontSize:12,fontWeight:600,color:"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.deal.n}</div>
          <div style={{fontSize:12,color:"#a09080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shortSponsor(t.deal)}</div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:12,color:"#a09080"}}>{fmtBal(t.deal.bal)}</span>{t.emailedAt&&<span style={{fontSize:12,color:"#a09080"}}>{daysSince(t.emailedAt)}d</span>}</div>
        </div>)}
        {!(byStatus[status.id]||[]).length&&<div style={{fontSize:12,color:"#1e1a14",textAlign:"center",padding:"12px 0"}}>EMPTY</div>}
      </div>)}
    </div>
    {!total&&<div style={{textAlign:"center",padding:"60px 0",color:"#1e1a14"}}><div style={{fontSize:32,marginBottom:12}}>📋</div><div style={{fontSize:13,letterSpacing:"0.08em"}}>NO OUTREACH TRACKED YET</div></div>}
  </div>;
}

// ── UPLOAD SCREEN ─────────────────────────────────────────────────────────────
function UploadScreen({onLoad}) {
  const [dragging,setDragging]=useState(false);
  const [error,setError]=useState(null);
  const [parsing,setParsing]=useState(false);
  const fileRef=useRef(null);
  const handleFile=useCallback((file)=>{
    if(!file) return;
    if(!["xlsx","xls"].includes(file.name.split(".").pop().toLowerCase())) { setError("Please upload an Excel file (.xlsx or .xls)"); return; }
    setParsing(true); setError(null);
    const reader=new FileReader();
    reader.onload=e=>{ try { const deals=parseTreppXLSX(new Uint8Array(e.target.result)); if(!deals.length) throw new Error("No deals found."); onLoad(deals,file.name); } catch(err) { setError(err.message); setParsing(false); } };
    reader.onerror=()=>{ setError("File read failed"); setParsing(false); };
    reader.readAsArrayBuffer(file);
  },[onLoad]);
  return <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',system-ui,sans-serif",padding:40}}>
    <div style={{marginBottom:32,textAlign:"center"}}>
      <div style={{width:52,height:52,borderRadius:10,background:"linear-gradient(135deg,#7a4820,#c9914a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#0c0c0c",margin:"0 auto 16px",boxShadow:"0 0 24px rgba(201,145,74,0.3)"}}>B</div>
      <div style={{fontSize:15,fontWeight:700,letterSpacing:"0.07em",color:"#c9914a"}}>BAKER STREET CAPITAL ADVISORS</div>
      <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.08em",marginTop:4}}>DEAL INTELLIGENCE PLATFORM</div>
    </div>
    <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}} onClick={()=>fileRef.current&&fileRef.current.click()}
      style={{width:"100%",maxWidth:520,border:"2px dashed "+(dragging?"#c9914a":"#1e1a14"),borderRadius:12,padding:"48px 32px",textAlign:"center",cursor:"pointer",background:dragging?"rgba(201,145,74,0.05)":"#0e0e0e",transition:"all 0.2s"}}>
      <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
      {parsing?<div><div style={{fontSize:36,color:"#c9914a",marginBottom:16,animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</div><div style={{fontSize:13,color:"#c9914a",letterSpacing:"0.08em"}}>PARSING...</div></div>
        :<div><div style={{fontSize:40,marginBottom:16,opacity:0.4}}>📊</div><div style={{fontSize:15,color:"#f0ece6",fontWeight:700,marginBottom:8}}>Drop Trepp Export Here</div><div style={{fontSize:12,color:"#a09080",lineHeight:1.8,marginBottom:16}}>Any Trepp Market Loan Listing (.xlsx)<br/>FL, TX, NY — any state</div><div style={{display:"inline-block",padding:"10px 24px",background:"linear-gradient(135deg,#7a4820,#c9914a)",borderRadius:6,fontSize:12,fontWeight:800,color:"#0c0c0c"}}>SELECT FILE</div></div>}
    </div>
    {error&&<div style={{marginTop:16,padding:"10px 16px",background:"rgba(239,68,68,0.08)",border:"1px solid #ef444430",borderRadius:6,fontSize:12,color:"#ef4444",maxWidth:520,width:"100%",textAlign:"center"}}>{error}</div>}
  </div>;
}

// ── MOBILE CARD ───────────────────────────────────────────────────────────────
function MobileDealCard({deal,onTap,tracking}) {
  const t=tier(deal.score), mo=moOut(deal.mat);

      {deal.dscr!==null&&<span style={{fontSize:12,fontWeight:700,color:deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#9a8a78"}}>{deal.dscr}x</span>}
      {deal.ss&&<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,background:"rgba(192,132,252,0.12)",color:"#c084fc",fontWeight:700}}>SS</span>}
      {deal.wl&&<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:700}}>WL</span>}
      {overdue&&<span style={{fontSize:12,fontWeight:700,color:"#f97316"}}>⚠ {daysOut}d overdue</span>}
    </div>
    {(deal.sponsor||deal.borrower||deal.svc)&&<div style={{marginTop:6,fontSize:12,color:"#a09080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
    <span>{shortSponsor(deal)}{deal.svc?" · "+deal.svc.replace(" National Association","").replace(" Real Estate Advisors",""):""}</span>
    {(()=>{
      const sp=deal.sponsor||deal.borrower||deal.owner||"";
      const spL=sp.toLowerCase();
      const allSponsorFiles=[
        typeof SPONSORS!=="undefined"?SPONSORS:{},
    typeof SPONSORS2!=="undefined"?SPONSORS2:{},
    typeof SPONSORS3!=="undefined"?SPONSORS3:{},
    typeof SPONSORS4!=="undefined"?SPONSORS4:{},
        typeof SPONSORS2!=="undefined"?SPONSORS2:{},
        typeof SPONSORS3!=="undefined"?SPONSORS3:{},
        typeof SPONSORS4!=="undefined"?SPONSORS4:{},
      ];
      const found=allSponsorFiles.some(file=>Object.keys(file).some(k=>spL.includes(k.toLowerCase().slice(0,8))||(file[k].treppEntities||[]).some(e=>e.length>4&&spL.includes(e.toLowerCase()))));
      return found?<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,background:"rgba(201,145,74,0.12)",color:"#c9914a",border:"1px solid #c9914a30",flexShrink:0}}>profile</span>:null;
    })()}
  </div>}
  </div>;

// ── CONNECTION MATCHING ENGINE ────────────────────────────────────────────────
function findConnections(deal) {
  const results=[];
  const dealText=[deal.sponsor,deal.borrower,deal.owner,deal.n,deal.svc,deal.orig].filter(Boolean).join(' ').toLowerCase();
  const sponsorRaw=(deal.sponsor||deal.borrower||deal.owner||'').split(';')[0].trim();

  function hit(text) {
    if(!text) return false;
    const t=text.toLowerCase();
    if(dealText.includes(t)||t.includes(sponsorRaw.toLowerCase())) return true;
    return t.split(/[\s,;|&\/()]+/).filter(w=>w.length>=4).some(w=>dealText.includes(w));
  }

  // Find sponsor profile across all 3 files
  let sponsorMatch=null, sponsorKey=null;
  for(const file of [
    typeof SPONSORS!=="undefined"?SPONSORS:{},
    typeof SPONSORS2!=="undefined"?SPONSORS2:{},
    typeof SPONSORS3!=="undefined"?SPONSORS3:{},
    typeof SPONSORS4!=="undefined"?SPONSORS4:{},
  ]) {
    for(const [k,d] of Object.entries(file)) {
      if(hit(k)||(d.treppEntities||[]).some(e=>hit(e))) { sponsorMatch=d; sponsorKey=k; break; }
    }
    if(sponsorMatch) break;
  }

  // Baker Street principals vs servicer/originator
  if(typeof BS_PRINCIPALS!=='undefined') {
    if(deal.orig) {
      const o=deal.orig.toLowerCase();
      if(o.includes('ubs')||(BS_PRINCIPALS.brian&&(BS_PRINCIPALS.brian.ubsCoIssuers||[]).some(c=>o.includes(c.toLowerCase())))) {
        results.push({strength:'hot',via:'Brian Sherlock',contact:null,
          explanation:`Brian originated or co-issued CMBS at UBS — ${deal.orig} was in Brian's deal flow. Direct credibility with this originator.`,
          angle:`Brian, open with your UBS history — this loan came out of your world.`});
      }
    }
    if(deal.ss&&deal.svc) {
      const s=deal.svc.toLowerCase();
      if(['keybank','situs','cwcapital','midland','trimont','rialto','lnr'].some(x=>s.includes(x))) {
        results.push({strength:'warm',via:'Rob Vernicek',contact:null,
          explanation:`Rob worked directly with ${deal.svc.split(' ')[0]} during Iron Hound workouts — he knows their team and how they make decisions.`,
          angle:`Rob, lead with your servicer relationship. They know you know how this works.`});
      }
    }
  }

  // Network contacts vs deal + sponsor
  if(typeof BS_NETWORK_CONTACTS!=='undefined') {
    for(const c of BS_NETWORK_CONTACTS) {
      let found=false, expl='', ang='', str='warm';
      // Deal history match
      for(const dh of (c.dealHistory||[])) {
        const dhText=[dh.property,dh.notes,dh.seller,dh.buyer,dh.borrower,dh.lender].filter(Boolean).join(' ');
        if(hit(dh.property)||hit(dh.notes)||hit(dh.seller)||hit(dh.buyer)||hit(dh.borrower)) {
          found=true;
          expl=`${c.name} (${c.firm}) worked on ${dh.property}${dh.amount?' ($'+(dh.amount/1e6).toFixed(0)+'M)':''} in ${dh.year||'?'} as ${dh.role||'participant'} — same sponsor or related entity.`;
          ang=`${c.name} has direct deal history with this sponsor. Ask them to make the intro.`;
          break;
        }
      }
      // Firm matches servicer or originator
      if(!found&&c.firm) {
        const fl=c.firm.toLowerCase().split(' ')[0];
        if((deal.svc&&deal.svc.toLowerCase().includes(fl))||(deal.orig&&deal.orig.toLowerCase().includes(fl))) {
          found=true;
          expl=`${c.name} is at ${c.firm} — same firm as the ${deal.svc?'servicer':'originator'} on this loan. They know who's handling it.`;
          ang=`${c.name} can brief you on exactly who to call and warm them up first.`;
        }
      }
      // Notes mention sponsor
      if(!found&&hit(c.notes)) {
        found=true;
        expl=`${c.name} (${c.firm}) — their background references connections to this sponsor or related entities.`;
        ang=`Ask ${c.name} directly — they may know this sponsor from their career.`;
      }
      if(found) results.push({strength:str,via:c.name,contact:c,explanation:expl,angle:ang});
    }
  }

  // DM career overlaps with BS principals + network contacts
  if(sponsorMatch&&sponsorMatch.people) {
    for(const dm of sponsorMatch.people) {
      for(const job of (dm.career||[])) {
        const jf=(job.firm||'').toLowerCase();
        // Check against network contacts' current firm
        if(typeof BS_NETWORK_CONTACTS!=='undefined') {
          for(const c of BS_NETWORK_CONTACTS) {
            const cf=c.firm.toLowerCase().split(' ')[0];
            if(jf.length>3&&jf.includes(cf)&&!results.some(r=>r.via===c.name&&r.explanation.includes(dm.name))) {
              results.push({strength:'warm',via:c.name,contact:c,
                explanation:`${c.name} (${c.firm}) and ${dm.name} both have ${job.firm} in their background — likely know each other or share mutual contacts from there.`,
                angle:`${c.name} — do you know ${dm.name} from your ${job.firm} history? That's your warm path into ${sponsorKey}.`});
            }
          }
        }
        // Check hot UBS / Iron Hound / Lehman overlaps
        if(['ubs','iron hound','lehman','deutsche bank'].some(x=>jf.includes(x))) {
          const bsWho=jf.includes('iron hound')?'Rob Vernicek':'Brian Sherlock';
          if(!results.some(r=>r.via===bsWho&&r.explanation.includes(dm.name))) {
            results.push({strength:'hot',via:bsWho,contact:null,
              explanation:`${dm.name} (${dm.title} at ${sponsorKey}) worked at ${job.firm} ${job.years||''} — same firm and era as ${bsWho}. They were peers in the same world.`,
              angle:`${bsWho}, you and ${dm.name} were both at ${job.firm}. Open with that — it's a genuine peer connection.`});
          }
        }
      }
    }
  }

  // Dedupe and sort hot → warm → cold
  const seen=new Set();
  const unique=results.filter(r=>{ const k=r.via+'|'+r.explanation.slice(0,50); if(seen.has(k))return false; seen.add(k); return true; });
  unique.sort((a,b)=>({hot:0,warm:1,cold:2}[a.strength]-({hot:0,warm:1,cold:2}[b.strength])));
  return {sponsorMatch,sponsorKey,connections:unique};
}

Return a JSON object with this exact structure:

    {
      "property": "deal name",

// ── SPONSOR TAB ───────────────────────────────────────────────────────────────
function SponsorTab({deal}) {
  const allFiles = [
    typeof SPONSORS!=='undefined'?SPONSORS:{},
    typeof SPONSORS2!=='undefined'?SPONSORS2:{},
    typeof SPONSORS3!=='undefined'?SPONSORS3:{},
    typeof SPONSORS4!=='undefined'?SPONSORS4:{},
  ];
  const sponsorName = (deal.sponsor||deal.borrower||deal.owner||'').split(';')[0].trim()||deal.n;
  const spL = sponsorName.toLowerCase();
  let sponsorMatch=null, sponsorKey=null;
  for (const file of allFiles) {
    for (const [k,d] of Object.entries(file)) {
      if (spL.includes(k.toLowerCase().slice(0,8))||(d.treppEntities||[]).some(e=>e.length>4&&spL.includes(e.toLowerCase()))) { sponsorMatch=d; sponsorKey=k; break; }
      const kw=k.toLowerCase().split(/[\s\/\-]+/).filter(w=>w.length>=5);

    setResearching(false);

  if(showKey) return <KeyEntryScreen onSave={()=>setShowKey(false)} onBack={()=>setShowKey(false)}/>;

  return <div style={{paddingTop:4}}>

          {researching?'Researching...':research?'↻ Re-research':'✦ Deep Research'}
        </button>
      </div>

      {sponsorMatch&&<>
        {sponsorMatch.hq&&<div style={{fontSize:12,color:'#7a6a58',marginBottom:6}}>📍 {sponsorMatch.hq}{sponsorMatch.founded?' · Est. '+sponsorMatch.founded:''}{sponsorMatch.aum?' · '+sponsorMatch.aum:''}</div>}

        {sponsorMatch.bakerStreetAngle&&<div style={{marginTop:10,padding:'8px 10px',background:'rgba(201,145,74,0.05)',border:'1px solid #c9914a20',borderRadius:5}}>
          <div style={{fontSize:12,color:'#c9914a',marginBottom:3,letterSpacing:'0.03em'}}>BAKER STREET ANGLE</div>

        {sponsorMatch.treppEntities&&sponsorMatch.treppEntities.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #1a1612'}}>

          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {sponsorMatch.treppEntities.map((e,i)=><span key={i} style={{fontSize:12,padding:'1px 6px',borderRadius:3,background:'rgba(255,255,255,0.03)',border:'1px solid #1a1612',color:'#5a5048'}}>{e}</span>)}

      {!sponsorMatch&&<div style={{fontSize:12,color:'#5a5048',fontStyle:'italic',marginTop:4}}>Not in sponsor database — click Deep Research to build a profile.</div>}
    </div>

    {research&&<div style={{background:'#0e0e0e',border:'1px solid #22c55e20',borderRadius:8,padding:'12px 14px',marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

        <button onClick={()=>setExpanded(!expanded)} style={{fontSize:12,padding:'2px 7px',background:'transparent',border:'1px solid #1e1a14',borderRadius:3,color:'#5a5048',cursor:'pointer',fontFamily:'inherit'}}>{expanded?'▲ Collapse':'▼ Expand'}</button>
      </div>
      {(expanded||!sponsorMatch)&&<>
        {research.firmBackground&&<div style={{fontSize:12,color:'#b8c0cc',lineHeight:1.65,marginBottom:8}}>{research.firmBackground}</div>}
        {research.distressContext&&<div style={{fontSize:12,color:'#f97316',lineHeight:1.5,padding:'7px 10px',background:'rgba(249,115,22,0.05)',border:'1px solid #f9731620',borderRadius:4,marginBottom:8}}>{research.distressContext}</div>}
        {research.recentIntel&&research.recentIntel!=='No public intel found'&&<div style={{fontSize:12,color:'#eab308',lineHeight:1.5,marginBottom:8}}>{research.recentIntel}</div>}
        {research.lendersUsed&&research.lendersUsed.length>0&&<div style={{marginTop:6}}>

// ── PEOPLE TAB ────────────────────────────────────────────────────────────────
function PeopleTab({deal}) {
  const allFiles = [
    typeof SPONSORS!=='undefined'?SPONSORS:{},
    typeof SPONSORS2!=='undefined'?SPONSORS2:{},
    typeof SPONSORS3!=='undefined'?SPONSORS3:{},
    typeof SPONSORS4!=='undefined'?SPONSORS4:{},
  ];

  const sponsorName = (deal.sponsor||deal.borrower||deal.owner||'').split(';')[0].trim()||deal.n;
  const spL = sponsorName.toLowerCase();

  let sponsorMatch = null;
  for (const file of allFiles) {
    for (const [k,d] of Object.entries(file)) {
      if (spL.includes(k.toLowerCase().slice(0,8))||(d.treppEntities||[]).some(e=>e.length>4&&spL.includes(e.toLowerCase()))) {
        sponsorMatch=d; break;
      }
      const kw=k.toLowerCase().split(/[\s\/\-]+/).filter(w=>w.length>=5);
      if(kw.some(w=>spL.includes(w))) { sponsorMatch=d; break; }
    }
    if(sponsorMatch) break;
  }

  const people = sponsorMatch?.people||[];

  if(!people.length) return <div style={{padding:'40px 20px',textAlign:'center'}}>
    <div style={{fontSize:13,color:'#5a5048',marginBottom:6}}>No decision makers on file</div>
    <div style={{fontSize:12,color:'#7a6a58'}}>Run sponsor research to find principals.</div>
  </div>;

  return <div style={{paddingTop:4}}>
    {people.map((dm,i)=><DmCard key={i} deal={deal} dm={dm}/>)}
  </div>;
}

function DmCard({deal, dm}) {
  const [state,setState]=useState('idle'); // idle | loading | done | error
  const [result,setResult]=useState(()=>loadDmResearch(deal,dm.name));
  const [expanded,setExpanded]=useState(false);

  const hasResearch = !!result;

  async function runResearch() {
    if(!getStoredKey()){alert('Set your API key first (gear icon)');return;}
    setState('loading');
    try {
      const r=await fetchDmDeepResearch(deal,dm);
      saveDmResearch(deal,dm.name,r);
      setResult(r);
      setState('done');
      setExpanded(true);
    } catch(e) {

function DealOverviewTab({deal, tracking, onGoToContact, setTab}) {
  const svc = getServicer(deal.svc);

  const matColor = mo!==null&&mo<=0?"#ef4444":mo!==null&&mo<=6?"#f97316":mo!==null&&mo<=12?"#eab308":"#ddd8d0";
  const dscrColor = deal.dscr!==null?(deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#9a8a78"):"#8a7a6a";
  const fmtPct = v=>v!=null?Math.round(v*100)+"%":"—";
  const fmtRate = v=>v!=null?(v<1?Math.round(v*10000)/100:Math.round(v*100)/100)+"%":"—";
  const fmtSF = v=>v!=null?v.toLocaleString()+" SF":null;
  const fmtUnits = v=>v!=null?v.toLocaleString()+" units":null;
  const fullAddr = (deal.addr||"")+(deal.city?", "+deal.city:"")+(deal.state?" "+deal.state:"");
  const mapQ = encodeURIComponent(fullAddr+", USA");
  const gUrl = "https://www.google.com/maps/search/?api=1&query="+mapQ;
  const svUrl = "https://www.google.com/maps?q="+mapQ+"&layer=c";
  const satUrl = "https://www.google.com/maps/search/?api=1&query="+mapQ+"&basemap=satellite";
  const sponsor = deal.sponsor||deal.borrower||deal.owner||"";
  const sponsorShort = sponsor.split(";")[0].trim();
  const svcShort = (deal.svc||"").replace(" National Association","").replace(" Real Estate Advisors","").replace(" Loan Services LLC","").replace(" Real Estate","");
  const masterSvcShort = (deal.masterSvc||"").replace(" National Association","").replace(" Real Estate Advisors","").replace(" Loan Services LLC","");
  const entry = tracking ? tracking.get(deal) : null;

  // Build timeline events from deal data
  const timelineEvents = [];
  if(deal.origMat&&deal.mat&&deal.origMat!==deal.mat) timelineEvents.push({label:"Original Maturity",date:deal.origMat,color:"#a09080",icon:"◦"});
  if(deal.ssDate) timelineEvents.push({label:"Special Servicer Transfer",date:deal.ssDate,color:"#c084fc",icon:"⚑"});
  if(deal.modFlag&&deal.modFlag!=="") timelineEvents.push({label:"Modification: "+deal.modFlag,date:null,color:"#eab308",icon:"✎"});
  if(deal.extFlag&&deal.extFlag!=="") timelineEvents.push({label:"Extension: "+deal.extFlag,date:null,color:"#60a5fa",icon:"↔"});
  if(deal.defFlag&&deal.defFlag!==""&&deal.defFlag.toLowerCase()!=="current") timelineEvents.push({label:"Delinquency: "+deal.defFlag,date:null,color:"#ef4444",icon:"!"});
  if(deal.mat) timelineEvents.push({label:mo!==null&&mo<=0?"MATURITY (PAST DUE)":"Maturity",date:deal.mat,color:matColor,icon:"●"});

  // Compact data row: label left, value right. Shows — when v is falsy.

      </div>

      {/* PROPERTY / COLLATERAL ─────────────────────── */}
      <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"7px 12px",background:"#0c0c0c",borderBottom:"1px solid #161616"}}>
          <span style={{fontSize:12,color:"#a09080",letterSpacing:"0.06em",fontWeight:700}}>COLLATERAL</span>
        </div>
        <div style={{padding:"4px 12px 8px"}}>
          <LRow l="Asset Type"   v={deal.type||null} bold />
          <LRow l="Location" v={[deal.addr,[deal.city,deal.state].filter(Boolean).join(", "),deal.zip].filter(Boolean).join(" · ")||null} bold />
          <LRow l="Units / Keys" v={fmtUnits(deal.units)} />
          <LRow l="Square Feet"  v={fmtSF(deal.sqft)} />
          <LRow l="Occupancy"    v={fmtPct(deal.occup)} vc={deal.occup!=null&&deal.occup<0.85?"#f97316":null} />
          <LRow l="Appraised Value" v={deal.appVal?fmtBal(deal.appVal):null} />
          <LRow l="Appraisal Date"  v={deal.appDate?fmtMat(deal.appDate):null} />
          <LRow l="LTV"          v={deal.ltv!=null?deal.ltv+(deal.ltv<5?"%":""):null} vc={deal.ltv!=null&&deal.ltv>80?"#f97316":null} />
        </div>
      </div>

      {/* FINANCIALS ─────────────────────────────────── */}
      <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"7px 12px",background:"#0c0c0c",borderBottom:"1px solid #161616"}}>
          <span style={{fontSize:12,color:"#a09080",letterSpacing:"0.06em",fontWeight:700}}>FINANCIALS</span>
        </div>
        <div style={{padding:"4px 12px 8px"}}>
          <LRow l="DSCR (NCF)"    v={deal.dscr!=null?deal.dscr+"x":null} vc={dscrColor} bold />
          {deal.dscrDate&&<LRow l="DSCR Date" v={fmtMat(deal.dscrDate)} />}
          <LRow l="NOI"           v={deal.noi?fmtBal(deal.noi):null} />
          <LRow l="Revenue"       v={deal.rev?fmtBal(deal.rev):null} />
        </div>
      </div>

      {/* OWNERSHIP ───────────────────────────────────── */}
      <div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"7px 12px",background:"#0c0c0c",borderBottom:"1px solid #161616"}}>
          <span style={{fontSize:12,color:"#a09080",letterSpacing:"0.06em",fontWeight:700}}>OWNERSHIP</span>
        </div>
        <div style={{padding:"4px 12px 8px"}}>
          <LRow l="Sponsor"      v={deal.sponsor||null} bold />
          <LRow l="Borrower"     v={deal.borrower||null} />
          <LRow l="Owner Entity" v={deal.owner||null} />
        </div>
      </div>

      {/* SERVICER PLAYBOOK ──────────────────────────── */}
      {deal.ss&&svc&&<div style={{background:"rgba(192,132,252,0.04)",border:"1px solid #c084fc20",borderRadius:7,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:"#c084fc",marginBottom:6,letterSpacing:"0.03em"}}>{svc.key} — SERVICER PLAYBOOK</div>
        <div style={{fontSize:12,color:"#9b72cf",lineHeight:1.7,marginBottom:5}}>{svc.approach}</div>
        <div style={{fontSize:12,color:"#a09080",marginBottom:6}}>Timeline: <span style={{color:"#b8c0cc"}}>{svc.timeline}</span></div>
        <div style={{paddingTop:6,borderTop:"1px solid #141414",fontSize:12,color:"#c9914a",lineHeight:1.7}}>{svc.angle}</div>
      </div>}

      {/* TIMELINE ───────────────────────────────────── */}
      {timelineEvents.length>0&&<div style={{background:"#0e0e0e",border:"1px solid #1e1a14",borderRadius:7,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"7px 12px",background:"#0c0c0c",borderBottom:"1px solid #161616"}}>
          <span style={{fontSize:12,color:"#a09080",letterSpacing:"0.06em",fontWeight:700}}>TIMELINE</span>
        </div>
        <div style={{padding:"8px 12px"}}>
          {timelineEvents.map((ev,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:i<timelineEvents.length-1?8:0}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
              <span style={{fontSize:12,color:ev.color,fontWeight:700}}>{ev.icon}</span>
              {i<timelineEvents.length-1&&<div style={{width:1,height:14,background:"#1e1a14",marginTop:2}}/>}
            </div>
            <div style={{paddingBottom:i<timelineEvents.length-1?6:0}}>
              <div style={{fontSize:12,color:"#ddd8d0",fontWeight:600,lineHeight:1.3}}>{ev.label}</div>
              {ev.date&&<div style={{fontSize:12,color:"#a09080",marginTop:1}}>{fmtMat(ev.date)}</div>}
            </div>
          </div>)}
          {entry&&entry.history&&entry.history.length>0&&entry.history.map((h,i)=><div key={"h"+i} style={{display:"flex",alignItems:"flex-start",gap:10,marginTop:8}}>
            <span style={{fontSize:12,color:"#c9914a",fontWeight:700,flexShrink:0}}>★</span>
            <div>
              <div style={{fontSize:12,color:"#c9914a",fontWeight:600,lineHeight:1.3,textTransform:"capitalize"}}>{h.action}{h.dm?" — "+h.dm:""}</div>
              {h.at&&<div style={{fontSize:12,color:"#a09080",marginTop:1}}>{new Date(h.at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>}
            </div>
          </div>)}
        </div>
      </div>}

      {/* DATA SOURCE FOOTNOTE */}
      <div style={{fontSize:12,color:"#5a4a38",textAlign:"right",marginTop:4}}>Source: Trepp · {deal.src||"CMBS"} {deal.pool?("· "+deal.pool):""}</div>
    </div>

    {/* ── RIGHT SIDEBAR ─────────────────────────────── */}
    <div style={{width:220,flexShrink:0,borderLeft:"1px solid #161616",overflowY:"auto",background:"#0b0b0b",display:"flex",flexDirection:"column",WebkitOverflowScrolling:"touch"}}>

      {/* ACTIONS */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid #161616"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:7}}>ACTIONS</div>
        <button onClick={()=>setTab("email")} style={{width:"100%",padding:"9px 0",background:"linear-gradient(135deg,#7a4820,#c9914a)",border:"none",borderRadius:5,color:"#0a0a0a",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",marginBottom:5,letterSpacing:"0.06em"}}>✦ GENERATE EMAIL</button>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
          <button onClick={()=>setTab("sponsor")} style={{padding:"7px 0",background:"transparent",border:"1px solid #1e1a14",borderRadius:4,color:"#b0a090",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>RESEARCH</button>
          <button onClick={()=>setTab("connections")} style={{padding:"7px 0",background:"transparent",border:"1px solid #1e1a14",borderRadius:4,color:"#b0a090",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>CONNECT</button>
        </div>
      </div>

      {/* OUTREACH STATUS */}
      {entry&&<div style={{padding:"10px 12px",borderBottom:"1px solid #161616"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:6}}>OUTREACH STATUS</div>
        <StatusPicker current={entry.status} onChange={s=>tracking.update(deal,{status:s})}/>
        {entry.emailedAt&&<div style={{fontSize:12,color:"#a09080",marginTop:5}}>Emailed {daysSince(entry.emailedAt)}d ago{entry.dmName?" · "+entry.dmName:""}</div>}
      </div>}

      {/* QUICK NOTES */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid #161616"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:5}}>NOTES</div>
        <QuickNoteWidget deal={deal} tracking={tracking}/>
      </div>

      {/* KEY CONTACTS */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid #161616"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:6}}>KEY CONTACTS</div>
        {sponsorShort&&<div style={{marginBottom:5}}>
          <div style={{fontSize:12,color:"#a09080",marginBottom:1}}>Sponsor</div>
          <div style={{fontSize:12,color:"#ddd8d0",fontWeight:600,lineHeight:1.3}}>{sponsorShort}</div>
        </div>}
        {svcShort&&deal.ss&&<div style={{marginBottom:5}}>
          <div style={{fontSize:12,color:"#a09080",marginBottom:1}}>Special Servicer</div>
          <div style={{fontSize:12,color:"#c084fc",fontWeight:600,lineHeight:1.3}}>{svcShort}</div>
        </div>}
        {masterSvcShort&&<div style={{marginBottom:5}}>
          <div style={{fontSize:12,color:"#a09080",marginBottom:1}}>Master Servicer</div>
          <div style={{fontSize:12,color:"#ddd8d0",lineHeight:1.3}}>{masterSvcShort}</div>
        </div>}
        <button onClick={()=>setTab("people")} style={{marginTop:4,width:"100%",padding:"5px 0",background:"transparent",border:"1px solid #1e1a14",borderRadius:3,color:"#a09080",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>View People →</button>
      </div>

      {/* LOCATION / MAP */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid #161616"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:6}}>LOCATION</div>
        <div style={{fontSize:12,color:"#ddd8d0",fontWeight:600,marginBottom:2,lineHeight:1.3}}>{deal.city}{deal.state?", "+deal.state:""}</div>
        {deal.addr&&<div style={{fontSize:12,color:"#a09080",marginBottom:7,lineHeight:1.4}}>{deal.addr}{deal.zip?" "+deal.zip:""}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:4}}>
          <a href={gUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"7px 0",borderRadius:4,background:"#141414",border:"1px solid #1e1a14",color:"#b0a090",fontSize:12,textDecoration:"none"}}>📍</a>
          <a href={svUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"7px 0",borderRadius:4,background:"#141414",border:"1px solid #1e1a14",color:"#b0a090",fontSize:12,textDecoration:"none"}}>🚶</a>
          <a href={satUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"7px 0",borderRadius:4,background:"#141414",border:"1px solid #1e1a14",color:"#b0a090",fontSize:12,textDecoration:"none"}}>🛰</a>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <a href={"https://www.google.com/search?q="+encodeURIComponent(sponsorShort+" real estate")} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"6px 0",borderRadius:4,background:"#141414",border:"1px solid #1e1a14",color:"#a09080",fontSize:12,textDecoration:"none"}}>🔍 Google Sponsor</a>
          <a href={"https://www.linkedin.com/search/results/people/?keywords="+encodeURIComponent(sponsorShort)} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"6px 0",borderRadius:4,background:"#141414",border:"1px solid #1e1a14",color:"#a09080",fontSize:12,textDecoration:"none"}}>LinkedIn Search</a>
        </div>
      </div>

      {/* DEAL SCORE */}
      <div style={{padding:"10px 12px"}}>
        <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.04em",marginBottom:6}}>PRIORITY SCORE</div>
        <ScoreBadge score={deal.score}/>
        <div style={{fontSize:12,color:"#5a4a38",marginTop:6,lineHeight:1.6}}>
          {deal.ss&&"Special servicer active. "}
          {deal.wl&&"On watchlist. "}
          {deal.dscr!=null&&deal.dscr<1&&"Sub-breakeven DSCR. "}
          {mo!=null&&mo<=0?"Past maturity.":mo!=null&&mo<=6?"Matures in "+mo+"mo.":""}
        </div>
      </div>
    </div>
  </div>;
}

// Inline quick-note widget for sidebar
function QuickNoteWidget({deal, tracking}) {
  const entry = tracking ? tracking.get(deal) : null;
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(entry?.notes||"");
  useEffect(()=>{ setVal(entry?.notes||""); setEditing(false); },[deal.n,deal.addr]);
  if(!tracking) return null;
  if(editing) return <div>
    <textarea value={val} onChange={e=>setVal(e.target.value)} autoFocus
      style={{width:"100%",minHeight:60,background:"#0e0e0e",border:"1px solid #c9914a40",borderRadius:4,color:"#ddd8d0",fontFamily:"inherit",fontSize:12,lineHeight:1.6,padding:"6px 8px",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
    <div style={{display:"flex",gap:4,marginTop:4}}>
      <button onClick={()=>{tracking.update(deal,{notes:val});setEditing(false);}} style={{flex:1,padding:"4px 0",background:"rgba(201,145,74,0.1)",border:"1px solid #c9914a30",borderRadius:3,color:"#c9914a",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
      <button onClick={()=>{setVal(entry?.notes||"");setEditing(false);}} style={{padding:"4px 7px",background:"transparent",border:"1px solid #1e1a14",borderRadius:3,color:"#a09080",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>×</button>
    </div>
  </div>;
  return <div onClick={()=>setEditing(true)} style={{minHeight:36,padding:"6px 8px",background:"#0e0e0e",borderRadius:4,fontSize:12,color:entry?.notes?"#9ca3af":"#5a4a38",cursor:"text",lineHeight:1.6,border:"1px solid #121212",fontStyle:entry?.notes?"normal":"italic"}}>{entry?.notes||"Click to add notes..."}</div>;
}

function DrawerContent({deal,tracking,tpData,onGoToContact}) {
  const [tab,setTab]=useState("deal");
  const researched=!!loadResearch(deal);
  // New tab order: OVERVIEW · RESEARCH · CONNECTIONS · EMAIL · DOCS(TRACK)
  const TABS=[["deal","OVERVIEW"],["sponsor","SPONSOR"],["people","PEOPLE"],["connections","CONNECT"],["email","✦ EMAIL"],["outreach","TRACK"]];
  useEffect(()=>setTab("deal"),[deal.n,deal.addr]);
  return <>
    <div style={{display:"flex",borderBottom:"1px solid #161616",background:"#0c0e13",flexShrink:0,overflowX:"auto"}}>
      {TABS.map(([id,label])=><button key={id} onClick={()=>setTab(id)} style={{flex:1,minWidth:62,padding:"10px 4px",background:"transparent",border:"none",borderBottom:tab===id?"2px solid #c9914a":"2px solid transparent",color:tab===id?"#c9914a":"#8a7a6a",fontSize:12,letterSpacing:"0.08em",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",display:"flex",alignItems:"center",justifyContent:"center",gap:3,fontWeight:tab===id?700:500}}>
      {label}{id==="outreach"&&tracking&&tracking.get(deal)&&<span style={{width:5,height:5,borderRadius:"50%",background:"#c9914a",display:"inline-block"}}/>}
      {id==="deal"&&researched&&<span style={{width:4,height:4,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>}
      </button>)}
    </div>
    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
      {tab==="deal"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minHeight:0}}><DealOverviewTab deal={deal} tracking={tracking} onGoToContact={onGoToContact} setTab={setTab}/></div>}
      {tab==="sponsor"&&<div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}><SponsorTab deal={deal}/></div>}
      {tab==="people"&&<div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}><PeopleTab deal={deal}/></div>}
      {tab==="connections"&&<div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}><ConnectionsTab deal={deal} onGoToContact={onGoToContact}/></div>}
      {tab==="email"&&<div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}><EmailPanel deal={deal} tracking={tracking}/></div>}
      {tab==="outreach"&&<div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}><OutreachTab deal={deal} tracking={tracking}/></div>}
    </div>
  </>;
}

function MobileDrawer({deal,onClose,tracking,tpData}) {
  useEffect(()=>{ document.body.style.overflow="hidden"; return()=>{ document.body.style.overflow=""; }; },[]);
  const mo=moOut(deal.mat);
  return <div style={{position:"fixed",inset:0,zIndex:400}}>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}}/>
    <div style={{position:"absolute",bottom:0,left:0,right:0,top:"8%",background:"#0d0d0d",borderTop:"1px solid #1e1a14",borderRadius:"16px 16px 0 0",display:"flex",flexDirection:"column",animation:"sheetUp 0.2s ease-out"}}>
      <div style={{flexShrink:0,background:"#0c0c0c",borderRadius:"16px 16px 0 0",borderBottom:"1px solid #161616"}}>
        <div style={{display:"flex",justifyContent:"center",paddingTop:8,paddingBottom:4}}><div style={{width:36,height:4,borderRadius:2,background:"#1e1a14"}}/></div>
        <div style={{padding:"8px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,paddingRight:12}}>
            <div style={{fontSize:16,fontWeight:800,color:"#f0ece6",marginBottom:2,lineHeight:1.3}}>{deal.n}</div>
            <div style={{fontSize:12,color:"#a09080"}}>{deal.city} · {deal.type} · {deal.src}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginTop:7}}>
              <ScoreBadge score={deal.score}/>
              <span style={{fontSize:14,fontWeight:800,color:"#c9914a"}}>{fmtBal(deal.bal)}</span>
              {deal.ss&&<Tag label="SS" color="#c084fc"/>}
              {deal.wl&&<Tag label="WL" color="#60a5fa"/>}
              {mo!==null&&mo<=0&&<Tag label="PAST DUE" color="#ef4444"/>}
              {mo!==null&&mo>0&&mo<=6&&<Tag label={mo+"mo"} color="#f97316"/>}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"1px solid #1e1a14",borderRadius:6,color:"#b0a090",fontSize:18,cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit"}}>×</button>
        </div>
      </div>
      <DrawerContent deal={deal} tracking={tracking} tpData={tpData}/>
    </div>
  </div>;
}

function DesktopDrawer({deal,onClose,tracking,tpData,onGoToContact}) {
  const mo=moOut(deal.mat);
  const matColor=mo!==null&&mo<=0?"#ef4444":mo!==null&&mo<=6?"#f97316":mo!==null&&mo<=12?"#eab308":"#ddd8d0";
  const dscrColor=deal.dscr!==null?(deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#9a8a78"):"#8a7a6a";
  const fmtRate=v=>v!=null?(v<1?Math.round(v*10000)/100:Math.round(v*100)/100)+"%":null;
  const fmtPct=v=>v!=null?Math.round(v*100)+"%":null;
  const sponsor=(deal.sponsor||deal.borrower||deal.owner||"").split(";")[0].trim();
  const KPI=({label,value,color})=><div style={{borderRight:"1px solid #1a1714",padding:"7px 14px",flexShrink:0,minWidth:0}}>
    <div style={{fontSize:12,color:"#a09080",letterSpacing:"0.03em",marginBottom:2,whiteSpace:"nowrap"}}>{label}</div>
    <div style={{fontSize:12,fontWeight:700,color:color||"#ddd8d0",whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums"}}>{value||"—"}</div>
  </div>;
  return <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",borderLeft:"1px solid #1a1612",background:"#0d0d0d"}}>
    <div style={{borderBottom:"1px solid #1e1c16",background:"#0e0d0b",flexShrink:0}}>
      <div style={{padding:"9px 14px 7px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,paddingRight:10,minWidth:0}}>
          <div style={{fontSize:16,fontWeight:800,color:"#f0ece6",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{deal.n}</div>
          <div style={{fontSize:12,color:"#a09080",marginTop:1}}>{deal.type||""}{deal.city?" · "+deal.city:""}{deal.src?" · "+deal.src:""}</div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
          <ScoreBadge score={deal.score}/>
          {deal.ss&&<Tag label="SS" color="#c084fc"/>}
          {deal.wl&&<Tag label="WL" color="#60a5fa"/>}
          {mo!==null&&mo<=0&&<Tag label="DUE" color="#ef4444"/>}
          {mo!==null&&mo>0&&mo<=6&&<Tag label={mo+"mo"} color="#f97316"/>}
          {loadResearch(deal)&&<Tag label="✓" color="#22c55e"/>}
          <button onClick={onClose} style={{background:"none",border:"1px solid #1e1a14",borderRadius:4,color:"#b0a090",fontSize:15,cursor:"pointer",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit",marginLeft:4}}>×</button>
        </div>
      </div>
      <div style={{display:"flex",borderTop:"1px solid #161616",overflowX:"auto"}}>
        <KPI label="BALANCE" value={fmtBal(deal.bal)} color="#c9914a"/>
        <KPI label="MATURITY" value={fmtMat(deal.mat)+(mo!==null?mo<=0?" · PAST DUE":" · "+mo+"mo":"")} color={matColor}/>
        <KPI label="RATE" value={fmtRate(deal.intRate)+(deal.intType?" "+deal.intType:"")} />
        <KPI label="OCCUPANCY" value={fmtPct(deal.occup)} color={deal.occup!=null&&deal.occup<0.85?"#f97316":null}/>
        <KPI label="DSCR" value={deal.dscr!=null?deal.dscr+"x":null} color={dscrColor}/>
        <KPI label="SPONSOR" value={(sponsor||deal.borrower||"").slice(0,24)} />
      </div>
    </div>
    <DrawerContent deal={deal} tracking={tracking} tpData={tpData} onGoToContact={onGoToContact}/>
  </div>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function LoadingScreen({onDone}) {
  useEffect(()=>{
    const t=setTimeout(onDone, 3200);
    return ()=>clearTimeout(t);
  },[]);
  // B logo rendered as SVG with rings, rays, glow
  return <div style={{position:'fixed',inset:0,background:'#080705',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:9999,fontFamily:"'Inter',system-ui,sans-serif",overflow:'hidden'}}>

function SponsorsView({onSelectDeal}) {
  const [search, setSearch] = React.useState("");
  const [selected, setSelected] = React.useState(null);
  const [filterHq, setFilterHq] = React.useState("All");

  // Merge all sponsor files into a single array
  const allSponsors = React.useMemo(() => {
    const files = [
      typeof SPONSORS !== "undefined" ? SPONSORS : {},
      typeof SPONSORS2 !== "undefined" ? SPONSORS2 : {},
      typeof SPONSORS3 !== "undefined" ? SPONSORS3 : {},
      typeof SPONSORS4 !== "undefined" ? SPONSORS4 : {},
    ];
    const out = [];
    const seen = new Set();
    for (const file of files) {
      for (const [key, data] of Object.entries(file)) {
        if (!seen.has(key)) { seen.add(key); out.push({key, ...data}); }
      }
    }
    return out.sort((a, b) => a.key.localeCompare(b.key));
  }, []);

  // Find related deals for a sponsor
  const getRelatedDeals = React.useCallback((sp) => {
    return ALL_TREPP_DEALS.filter(deal => {
      const txt = [deal.sponsor, deal.borrower, deal.owner].filter(Boolean).join(" ").toLowerCase();
      const spL = sp.key.toLowerCase();
      const wordMatch = spL.split(/[\s\/\-]+/).filter(w => w.length >= 5).some(w => txt.includes(w));
      const entityMatch = (sp.treppEntities || []).some(e => e.length > 3 && txt.includes(e.toLowerCase()));
      return wordMatch || entityMatch;
    }).slice(0, 12);
  }, []);

  // HQ regions for filter
  const hqRegions = React.useMemo(() => {
    const regions = new Set();
    allSponsors.forEach(sp => {
      if (sp.hq) {
        const city = sp.hq.split(",")[0].trim();
        regions.add(city);
      }
    });
    return ["All", ...Array.from(regions).sort()];
  }, [allSponsors]);

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase().trim();
    return allSponsors.filter(sp => {
      if (filterHq !== "All" && !(sp.hq || "").toLowerCase().includes(filterHq.toLowerCase())) return false;
      if (!q) return true;
      const hay = [sp.key, sp.hq, sp.focus, sp.aum, ...(sp.treppEntities || []), ...(sp.people || []).map(p => p.name)].filter(Boolean).join(" ").toLowerCase();
      return q.split(" ").filter(w => w.length > 1).every(w => hay.includes(w));
    });
  }, [allSponsors, search, filterHq]);

  // ── DETAIL VIEW ──────────────────────────────────────────────────────────
  if (selected) {
    const sp = selected;
    const relDeals = getRelatedDeals(sp);
    return <div style={{flex:1, display:"flex", flexDirection:"column", overflow:"hidden", background:"#0a0a0a"}}>

function LandingPage({onEnter, onSelectDeal}) {
  const [selectedState, setSelectedState] = useState('All');
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);

  // Auto-focus on mount
  useEffect(()=>{ setTimeout(()=>{ if(inputRef.current) inputRef.current.focus(); }, 600); }, []);

  // Live search across deals and sponsors
  useEffect(()=>{
    if(!query.trim() || query.length < 2) { setResults([]); return; }
    const q = query.toLowerCase();
    const allSponsorFiles = [
      typeof SPONSORS!=='undefined'?SPONSORS:{},
      typeof SPONSORS2!=='undefined'?SPONSORS2:{},
      typeof SPONSORS3!=='undefined'?SPONSORS3:{},
      typeof SPONSORS4!=='undefined'?SPONSORS4:{},
    ];

    const matched = ALL_TREPP_DEALS.filter(d=>{
      const txt = [d.n, d.sponsor, d.borrower, d.city, d.state, d.type, d.orig, d.svc].filter(Boolean).join(' ').toLowerCase();
      return q.split(' ').filter(w=>w.length>1).every(w=>txt.includes(w));
    }).slice(0, 8);

    // Also search sponsor names
    const sponsorHits = [];
    for (const file of allSponsorFiles) {
      for (const [k,d] of Object.entries(file)) {
        if (k.toLowerCase().includes(q) || (d.hq||'').toLowerCase().includes(q)) {
          const relDeals = ALL_TREPP_DEALS.filter(deal=>{
            const txt = [deal.sponsor, deal.borrower, deal.owner].filter(Boolean).join(' ').toLowerCase();
            return (d.treppEntities||[k]).some(e=>e.length>3&&txt.includes(e.toLowerCase())) ||
              k.toLowerCase().split(/[\s\/\-]+/).filter(w=>w.length>=5).some(w=>txt.includes(w));
          });
          if (relDeals.length > 0) sponsorHits.push({type:'sponsor', key:k, data:d, count:relDeals.length, topDeal:relDeals[0]});
        }
      }
      if (sponsorHits.length >= 3) break;
    }

    setResults([
      ...sponsorHits.slice(0,3).map(s=>({...s, resultType:'sponsor'})),
      ...matched.map(d=>({resultType:'deal', deal:d}))
    ].slice(0, 10));
  }, [query]);

  const mo = d => d.mat ? Math.round((new Date(d.mat)-Date.now())/(1000*60*60*24*30.44)) : null;

  return <div style={{
    position:'fixed', inset:0, background:'#080806',
    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
    fontFamily:"'Inter',system-ui,sans-serif", zIndex:100, overflow:'hidden'
  }}>

    {/* Sherlock walks across bottom */}

}

                return <tr key={deal.n+"-"+i} onClick={()=>{if(listRef.current)selectedRef.current=listRef.current.scrollTop;setSelected(isSel?null:deal);}} style={{borderBottom:"1px solid "+(overdue?"#f9731615":"#0e1015"),background:rowBg,cursor:"pointer"}} onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(201,145,74,0.035)";}} onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=rowBg;}}>
                  <td style={{padding:"10px 10px"}}><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:4,background:t.bg,border:"1px solid "+t.color+"25"}}><span style={{width:5,height:5,borderRadius:"50%",background:t.color}}/><span style={{fontSize:13,fontWeight:800,color:t.color}}>{deal.score}</span></span></td>
                  <td style={{padding:"9px 10px"}}><div style={{fontSize:12,fontWeight:600,color:"#f0ece6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{researched&&<span style={{color:"#22c55e",marginRight:4,fontSize:10}}>●</span>}{(()=>{const spL=(deal.sponsor||deal.borrower||deal.owner||'').toLowerCase();const hasProfile=[typeof SPONSORS!=='undefined'?SPONSORS:{},typeof SPONSORS2!=='undefined'?SPONSORS2:{},typeof SPONSORS3!=='undefined'?SPONSORS3:{},typeof SPONSORS4!=='undefined'?SPONSORS4:{}].some(f=>Object.keys(f).some(k=>spL.includes(k.toLowerCase().slice(0,8))||(f[k].treppEntities||[]).some(e=>e.length>4&&spL.includes(e.toLowerCase()))));return hasProfile?<span style={{fontSize:12,padding:'1px 4px',borderRadius:2,background:'rgba(201,145,74,0.15)',color:'#c9914a',fontWeight:700,marginRight:4}}>★</span>:null;})()}{deal.n}</div><div style={{display:"flex",alignItems:"center",gap:5,marginTop:2}}><span style={{fontSize:12,color:"#a09080"}}>{deal.src}</span>{entry&&entry.status&&<StatusBadge status={entry.status} mini/>}{overdue&&<span style={{fontSize:12,fontWeight:700,color:"#f97316"}}>↑{daysOut}d</span>}</div></td>
                  <td style={{padding:"9px 10px",fontSize:12,color:"#a09888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{deal.city}</td>
                  <td style={{padding:"9px 10px",fontSize:12,fontWeight:700,color:"#f0ece6",whiteSpace:"nowrap"}}>{fmtBal(deal.bal)}</td>
                  <td style={{padding:"9px 10px",fontSize:12,color:matColor,whiteSpace:"nowrap"}}>{fmtMat(deal.mat)}{mo!==null&&mo<=0&&<div style={{fontSize:12,color:"#ef4444",fontWeight:700}}>PAST DUE</div>}</td>
                  <td style={{padding:"9px 10px",whiteSpace:"nowrap"}}>{deal.dscr!==null?<span style={{fontWeight:700,fontSize:12,color:deal.dscr<0.5?"#ef4444":deal.dscr<0.75?"#f97316":deal.dscr<1?"#eab308":"#9a8a78"}}>{deal.dscr}x</span>:<span style={{fontSize:12,color:"#a09080"}}>N/A</span>}</td>
                  <td style={{padding:"9px 10px",textAlign:"center"}}>{deal.ss&&<span style={{fontSize:12,padding:"2px 5px",borderRadius:3,background:"rgba(192,132,252,0.12)",color:"#c084fc",fontWeight:700}}>SS</span>}</td>
                  <td style={{padding:"9px 10px",textAlign:"center"}}>{deal.wl&&<span style={{fontSize:12,padding:"2px 5px",borderRadius:3,background:"rgba(96,165,250,0.12)",color:"#60a5fa",fontWeight:700}}>WL</span>}</td>
                  <td style={{padding:"9px 10px"}}><div style={{fontSize:12,color:"#b8c0cc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{shortSponsor(deal)}</div>{deal.svc&&<div style={{fontSize:12,color:"#a09080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{deal.svc.replace(" National Association","").replace(" Real Estate Advisors","")}</div>}</td>
                </tr>;
              })}
              {!filtered.length&&<tr><td colSpan={9} style={{padding:60,textAlign:"center",color:"#4a3a28",fontSize:14,letterSpacing:"0.04em"}}>NO DEALS MATCH CURRENT FILTERS</td></tr>}
            </tbody>
          </table>
        )}
      </div>

      {/* Inline deal panel */}
      {selected&&<DesktopDrawer deal={selected} onClose={()=>setSelected(null)} tracking={tracking} tpData={touchpoints.data} onGoToContact={goToContact}/>}
    </div>}
    <style>{"body{margin:0}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e1a14;border-radius:4px}"}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
